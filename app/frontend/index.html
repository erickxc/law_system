<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Law System — Login</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/theme.css">
</head>
<body class="min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-[380px]">

    <div class="flex items-center gap-2.5 mb-7">
        <div class="brand-mark" style="width:28px;height:28px;background:var(--text);"><i class="fa-solid fa-scale-balanced text-[13px]"></i></div>
        <div>
            <p class="text-[14px] font-semibold leading-none">Law System</p>
            <p class="text-[11px] mono mt-1" style="color:var(--text-3)">v2.0 · estudos jurídicos</p>
        </div>
    </div>

    <div class="bg-white border rounded p-7" style="border-color: var(--border)">

        <div class="flex border-b mb-6" style="border-color: var(--border)">
            <button onclick="showTab('login')" id="tab-login" class="tab active">Entrar</button>
            <button onclick="showTab('register')" id="tab-register" class="tab">Criar conta</button>
        </div>

        <div id="alert" class="alert"></div>

        <form id="form-login" onsubmit="handleLogin(event)" class="space-y-4">
            <div>
                <label class="label">E-mail</label>
                <input type="email" id="login-email" required placeholder="voce@exemplo.com" class="field">
            </div>
            <div>
                <label class="label">Senha</label>
                <div class="relative">
                    <input type="password" id="login-password" required placeholder="••••••••" class="field pr-9">
                    <button type="button" onclick="togglePwd('login-password', this)" class="absolute right-2 top-1/2 -translate-y-1/2" style="color:var(--text-3)">
                        <i class="fa-regular fa-eye text-xs"></i>
                    </button>
                </div>
            </div>
            <button type="submit" id="btn-login" class="btn btn-primary w-full" style="padding: 10px;">
                Entrar
            </button>
        </form>

        <form id="form-register" onsubmit="handleRegister(event)" class="space-y-4 hidden">
            <div>
                <label class="label">Nome completo</label>
                <input type="text" id="reg-name" required placeholder="Seu nome" class="field">
            </div>
            <div>
                <label class="label">E-mail</label>
                <input type="email" id="reg-email" required placeholder="voce@exemplo.com" class="field">
            </div>
            <input type="hidden" id="reg-curso" value="Direito">
            <div>
                <label class="label">Senha</label>
                <div class="relative">
                    <input type="password" id="reg-password" required placeholder="Mínimo 8 caracteres" oninput="checkStrength(this.value)" class="field pr-9">
                    <button type="button" onclick="togglePwd('reg-password', this)" class="absolute right-2 top-1/2 -translate-y-1/2" style="color:var(--text-3)">
                        <i class="fa-regular fa-eye text-xs"></i>
                    </button>
                </div>
                <div class="mt-2 grid grid-cols-4 gap-1">
                    <div id="s1" class="strength"></div>
                    <div id="s2" class="strength"></div>
                    <div id="s3" class="strength"></div>
                    <div id="s4" class="strength"></div>
                </div>
                <p id="strength-label" class="text-[11px] mt-1 h-3 mono" style="color:var(--text-3)"></p>
            </div>
            <button type="submit" id="btn-register" class="btn btn-primary w-full" style="padding: 10px;">
                Criar conta
            </button>
        </form>

    </div>

    <p class="text-[11px] mt-4 leading-relaxed text-center" style="color:var(--text-3)">
        Novos cadastros aguardam aprovação do administrador.
    </p>
</div>

<script src="config.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
