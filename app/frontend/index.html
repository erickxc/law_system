<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Law System — Login</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
    --bg:        #fafafa;
    --bg-2:      #f4f4f5;
    --surface:   #ffffff;
    --border:    #e4e4e7;
    --border-2:  #d4d4d8;
    --text:      #18181b;
    --text-2:    #52525b;
    --text-3:    #71717a;
    --text-4:    #a1a1aa;
    --accent:    #2563eb;
    --accent-h:  #1d4ed8;
    --danger:    #dc2626;
    --warning:   #d97706;
    --success:   #16a34a;
}
* { font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
body { background: var(--bg); color: var(--text); font-size: 14px; }
.mono { font-family: 'JetBrains Mono', monospace; }

.field {
    width: 100%; padding: 8px 10px; font-size: 13px;
    background: var(--surface); color: var(--text);
    border: 1px solid var(--border); border-radius: 4px;
    outline: none; transition: border-color .12s, box-shadow .12s;
}
.field:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,.12); }
.field::placeholder { color: var(--text-4); }
.field-error { border-color: var(--danger); }

.btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 8px 14px; font-size: 13px; font-weight: 500;
    background: var(--surface); color: var(--text);
    border: 1px solid var(--border-2); border-radius: 4px;
    cursor: pointer; transition: background .12s, border-color .12s;
    line-height: 1;
}
.btn:hover { background: var(--bg-2); }
.btn-primary { background: var(--text); color: white; border-color: var(--text); }
.btn-primary:hover { background: #27272a; border-color: #27272a; }
.btn:disabled { opacity: .5; cursor: wait; }

.label { font-size: 11px; font-weight: 500; color: var(--text-2); margin-bottom: 6px; display: block; }

.tab {
    padding: 0 0 8px; font-size: 13px; font-weight: 500; color: var(--text-3);
    border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent;
    margin-right: 20px; transition: color .12s, border-color .12s;
}
.tab.active { color: var(--text); border-bottom-color: var(--text); }

.alert { display: none; padding: 10px 12px; font-size: 12.5px; border-radius: 4px; margin-bottom: 14px; gap: 8px; align-items: flex-start; }
.alert i { margin-top: 1px; }
.alert-error   { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
.alert-success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
.alert-warning { background: #fffbeb; color: #92400e; border: 1px solid #fde68a; }

.strength { height: 2px; background: var(--border); border-radius: 1px; }
.strength.on-1 { background: var(--danger); }
.strength.on-2 { background: #f59e0b; }
.strength.on-3 { background: #eab308; }
.strength.on-4 { background: var(--success); }

.divider-h { height: 1px; background: var(--border); }

.brand-mark {
    width: 28px; height: 28px; background: var(--text); color: white;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 4px;
}
.brand-mark i { font-size: 13px; }

@media (prefers-reduced-motion: reduce) { *, *::before, *::after { transition-duration: 0.01ms !important; } }
</style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-[380px]">

    <div class="flex items-center gap-2.5 mb-7">
        <div class="brand-mark"><i class="fa-solid fa-scale-balanced"></i></div>
        <div>
            <p class="text-[14px] font-semibold leading-none">Law System</p>
            <p class="text-[11px] mono mt-1" style="color:var(--text-3)">v2.0 · estudos jurídicos</p>
        </div>
    </div>

    <div class="bg-white border rounded p-7" style="border-color: var(--border)">

        <div class="flex border-b mb-6" style="border-color: var(--border)">
            <button onclick="showTab('login')" id="tab-login" class="tab active">Entrar</button>
            <button onclick="showTab('register')" id="tab-register" class="tab">Criar conta</button>
        </div>

        <div id="alert" class="alert"></div>

        <form id="form-login" onsubmit="handleLogin(event)" class="space-y-4">
            <div>
                <label class="label">E-mail</label>
                <input type="email" id="login-email" required placeholder="voce@exemplo.com" class="field">
            </div>
            <div>
                <label class="label">Senha</label>
                <div class="relative">
                    <input type="password" id="login-password" required placeholder="••••••••" class="field pr-9">
                    <button type="button" onclick="togglePwd('login-password', this)" class="absolute right-2 top-1/2 -translate-y-1/2" style="color:var(--text-3)">
                        <i class="fa-regular fa-eye text-xs"></i>
                    </button>
                </div>
            </div>
            <button type="submit" id="btn-login" class="btn btn-primary w-full" style="padding: 10px;">
                Entrar
            </button>
        </form>

        <form id="form-register" onsubmit="handleRegister(event)" class="space-y-4 hidden">
            <div>
                <label class="label">Nome completo</label>
                <input type="text" id="reg-name" required placeholder="Seu nome" class="field">
            </div>
            <div>
                <label class="label">E-mail</label>
                <input type="email" id="reg-email" required placeholder="voce@exemplo.com" class="field">
            </div>
            <div>
                <label class="label">Curso</label>
                <input type="text" id="reg-curso" placeholder="Direito" class="field">
            </div>
            <div>
                <label class="label">Senha</label>
                <div class="relative">
                    <input type="password" id="reg-password" required placeholder="Mínimo 8 caracteres" oninput="checkStrength(this.value)" class="field pr-9">
                    <button type="button" onclick="togglePwd('reg-password', this)" class="absolute right-2 top-1/2 -translate-y-1/2" style="color:var(--text-3)">
                        <i class="fa-regular fa-eye text-xs"></i>
                    </button>
                </div>
                <div class="mt-2 grid grid-cols-4 gap-1">
                    <div id="s1" class="strength"></div>
                    <div id="s2" class="strength"></div>
                    <div id="s3" class="strength"></div>
                    <div id="s4" class="strength"></div>
                </div>
                <p id="strength-label" class="text-[11px] mt-1 h-3 mono" style="color:var(--text-3)"></p>
            </div>
            <button type="submit" id="btn-register" class="btn btn-primary w-full" style="padding: 10px;">
                Criar conta
            </button>
        </form>

    </div>

    <p class="text-[11px] mt-4 leading-relaxed text-center" style="color:var(--text-3)">
        Novos cadastros aguardam aprovação do administrador.
    </p>
</div>

<script src="config.js"></script>
<script>
if (localStorage.getItem('access_token')) location.href = 'dash.html';

function showTab(tab) {
    const isLogin = tab === 'login';
    document.getElementById('form-login').classList.toggle('hidden', !isLogin);
    document.getElementById('form-register').classList.toggle('hidden', isLogin);
    document.getElementById('tab-login').classList.toggle('active', isLogin);
    document.getElementById('tab-register').classList.toggle('active', !isLogin);
    clearAlert();
}

function showAlert(msg, type = 'error') {
    const el = document.getElementById('alert');
    const icons = { error: 'circle-xmark', success: 'circle-check', warning: 'triangle-exclamation' };
    el.className = `alert alert-${type}`;
    el.style.display = 'flex';
    el.innerHTML = `<i class="fa-solid fa-${icons[type] || 'info'}"></i><span>${msg}</span>`;
}

function clearAlert() { document.getElementById('alert').style.display = 'none'; }

function togglePwd(id, btn) {
    const inp = document.getElementById(id);
    const hide = inp.type === 'text';
    inp.type = hide ? 'password' : 'text';
    btn.querySelector('i').className = `fa-regular fa-eye${hide ? '' : '-slash'} text-xs`;
}

function checkStrength(pwd) {
    let score = 0;
    if (pwd.length >= 8) score++;
    if (/[A-Z]/.test(pwd)) score++;
    if (/[0-9]/.test(pwd)) score++;
    if (/[^A-Za-z0-9]/.test(pwd)) score++;
    const labels = ['Fraca', 'Regular', 'Boa', 'Forte'];
    for (let i = 1; i <= 4; i++) {
        document.getElementById(`s${i}`).className = `strength${i <= score ? ' on-' + score : ''}`;
    }
    document.getElementById('strength-label').textContent = pwd.length > 0 ? (labels[score-1] || '') : '';
}

async function handleLogin(e) {
    e.preventDefault();
    clearAlert();
    const btn = document.getElementById('btn-login');
    const orig = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Entrando…';
    try {
        const res = await fetch(`${API_BASE}/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                email: document.getElementById('login-email').value.trim(),
                password: document.getElementById('login-password').value,
            })
        });
        const data = await res.json();
        if (!res.ok) {
            showAlert(data.detail || 'Erro ao entrar.');
        } else {
            localStorage.setItem('access_token', data.access_token);
            location.href = 'dash.html';
        }
    } catch {
        showAlert('Erro de conexão.');
    } finally {
        btn.disabled = false;
        btn.innerHTML = orig;
    }
}

async function handleRegister(e) {
    e.preventDefault();
    clearAlert();
    const pwd = document.getElementById('reg-password').value;
    if (pwd.length < 8) { showAlert('Senha deve ter pelo menos 8 caracteres.'); return; }
    const btn = document.getElementById('btn-register');
    const orig = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Criando…';
    try {
        const res = await fetch(`${API_BASE}/register`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                full_name: document.getElementById('reg-name').value.trim(),
                email: document.getElementById('reg-email').value.trim(),
                password: pwd,
                curso: document.getElementById('reg-curso').value.trim() || null,
            })
        });
        const data = await res.json();
        if (!res.ok) {
            showAlert(data.detail || 'Erro ao criar conta.');
        } else {
            showAlert('Conta criada. Aguarde aprovação do administrador.', 'warning');
            document.getElementById('form-register').reset();
            setTimeout(() => showTab('login'), 3000);
        }
    } catch {
        showAlert('Erro de conexão.');
    } finally {
        btn.disabled = false;
        btn.innerHTML = orig;
    }
}
</script>
</body>
</html>
