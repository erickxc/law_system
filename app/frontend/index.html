<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Law System - Acesso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none; }
        .tooltip-box { position: relative; display: inline-block; }
        .tooltip-box .tooltip-text {
            visibility: hidden; width: 160px; background-color: #1e293b; color: #fff;
            text-align: center; border-radius: 6px; padding: 5px; position: absolute;
            z-index: 1; bottom: 125%; left: 50%; margin-left: -80px; opacity: 0;
            transition: opacity 0.3s; font-size: 10px; font-weight: normal;
        }
        .tooltip-box:hover .tooltip-text { visibility: visible; opacity: 1; }
    </style>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen font-sans p-4">

    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md fade-in">
        <h1 class="text-3xl font-extrabold text-slate-800 mb-2 text-center">Law System ⚖️</h1>
        <p id="form-subtitle" class="text-slate-500 text-center mb-8 text-sm">Gestão de Alta Performance Jurídica</p>
        
        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-xs font-bold text-slate-700 uppercase mb-1">E-mail</label>
                <input type="email" id="email" required placeholder="seu@email.com"
                    class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-700 uppercase mb-1">Senha</label>
                <input type="password" id="password" required placeholder="••••••••"
                    class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            </div>
            <button type="submit" class="w-full bg-slate-800 text-white py-3 rounded-xl font-bold hover:bg-slate-700 transition-all shadow-lg text-sm">Acessar Dashboard</button>
            <p class="text-center text-xs text-slate-500">Não tem acesso? <a href="#" onclick="toggleForm()" class="text-blue-600 font-bold">Solicitar Inscrição</a></p>
        </form>

        <form id="registerForm" class="space-y-4 hidden">
            <div class="grid grid-cols-1 gap-4">
                <div>
                    <label class="block text-xs font-bold text-slate-700 uppercase mb-1">Nome Completo</label>
                    <input type="text" id="reg-name" required placeholder="Ex: João Silva" class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-700 uppercase mb-1">
                        CPF 
                        <span class="tooltip-box ml-1 text-blue-500 cursor-help">
                            <i class="fa-solid fa-circle-question text-[10px]"></i>
                            <span class="tooltip-text">Apenas números. O sistema validará se o CPF é seu.</span>
                        </span>
                    </label>
                    <input type="text" id="reg-cpf" required placeholder="000.000.000-00" maxlength="14" oninput="maskCPF(this)" class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-700 uppercase mb-1">Curso</label>
                    <input type="text" id="reg-curso" required placeholder="Ex: Direito" class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-700 uppercase mb-1">E-mail Acadêmico</label>
                    <input type="email" id="reg-email" required placeholder="seu@email.com" class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-700 uppercase mb-1">Senha</label>
                    <input type="password" id="reg-password" required placeholder="••••••••" class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition-all shadow-lg text-sm mt-2">Enviar Solicitação</button>
            <p class="text-center text-xs text-slate-500"><a href="#" onclick="toggleForm()" class="text-slate-800 font-bold">Voltar para o Login</a></p>
        </form>

        <p id="message" class="mt-4 text-center text-sm font-semibold min-h-[20px]"></p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>
<script>
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const message = document.getElementById('message');

    function toggleForm() {
        loginForm.classList.toggle('hidden');
        registerForm.classList.toggle('hidden');
        message.innerText = "";
        document.getElementById('form-subtitle').innerText = loginForm.classList.contains('hidden') ? "Crie sua conta para análise" : "Gestão de Alta Performance Jurídica";
    }

    // ✅ VALIDAÇÃO DE CPF
    function validarCPF(cpf) {
        cpf = cpf.replace(/\D/g, ''); // Remove pontos e traços
        
        if (cpf.length !== 11) return false;
        if (/^(\d)\1{10}$/.test(cpf)) return false; // Rejeita sequências iguais (111.111.111-11)
        
        // Validação dos dígitos verificadores
        let soma = 0;
        let resto;
        
        for (let i = 1; i <= 9; i++) {
            soma += parseInt(cpf.substring(i - 1, i)) * (11 - i);
        }
        resto = (soma * 10) % 11;
        if (resto === 10 || resto === 11) resto = 0;
        if (resto !== parseInt(cpf.substring(9, 10))) return false;
        
        soma = 0;
        for (let i = 1; i <= 10; i++) {
            soma += parseInt(cpf.substring(i - 1, i)) * (12 - i);
        }
        resto = (soma * 10) % 11;
        if (resto === 10 || resto === 11) resto = 0;
        if (resto !== parseInt(cpf.substring(10, 11))) return false;
        
        return true;
    }

    // ✅ MÁSCARA DE CPF COM VALIDAÇÃO
    function maskCPF(input) {
        let v = input.value.replace(/\D/g, "");
        
        if (v.length <= 11) {
            v = v.replace(/(\d{3})(\d)/, "$1.$2");
            v = v.replace(/(\d{3})(\d)/, "$1.$2");
            v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
        }
        
        input.value = v;
        
        // Valida CPF quando completo
        const cpfLimpo = v.replace(/\D/g, '');
        const feedbackElement = document.getElementById('cpf-feedback');
        
        if (cpfLimpo.length === 11) {
            if (validarCPF(cpfLimpo)) {
                input.classList.remove('border-red-500');
                input.classList.add('border-green-500');
                if (feedbackElement) feedbackElement.remove();
            } else {
                input.classList.remove('border-green-500');
                input.classList.add('border-red-500');
                
                if (!feedbackElement) {
                    const feedback = document.createElement('p');
                    feedback.id = 'cpf-feedback';
                    feedback.className = 'text-red-500 text-xs mt-1 font-bold';
                    feedback.innerText = '❌ CPF inválido';
                    input.parentElement.appendChild(feedback);
                }
            }
        } else {
            input.classList.remove('border-red-500', 'border-green-500');
            if (feedbackElement) feedbackElement.remove();
        }
    }

    // ✅ VALIDAÇÃO DE SENHA EM TEMPO REAL
    const passwordInput = document.getElementById('reg-password');
    passwordInput.addEventListener('input', function() {
        const senha = this.value;
        const feedbackElement = document.getElementById('password-feedback');
        
        const requisitos = {
            tamanho: senha.length >= 8,
            maiuscula: /[A-Z]/.test(senha),
            minuscula: /[a-z]/.test(senha),
            numero: /[0-9]/.test(senha)
        };
        
        const todasOk = Object.values(requisitos).every(v => v);
        
        // Remove feedback anterior
        if (feedbackElement) feedbackElement.remove();
        
        if (senha.length > 0 && !todasOk) {
            this.classList.add('border-red-500');
            this.classList.remove('border-green-500');
            
            const feedback = document.createElement('div');
            feedback.id = 'password-feedback';
            feedback.className = 'text-xs mt-2 space-y-1';
            
            feedback.innerHTML = `
                <p class="${requisitos.tamanho ? 'text-green-500' : 'text-red-500'}">
                    ${requisitos.tamanho ? '✓' : '✗'} Mínimo 8 caracteres
                </p>
                <p class="${requisitos.maiuscula ? 'text-green-500' : 'text-red-500'}">
                    ${requisitos.maiuscula ? '✓' : '✗'} Uma letra maiúscula
                </p>
                <p class="${requisitos.minuscula ? 'text-green-500' : 'text-red-500'}">
                    ${requisitos.minuscula ? '✓' : '✗'} Uma letra minúscula
                </p>
                <p class="${requisitos.numero ? 'text-green-500' : 'text-red-500'}">
                    ${requisitos.numero ? '✓' : '✗'} Um número
                </p>
            `;
            
            this.parentElement.appendChild(feedback);
        } else if (todasOk) {
            this.classList.remove('border-red-500');
            this.classList.add('border-green-500');
        } else {
            this.classList.remove('border-red-500', 'border-green-500');
        }
    });

    // ✅ VALIDAÇÃO AO ENVIAR
    registerForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const cpfInput = document.getElementById('reg-cpf');
        const cpfLimpo = cpfInput.value.replace(/\D/g, '');
        
        // Valida CPF antes de enviar
        if (!validarCPF(cpfLimpo)) {
            message.innerText = "❌ CPF inválido! Digite um CPF válido.";
            message.className = "mt-4 text-center text-sm font-semibold text-red-600";
            cpfInput.focus();
            return;
        }
        
        // Valida senha
        const senha = passwordInput.value;
        if (senha.length < 8 || !/[A-Z]/.test(senha) || !/[a-z]/.test(senha) || !/[0-9]/.test(senha)) {
            message.innerText = "❌ Senha não atende aos requisitos!";
            message.className = "mt-4 text-center text-sm font-semibold text-red-600";
            passwordInput.focus();
            return;
        }
        
        const data = {
            full_name: document.getElementById('reg-name').value,
            email: document.getElementById('reg-email').value,
            password: senha,
            cpf: cpfLimpo,  // ✅ Envia CPF sem formatação
            curso: document.getElementById('reg-curso').value
        };

        try {
            const response = await fetch('http://127.0.0.1:8000/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            
            const resData = await response.json();
            
            if(response.ok) {
                message.innerText = "✅ " + resData.message;
                message.className = "mt-4 text-center text-sm font-semibold text-green-600 fade-in";
                registerForm.reset();
                setTimeout(toggleForm, 3000);
            } else {
                message.innerText = "❌ " + (resData.detail || "Erro na solicitação.");
                message.className = "mt-4 text-center text-sm font-semibold text-red-600";
            }
        } catch (err) { 
            console.error('Erro:', err);
            message.innerText = "❌ Erro ao conectar com o servidor.";
            message.className = "mt-4 text-center text-sm font-semibold text-red-600";
        }
    });

    // LOGIN
    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        try {
            const response = await fetch('http://127.0.0.1:8000/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await response.json();
            
            if (response.ok) {
                localStorage.setItem('access_token', data.access_token);
                window.location.href = 'dash.html';
            } else {
                message.innerText = "❌ " + (data.detail || "Erro no login");
                message.className = "mt-4 text-center text-sm font-semibold text-red-600 fade-in";
            }
        } catch (err) { 
            message.innerText = "❌ Erro ao conectar ao servidor.";
            message.className = "mt-4 text-center text-sm font-semibold text-red-600";
        }
    });
</script>
</body>
</html>
