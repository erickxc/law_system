<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Law System - Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
* { font-family: 'Inter', sans-serif; }
.sidebar-active { background: #2563eb !important; color: #fff !important; }
.sidebar-active i, .sidebar-active span { color: #fff !important; }
.sidebar-link { transition: all .18s; }
.no-scrollbar::-webkit-scrollbar { display: none; }
.no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

/* Toast */
#toast-container { position:fixed; top:20px; right:20px; z-index:9999; display:flex; flex-direction:column; gap:8px; pointer-events:none; }
.toast { pointer-events:all; display:flex; align-items:flex-start; gap:10px; min-width:280px; max-width:400px; padding:14px 18px; border-radius:14px; font-size:13px; font-weight:600; box-shadow:0 8px 30px rgba(0,0,0,.15); animation:slideIn .3s cubic-bezier(.34,1.56,.64,1); transition:opacity .35s, transform .35s; }
.toast.hide { opacity:0; transform:translateX(36px); }
.toast-success { background:#f0fdf4; border:1.5px solid #bbf7d0; color:#166534; }
.toast-error   { background:#fef2f2; border:1.5px solid #fecaca; color:#991b1b; }
.toast-warning { background:#fffbeb; border:1.5px solid #fde68a; color:#92400e; }
.toast-info    { background:#eff6ff; border:1.5px solid #bfdbfe; color:#1e40af; }
.toast-close { background:none; border:none; cursor:pointer; opacity:.5; font-size:14px; color:inherit; padding:0; margin-left:auto; }
.toast-close:hover { opacity:1; }
@keyframes slideIn { from { opacity:0; transform:translateX(36px); } to { opacity:1; transform:translateX(0); } }

/* Cards */
.stat-card { transition: transform .2s, box-shadow .2s; }
.stat-card:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,.08); }

/* Modal */
.modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:1000; display:flex; align-items:center; justify-content:center; padding:16px; backdrop-filter:blur(4px); }
.modal-box { background:#fff; border-radius:20px; padding:28px; width:100%; max-width:480px; max-height:90vh; overflow-y:auto; }

/* Input */
.form-input { width:100%; padding:10px 14px; border:1.5px solid #e2e8f0; border-radius:10px; font-size:14px; outline:none; transition:border-color .2s, box-shadow .2s; }
.form-input:focus { border-color:#3b82f6; box-shadow:0 0 0 3px rgba(59,130,246,.1); }
.form-select { width:100%; padding:10px 14px; border:1.5px solid #e2e8f0; border-radius:10px; font-size:14px; outline:none; background:#fff; cursor:pointer; }
.form-select:focus { border-color:#3b82f6; box-shadow:0 0 0 3px rgba(59,130,246,.1); }
.form-label { display:block; font-size:12px; font-weight:600; color:#64748b; text-transform:uppercase; letter-spacing:.06em; margin-bottom:6px; }
.form-group { margin-bottom:16px; }

/* Badges */
.badge { display:inline-flex; align-items:center; padding:3px 10px; border-radius:99px; font-size:11px; font-weight:700; }
.badge-pendente   { background:#fef3c7; color:#92400e; }
.badge-em-curso   { background:#dbeafe; color:#1e40af; }
.badge-concluida  { background:#dcfce7; color:#166534; }
.badge-alta  { background:#fee2e2; color:#991b1b; }
.badge-media { background:#fef3c7; color:#92400e; }
.badge-baixa { background:#f0fdf4; color:#166534; }

/* Flashcard flip */
.card-scene { perspective:1000px; }
.card-flip { position:relative; width:100%; transition:transform .5s; transform-style:preserve-3d; }
.card-flip.flipped { transform:rotateY(180deg); }
.card-face { position:absolute; inset:0; backface-visibility:hidden; display:flex; align-items:center; justify-content:center; border-radius:16px; padding:24px; }
.card-back { transform:rotateY(180deg); }

/* Progress bar */
.progress-bar { height:6px; border-radius:99px; background:#e2e8f0; overflow:hidden; }
.progress-fill { height:100%; border-radius:99px; background:linear-gradient(90deg,#3b82f6,#6366f1); transition:width .6s cubic-bezier(.65,0,.35,1); }

/* Timer */
.timer-display { font-family:'Courier New',monospace; font-size:3.5rem; font-weight:800; line-height:1; letter-spacing:-.02em; }

/* Tabs */
.section-tab { padding:8px 16px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; transition:all .15s; color:#64748b; }
.section-tab.active { background:#eff6ff; color:#2563eb; }
</style>
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden text-slate-900">

<div id="toast-container"></div>

<!-- SIDEBAR -->
<aside class="w-64 bg-[#0f172a] text-white flex flex-col shadow-2xl z-20 flex-shrink-0">
    <div class="p-6 border-b border-slate-800">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 bg-blue-600/20 border border-blue-500/30 rounded-xl flex items-center justify-center">
                <i class="fa-solid fa-scale-balanced text-blue-400 text-sm"></i>
            </div>
            <div>
                <p class="text-sm font-bold text-white">Law System</p>
                <p class="text-[10px] text-slate-500">Estudos Jurídicos</p>
            </div>
        </div>
    </div>

    <nav class="flex-1 p-3 space-y-0.5 overflow-y-auto no-scrollbar">
        <a href="#" onclick="showDashboard()" id="menu-dash" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white text-sm">
            <i class="fa-solid fa-house w-4 text-center"></i><span>Dashboard</span>
        </a>

        <p class="px-3 pt-4 pb-1.5 text-[10px] font-bold text-slate-600 uppercase tracking-widest">Cadastros</p>
        <a href="#" onclick="showSubjects()" id="menu-materias" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white text-sm">
            <i class="fa-solid fa-book-bookmark w-4 text-center"></i><span>Matérias</span>
        </a>
        <a href="#" onclick="showTeachers()" id="menu-docentes" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white text-sm">
            <i class="fa-solid fa-chalkboard-user w-4 text-center"></i><span>Docentes</span>
        </a>
        <a href="#" onclick="showBooks()" id="menu-livros" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white text-sm">
            <i class="fa-solid fa-book-open w-4 text-center"></i><span>Livros</span>
        </a>

        <p class="px-3 pt-4 pb-1.5 text-[10px] font-bold text-slate-600 uppercase tracking-widest">Estudo</p>
        <a href="#" onclick="showFlashcards()" id="menu-flashcards" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white text-sm">
            <i class="fa-solid fa-layer-group w-4 text-center"></i><span>Flashcards</span>
            <span id="fc-due-badge" class="hidden ml-auto bg-amber-500 text-white text-[10px] font-bold rounded-full px-1.5 py-0.5"></span>
        </a>
        <a href="#" onclick="showSessions()" id="menu-sessoes" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white text-sm">
            <i class="fa-solid fa-stopwatch w-4 text-center"></i><span>Sessões de Estudo</span>
        </a>
        <a href="#" onclick="showHistory()" id="menu-historico" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white text-sm">
            <i class="fa-solid fa-chart-line w-4 text-center"></i><span>Histórico</span>
        </a>

        <p class="px-3 pt-4 pb-1.5 text-[10px] font-bold text-slate-600 uppercase tracking-widest">Conta</p>
        <a href="#" onclick="showProfile()" id="menu-perfil" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white text-sm">
            <i class="fa-solid fa-user w-4 text-center"></i><span>Meu Perfil</span>
        </a>
        <div id="admin-menu" class="hidden">
            <a href="admin.html" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-xl text-amber-400 hover:bg-amber-500/10 text-sm">
                <i class="fa-solid fa-user-shield w-4 text-center"></i><span>Painel Admin</span>
            </a>
        </div>
    </nav>

    <div class="p-3 border-t border-slate-800">
        <div class="flex items-center gap-3 px-3 py-2 mb-1">
            <div class="w-8 h-8 bg-slate-700 rounded-full flex items-center justify-center flex-shrink-0">
                <i class="fa-solid fa-user text-slate-400 text-xs"></i>
            </div>
            <div class="min-w-0 flex-1">
                <p id="sidebar-name" class="text-xs font-semibold text-white truncate">—</p>
                <p id="sidebar-role" class="text-[10px] text-slate-500 truncate">Estudante</p>
            </div>
        </div>
        <button onclick="logout()" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-red-400 hover:bg-red-900/20 transition-all text-sm">
            <i class="fa-solid fa-arrow-right-from-bracket w-4 text-center"></i><span>Sair</span>
        </button>
    </div>
</aside>

<!-- MAIN -->
<main class="flex-1 flex flex-col overflow-hidden">
    <header class="bg-white border-b border-slate-100 px-8 py-4 flex items-center justify-between flex-shrink-0">
        <div>
            <h2 id="pageTitle" class="text-lg font-bold text-slate-800">Dashboard</h2>
            <p id="pageSubtitle" class="text-xs text-slate-400 mt-0.5">Bem-vindo de volta</p>
        </div>
        <div id="header-user" class="text-right">
            <p id="userDisplayName" class="text-sm font-semibold text-slate-700">—</p>
            <p id="userCurso" class="text-xs text-blue-500 font-semibold"></p>
        </div>
    </header>

    <section id="mainContent" class="flex-1 overflow-y-auto p-8 no-scrollbar"></section>
</main>

<!-- MODAL -->
<div id="modal" class="modal-backdrop hidden" onclick="if(event.target===this)closeModal()">
    <div class="modal-box" onclick="event.stopPropagation()">
        <div id="modal-content"></div>
    </div>
</div>

<script src="config.js"></script>
<script>
// ── State ──────────────────────────────────────────
const token = localStorage.getItem('access_token');
let me = null;
let subjects = [];
let teachers = [];
let timerInterval = null;
let timerSeconds = 0;
let timerRunning = false;
let sessionTasks = [];
let editingSubjectId = null;
let editingBookId = null;
let editingFlashcardId = null;
let currentBookId = null;
let currentBookPage = 1;
let reviewQueue = [];
let reviewIndex = 0;

if (!token) location.href = 'index.html';

// ── Toast ──────────────────────────────────────────
function toast(msg, type = 'info', duration = 3500) {
    const icons = { success:'circle-check', error:'circle-xmark', warning:'triangle-exclamation', info:'circle-info' };
    const el = document.createElement('div');
    el.className = `toast toast-${type}`;
    el.innerHTML = `<i class="fa-solid fa-${icons[type]} text-base flex-shrink-0"></i><span class="flex-1">${msg}</span><button class="toast-close" onclick="this.parentElement.remove()"><i class="fa-solid fa-xmark"></i></button>`;
    document.getElementById('toast-container').appendChild(el);
    setTimeout(() => { el.classList.add('hide'); setTimeout(() => el.remove(), 400); }, duration);
}

// ── Modal ──────────────────────────────────────────
function openModal(html) {
    document.getElementById('modal-content').innerHTML = html;
    document.getElementById('modal').classList.remove('hidden');
}
function closeModal() {
    document.getElementById('modal').classList.add('hidden');
}

// ── API helpers ───────────────────────────────────
async function api(path, opts = {}) {
    const res = await fetch(`${API_BASE}${path}`, {
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`, ...opts.headers },
        ...opts
    });
    if (res.status === 401) { localStorage.removeItem('access_token'); location.href = 'index.html'; return; }
    if (res.status === 204) return null;
    return res.json().then(d => { if (!res.ok) throw new Error(d.detail || `Erro ${res.status}`); return d; });
}

function setActive(id) {
    document.querySelectorAll('.sidebar-link').forEach(el => el.classList.remove('sidebar-active'));
    const el = document.getElementById(id);
    if (el) el.classList.add('sidebar-active');
}

function setPage(title, subtitle = '') {
    document.getElementById('pageTitle').textContent = title;
    document.getElementById('pageSubtitle').textContent = subtitle;
}

function fmtDuration(s) {
    const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
    if (h > 0) return `${h}h ${m}m`;
    if (m > 0) return `${m}m ${sec}s`;
    return `${sec}s`;
}
function fmtDate(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleDateString('pt-BR', { day:'2-digit', month:'short', year:'numeric' });
}

// ── Init ──────────────────────────────────────────
async function init() {
    try {
        me = await api('/users/me');
        document.getElementById('userDisplayName').textContent = me.full_name;
        document.getElementById('sidebar-name').textContent = me.full_name;
        document.getElementById('userCurso').textContent = me.curso || '';
        document.getElementById('sidebar-role').textContent = me.role === 'admin' ? 'Administrador' : me.curso || 'Estudante';
        if (me.role === 'admin') document.getElementById('admin-menu').classList.remove('hidden');
        subjects = await api('/subjects/');
        teachers = await api('/teachers/');
        loadFlashcardBadge();
        showDashboard();
    } catch (e) {
        toast('Erro ao carregar dados. ' + e.message, 'error');
    }
}

async function loadFlashcardBadge() {
    try {
        const due = await api('/flashcards/due');
        const badge = document.getElementById('fc-due-badge');
        if (due.length > 0) {
            badge.textContent = due.length > 99 ? '99+' : due.length;
            badge.classList.remove('hidden');
        }
    } catch {}
}

function logout() {
    localStorage.removeItem('access_token');
    location.href = 'index.html';
}

async function exportHistoryPdf() {
    try {
        const res = await fetch(`${API_BASE}/sessions/report/pdf`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!res.ok) { toast('Erro ao gerar PDF.', 'error'); return; }
        const blob = await res.blob();
        const disp = res.headers.get('content-disposition') || '';
        const match = disp.match(/filename\*?=(?:UTF-8'')?["']?([^"';]+)["']?/i);
        const fname = match ? decodeURIComponent(match[1]) : `Historico - ${me.full_name}.pdf`;
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = fname; a.click();
        URL.revokeObjectURL(url);
    } catch (e) { toast('Erro ao exportar PDF: ' + e.message, 'error'); }
}

// ── DASHBOARD ─────────────────────────────────────
let _activityChart = null;
let _subjectsChart = null;

async function showDashboard() {
    setActive('menu-dash');
    setPage('Dashboard', 'Visão geral do seu desempenho');
    document.getElementById('mainContent').innerHTML = `<div class="flex items-center justify-center h-32"><i class="fa-solid fa-spinner fa-spin text-blue-500 text-2xl"></i></div>`;

    try {
        const [stats, history, fcStats] = await Promise.all([
            api('/sessions/stats').catch(() => null),
            api('/sessions/history').catch(() => []),
            api('/flashcards/stats').catch(() => null),
        ]);

        const totalMin = stats ? stats.total_minutes : 0;
        const accuracy = stats ? stats.accuracy : 0;
        const streak = stats ? stats.current_streak : 0;
        const totalQ = stats ? stats.total_questions : 0;

        document.getElementById('mainContent').innerHTML = `
        <div class="max-w-6xl mx-auto space-y-6">
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
                ${statCard('fa-clock','Tempo estudado', formatMinutes(totalMin), 'text-blue-500', 'bg-blue-50')}
                ${statCard('fa-fire','Sequência atual', streak > 0 ? `${streak} dia${streak>1?'s':''}` : '—', 'text-orange-500', 'bg-orange-50')}
                ${statCard('fa-bullseye','Taxa de acerto', totalQ > 0 ? `${accuracy}%` : '—', 'text-green-500', 'bg-green-50')}
                ${statCard('fa-layer-group','Flashcards', fcStats ? `${fcStats.due_today} hoje` : '—', 'text-amber-500', 'bg-amber-50')}
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2 bg-white rounded-2xl border border-slate-100 p-6">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-sm font-bold text-slate-700">Atividade — últimos 30 dias</h3>
                        ${stats && stats.best_day ? `<span class="text-xs text-slate-400">Melhor: ${fmtShortDate(stats.best_day.date)} (${stats.best_day.minutes}m)</span>` : ''}
                    </div>
                    <div class="h-56"><canvas id="activityChart"></canvas></div>
                </div>

                <div class="bg-white rounded-2xl border border-slate-100 p-6">
                    <h3 class="text-sm font-bold text-slate-700 mb-4">Tempo por matéria</h3>
                    ${stats && stats.by_subject.length > 0
                        ? `<div class="h-56"><canvas id="subjectsChart"></canvas></div>`
                        : emptyState('fa-book-bookmark','Sem dados','Estude alguma matéria pra ver a distribuição.')}
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2 bg-white rounded-2xl border border-slate-100 p-6">
                    <h3 class="text-sm font-bold text-slate-700 mb-4">Sessões recentes</h3>
                    ${history.length === 0 ? emptyState('fa-stopwatch','Nenhuma sessão registrada','Inicie uma sessão de estudo para ver o histórico aqui.') :
                    `<div class="space-y-3">${history.slice(0,5).map(s => `
                        <div class="flex items-center gap-4 p-3 rounded-xl hover:bg-slate-50 transition-colors">
                            <div class="w-9 h-9 bg-blue-50 rounded-xl flex items-center justify-center flex-shrink-0">
                                <i class="fa-solid fa-book-open text-blue-500 text-sm"></i>
                            </div>
                            <div class="flex-1 min-w-0">
                                <p class="text-sm font-semibold text-slate-800 truncate">${s.subject_name}</p>
                                <p class="text-xs text-slate-400">${fmtDate(s.start_time)}</p>
                            </div>
                            <div class="text-right flex-shrink-0">
                                <p class="text-sm font-bold text-slate-700">${fmtDuration(s.duration_seconds)}</p>
                                ${s.total_questions > 0 ? `<p class="text-xs text-slate-400">${s.correct_answers}/${s.total_questions} acertos</p>` : ''}
                            </div>
                        </div>`).join('')}</div>`}
                </div>

                <div class="space-y-4">
                    <div class="bg-white rounded-2xl border border-slate-100 p-6">
                        <h3 class="text-sm font-bold text-slate-700 mb-4">Matérias por status</h3>
                        ${subjects.length === 0 ? `<p class="text-xs text-slate-400">Nenhuma matéria cadastrada.</p>` :
                        `<div class="space-y-2">
                            ${Object.entries(subjects.reduce((acc, s) => { acc[s.status]=(acc[s.status]||0)+1; return acc; }, {})).map(([st, n]) => `
                            <div class="flex items-center justify-between">
                                <span class="badge badge-${st.toLowerCase().replace(' ','-')}">${st}</span>
                                <span class="text-sm font-bold text-slate-600">${n}</span>
                            </div>`).join('')}
                        </div>`}
                    </div>
                    ${fcStats && fcStats.due_today > 0 ? `
                    <div class="bg-amber-50 border border-amber-200 rounded-2xl p-5">
                        <div class="flex items-center gap-3 mb-2">
                            <i class="fa-solid fa-layer-group text-amber-500"></i>
                            <p class="text-sm font-bold text-amber-800">Flashcards para revisar</p>
                        </div>
                        <p class="text-2xl font-black text-amber-700 mb-3">${fcStats.due_today}</p>
                        <button onclick="showFlashcards()" class="w-full bg-amber-500 hover:bg-amber-600 text-white text-xs font-bold py-2 px-4 rounded-lg transition-colors">Revisar agora</button>
                    </div>` : ''}
                </div>
            </div>
        </div>`;

        // Render charts (após DOM existir)
        if (stats) renderDashboardCharts(stats);

    } catch (e) {
        toast('Erro ao carregar dashboard: ' + e.message, 'error');
    }
}

function renderDashboardCharts(stats) {
    if (_activityChart) { _activityChart.destroy(); _activityChart = null; }
    if (_subjectsChart) { _subjectsChart.destroy(); _subjectsChart = null; }

    const actCanvas = document.getElementById('activityChart');
    if (actCanvas) {
        const labels = stats.last_30_days.map(d => {
            const dt = new Date(d.date + 'T00:00:00');
            return `${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')}`;
        });
        _activityChart = new Chart(actCanvas, {
            type: 'bar',
            data: {
                labels,
                datasets: [{
                    label: 'Minutos',
                    data: stats.last_30_days.map(d => d.minutes),
                    backgroundColor: 'rgba(59, 130, 246, 0.85)',
                    borderRadius: 4,
                    maxBarThickness: 14,
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { beginAtZero: true, ticks: { font: { size: 10 }, color: '#94a3b8' }, grid: { color: '#f1f5f9' } },
                    x: { ticks: { font: { size: 9 }, color: '#94a3b8', maxRotation: 0, autoSkip: true, maxTicksLimit: 10 }, grid: { display: false } }
                }
            }
        });
    }

    const subjCanvas = document.getElementById('subjectsChart');
    if (subjCanvas && stats.by_subject.length > 0) {
        const palette = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#06b6d4', '#ec4899', '#84cc16'];
        _subjectsChart = new Chart(subjCanvas, {
            type: 'doughnut',
            data: {
                labels: stats.by_subject.map(b => b.name),
                datasets: [{
                    data: stats.by_subject.map(b => b.minutes),
                    backgroundColor: stats.by_subject.map((_, i) => palette[i % palette.length]),
                    borderWidth: 2, borderColor: '#fff',
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false, cutout: '60%',
                plugins: {
                    legend: { position: 'bottom', labels: { font: { size: 10 }, color: '#475569', boxWidth: 10, padding: 8 } },
                    tooltip: { callbacks: { label: (ctx) => `${ctx.label}: ${ctx.parsed}m` } }
                }
            }
        });
    }
}

function formatMinutes(min) {
    const h = Math.floor(min/60);
    const m = min % 60;
    if (h >= 1) return `${h}h ${m}m`;
    return `${m}m`;
}

function fmtShortDate(iso) {
    const d = new Date(iso + 'T00:00:00');
    return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`;
}

function statCard(icon, label, value, iconClass, bgClass) {
    return `<div class="stat-card bg-white rounded-2xl border border-slate-100 p-5">
        <div class="flex items-start justify-between">
            <div class="${bgClass} w-10 h-10 rounded-xl flex items-center justify-center">
                <i class="fa-solid ${icon} ${iconClass}"></i>
            </div>
        </div>
        <p class="text-2xl font-black text-slate-800 mt-3">${value}</p>
        <p class="text-xs text-slate-500 font-medium mt-0.5">${label}</p>
    </div>`;
}

function formatHours(secs) {
    const h = Math.floor(secs/3600);
    const m = Math.floor((secs%3600)/60);
    if (h >= 1) return `${h}h ${m}m`;
    return `${m}m`;
}

function emptyState(icon, title, msg) {
    return `<div class="text-center py-10">
        <div class="w-14 h-14 bg-slate-50 rounded-2xl flex items-center justify-center mx-auto mb-4">
            <i class="fa-solid ${icon} text-slate-300 text-xl"></i>
        </div>
        <p class="font-semibold text-slate-600 text-sm">${title}</p>
        <p class="text-xs text-slate-400 mt-1">${msg}</p>
    </div>`;
}

    </form>`);
}

async function saveSubject(e) {
    e.preventDefault();
    const teacherVal = document.getElementById('s-teacher').value;
    const no_teacher = teacherVal === 'NONE';
    const teacher_id = (!no_teacher && teacherVal) ? teacherVal : null;
    const data = {
        name: document.getElementById('s-name').value.trim(),
        sigla: document.getElementById('s-sigla').value.trim() || null,
        period: parseInt(document.getElementById('s-period').value),
        priority: document.getElementById('s-priority').value,
        no_teacher,
        teacher_id,
    };
    try {
        if (editingSubjectId) {
            await api(`/subjects/${editingSubjectId}`, { method: 'PUT', body: JSON.stringify(data) });
            toast('Matéria atualizada!', 'success');
        } else {
            await api('/subjects/', { method: 'POST', body: JSON.stringify(data) });
            toast('Matéria criada!', 'success');
        }
        subjects = await api('/subjects/');
        closeModal();
        renderSubjects();
    } catch (e) { toast(e.message, 'error'); }
}

async function deleteSubject(id, name) {
    if (!confirm(`Excluir "${name}"? Esta ação não pode ser desfeita.`)) return;
    try {
        await api(`/subjects/${id}`, { method: 'DELETE' });
        subjects = subjects.filter(s => s.id !== id);
        toast('Matéria excluída.', 'success');
        renderSubjects();
    } catch (e) { toast(e.message, 'error'); }
}

function selectColor(color, btn) {
    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('border-white','scale-110'));
    btn.classList.add('border-white','scale-110');
    document.getElementById('b-color').value = color;
}

async function saveBook(e) {
    e.preventDefault();
    const data = {
        name: document.getElementById('b-name').value.trim(),
        author: document.getElementById('b-author').value.trim() || null,
        genre: document.getElementById('b-genre').value.trim() || null,

            await api(`/books/${editingBookId}`, { method: 'PUT', body: JSON.stringify(data) });
            toast('Livro atualizado!', 'success');

            await api('/books/', { method: 'POST', body: JSON.stringify(data) });
            toast('Livro adicionado!', 'success');

        showBooks();

async function deleteBook(id, name, ev) {

        await api(`/books/${id}`, { method: 'DELETE' });

async function openBookReader(bookId) {
    currentBookId = bookId;

async function saveBookPage(bookId) {
    const page = parseInt(document.getElementById('book-page-input').value);
    try {
        await api(`/books/${bookId}`, { method: 'PUT', body: JSON.stringify({ current_page: page }) });
        toast('Progresso salvo!', 'success');
    } catch (e) { toast(e.message, 'error'); }
}

async function addHighlight(bookId) {
    const text = document.getElementById('hl-text').value.trim();
    const page = parseInt(document.getElementById('hl-page').value);
    const color = document.getElementById('hl-color').value;
    if (!text) { toast('Insira o texto grifado.', 'warning'); return; }
    try {
        const h = await api(`/books/${bookId}/highlights`, { method: 'POST', body: JSON.stringify({ page_number: page, selected_text: text, color }) });
        document.getElementById('hl-text').value = '';
        toast('Grifo salvo!', 'success');
        openBookReader(bookId);
    } catch (e) { toast(e.message, 'error'); }
}

async function addAnnotation(bookId) {
    const text = document.getElementById('ann-text').value.trim();
    const page = parseInt(document.getElementById('ann-page').value);
    if (!text) { toast('Insira a anotação.', 'warning'); return; }
    try {
        await api(`/books/${bookId}/annotations`, { method: 'POST', body: JSON.stringify({ page_number: page, note_text: text }) });
        document.getElementById('ann-text').value = '';
        toast('Anotação salva!', 'success');
        openBookReader(bookId);
    } catch (e) { toast(e.message, 'error'); }
}

async function deleteNote(id, type) {
    try {
        const path = type === 'highlight' ? `/books/highlights/${id}` : `/books/annotations/${id}`;
        await api(path, { method: 'DELETE' });
        document.getElementById(`item-${id}`)?.remove();
        toast('Removido.', 'success');
    } catch (e) { toast(e.message, 'error'); }
}

// ── FLASHCARDS ────────────────────────────────────
async function showFlashcards() {
    setActive('menu-flashcards');
    setPage('Flashcards', 'Revisão espaçada');
    const [cards, stats] = await Promise.all([
        api('/flashcards/').catch(() => []),
        api('/flashcards/stats').catch(() => null)
    ]);
    renderFlashcards(cards, stats);
}

function renderFlashcards(cards, stats) {
    const due = cards.filter(c => c.is_due);
    document.getElementById('mainContent').innerHTML = `
    <div class="max-w-5xl mx-auto">
        <!-- Stats row -->
        ${stats ? `<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            ${statCard('fa-layer-group','Total de cards',stats.total_cards,'text-blue-500','bg-blue-50')}
            ${statCard('fa-clock','Para revisar hoje',stats.due_today,'text-amber-500','bg-amber-50')}
            ${statCard('fa-repeat','Total de revisões',stats.total_reviews,'text-purple-500','bg-purple-50')}
            ${statCard('fa-bullseye','Taxa de acerto',stats.overall_accuracy_pct != null ? `${stats.overall_accuracy_pct}%` : '—','text-green-500','bg-green-50')}
        </div>` : ''}

        <div class="flex items-center justify-between mb-4">
            <div class="flex gap-2">
                <button id="tab-all" onclick="filterCards('all')" class="section-tab active">Todos (${cards.length})</button>
                <button id="tab-due" onclick="filterCards('due')" class="section-tab">Para revisar (${due.length})</button>
            </div>
            <div class="flex gap-2">
                ${due.length > 0 ? `<button onclick="startReview()" class="bg-amber-500 hover:bg-amber-600 text-white text-sm font-semibold px-4 py-2 rounded-xl flex items-center gap-2 transition-colors">
                    <i class="fa-solid fa-play"></i> Revisar ${due.length} card${due.length>1?'s':''}
                </button>` : ''}
                <button onclick="openFlashcardModal()" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold px-4 py-2 rounded-xl flex items-center gap-2 transition-colors">
                    <i class="fa-solid fa-plus"></i> Novo card
                </button>
            </div>
        </div>

        <div id="fc-list" class="grid gap-3">
            ${renderCardList(cards)}
        </div>
    </div>`;

    window._fcAll = cards;
    window._fcDue = due;
}

function filterCards(type) {
    document.getElementById('tab-all').classList.toggle('active', type==='all');
    document.getElementById('tab-due').classList.toggle('active', type==='due');
    document.getElementById('fc-list').innerHTML = renderCardList(type==='all' ? window._fcAll : window._fcDue);
}

function renderCardList(cards) {
    if (cards.length === 0) return `<div class="col-span-full">${emptyState('fa-layer-group','Nenhum flashcard','Crie cards para revisar conceitos importantes com revisão espaçada.')}</div>`;
    return cards.map(c => {
        const acc = c.accuracy_pct != null ? `${c.accuracy_pct}%` : '—';
        const isDue = c.is_due;
        return `
        <div class="bg-white border ${isDue ? 'border-amber-200' : 'border-slate-100'} rounded-2xl p-5 group hover:shadow-sm transition-shadow">
            <div class="flex items-start justify-between gap-4">
                <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2 mb-2 flex-wrap">
                        ${c.subject_name ? `<span class="text-[10px] bg-blue-50 text-blue-600 font-bold px-2 py-0.5 rounded-md">${c.subject_name}</span>` : ''}
                        ${isDue ? `<span class="text-[10px] bg-amber-50 text-amber-700 font-bold px-2 py-0.5 rounded-md"><i class="fa-solid fa-clock mr-1"></i>Para revisar</span>` : ''}
                        ${c.tags ? c.tags.split(',').map(t=>`<span class="text-[10px] bg-slate-100 text-slate-500 px-2 py-0.5 rounded-md">${t.trim()}</span>`).join('') : ''}
                    </div>
                    <p class="text-sm font-semibold text-slate-800 line-clamp-1">${c.front}</p>
                    <p class="text-xs text-slate-400 mt-0.5 line-clamp-1">${c.back}</p>
                </div>
                <div class="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity flex-shrink-0">
                    <div class="text-right mr-3">
                        <p class="text-sm font-bold text-slate-700">${acc}</p>
                        <p class="text-[10px] text-slate-400">${c.total_reviews} rev.</p>
                    </div>
                    <button onclick="openFlashcardModal('${c.id}')" class="p-2 rounded-lg hover:bg-slate-100 text-slate-400 hover:text-blue-600 transition-colors">
                        <i class="fa-solid fa-pen text-xs"></i>
                    </button>
                    <button onclick="deleteFlashcard('${c.id}')" class="p-2 rounded-lg hover:bg-red-50 text-slate-400 hover:text-red-600 transition-colors">
                        <i class="fa-solid fa-trash text-xs"></i>
                    </button>
                </div>
            </div>
        </div>`;
    }).join('');
}

function openFlashcardModal(id = null) {
    editingFlashcardId = id;
    const subjectOpts = subjects.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
    openModal(`
    <div class="flex items-center justify-between mb-6">
        <h3 class="text-lg font-bold text-slate-800">${id ? 'Editar' : 'Novo'} Flashcard</h3>
        <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark text-lg"></i></button>
    </div>
    <form onsubmit="saveFlashcard(event)">
        <div class="form-group">
            <label class="form-label">Frente (pergunta/conceito) *</label>
            <textarea id="fc-front" rows="3" class="form-input resize-none" required placeholder="O que é...? Defina..."></textarea>
        </div>
        <div class="form-group">
            <label class="form-label">Verso (resposta/explicação) *</label>
            <textarea id="fc-back" rows="3" class="form-input resize-none" required placeholder="A resposta ou definição..."></textarea>
        </div>
        <div class="grid grid-cols-2 gap-3">
            <div class="form-group">
                <label class="form-label">Matéria</label>
                <select class="form-select" id="fc-subject">
                    <option value="">Nenhuma</option>
                    ${subjectOpts}
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Tags</label>
                <input class="form-input" id="fc-tags" placeholder="tag1, tag2">

        </div>
        <div class="flex gap-3 mt-2">
            <button type="button" onclick="closeModal()" class="flex-1 py-2.5 rounded-xl border border-slate-200 text-sm font-semibold text-slate-600 hover:bg-slate-50 transition-colors">Cancelar</button>
            <button type="submit" class="flex-1 py-2.5 rounded-xl bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold transition-colors">Salvar</button>
        </div>
    </form>`);

    if (id) {
        api(`/flashcards/${id}`).then(c => {
            document.getElementById('fc-front').value = c.front;
            document.getElementById('fc-back').value = c.back;
            document.getElementById('fc-subject').value = c.subject_id || '';
            document.getElementById('fc-tags').value = c.tags || '';
        });
    }
}

async function saveFlashcard(e) {
    e.preventDefault();
    const data = {
        front: document.getElementById('fc-front').value.trim(),
        back: document.getElementById('fc-back').value.trim(),
        subject_id: document.getElementById('fc-subject').value || null,
        tags: document.getElementById('fc-tags').value.trim() || null,
    };
    try {
        if (editingFlashcardId) {
            await api(`/flashcards/${editingFlashcardId}`, { method: 'PUT', body: JSON.stringify(data) });
            toast('Flashcard atualizado!', 'success');
        } else {
            await api('/flashcards/', { method: 'POST', body: JSON.stringify(data) });
            toast('Flashcard criado!', 'success');
        }
        closeModal();
        showFlashcards();
    } catch (e) { toast(e.message, 'error'); }
}

async function deleteFlashcard(id) {
    if (!confirm('Excluir este flashcard e todo o histórico de revisões?')) return;
    try {
        await api(`/flashcards/${id}`, { method: 'DELETE' });
        toast('Flashcard excluído.', 'success');
        showFlashcards();
    } catch (e) { toast(e.message, 'error'); }
}

// Review mode
async function startReview() {
    reviewQueue = [...window._fcDue];
    reviewIndex = 0;
    if (reviewQueue.length === 0) { toast('Nenhum card para revisar!', 'info'); return; }
    showReviewCard();
}

function showReviewCard() {
    if (reviewIndex >= reviewQueue.length) {
        document.getElementById('mainContent').innerHTML = `
        <div class="max-w-lg mx-auto text-center py-20">
            <div class="w-20 h-20 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fa-solid fa-trophy text-green-500 text-3xl"></i>
            </div>
            <h3 class="text-2xl font-black text-slate-800 mb-2">Revisão concluída!</h3>
            <p class="text-slate-500 mb-8">Você revisou ${reviewQueue.length} flashcard${reviewQueue.length>1?'s':''}.</p>
            <button onclick="showFlashcards()" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-8 py-3 rounded-xl transition-colors">Ver todos os cards</button>
        </div>`;
        loadFlashcardBadge();
        return;
    }

    const card = reviewQueue[reviewIndex];
    const progress = Math.round((reviewIndex / reviewQueue.length) * 100);

    document.getElementById('mainContent').innerHTML = `
    <div class="max-w-2xl mx-auto">
        <div class="flex items-center gap-4 mb-6">
            <button onclick="showFlashcards()" class="text-slate-400 hover:text-slate-700"><i class="fa-solid fa-arrow-left"></i></button>
            <div class="flex-1">
                <div class="flex justify-between text-xs text-slate-500 mb-1">
                    <span>Card ${reviewIndex+1} de ${reviewQueue.length}</span>
                    <span>${progress}%</span>
                </div>
                <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
            </div>
        </div>

        ${card.subject_name ? `<p class="text-center text-xs font-bold text-blue-500 uppercase tracking-widest mb-3">${card.subject_name}</p>` : ''}

        <div class="card-scene mb-6" style="height:220px">
            <div class="card-flip" id="review-card" style="height:100%">
                <div class="card-face bg-white border-2 border-slate-100 shadow-sm" style="border-radius:20px">
                    <div class="text-center p-8">
                        <p class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-4">Pergunta</p>
                        <p class="text-lg font-semibold text-slate-800">${card.front}</p>
                    </div>
                </div>
                <div class="card-face card-back bg-blue-600" style="border-radius:20px">
                    <div class="text-center p-8">
                        <p class="text-[11px] font-bold text-blue-200 uppercase tracking-widest mb-4">Resposta</p>
                        <p class="text-lg font-semibold text-white">${card.back}</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="text-center mb-6">
            <button onclick="flipCard()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold px-6 py-2.5 rounded-xl text-sm transition-colors">
                <i class="fa-solid fa-rotate mr-2"></i>Virar card
            </button>
        </div>

        <div id="confidence-section" class="hidden">
            <p class="text-center text-sm font-semibold text-slate-600 mb-4">Como você se saiu?</p>
            <div class="grid grid-cols-5 gap-2">
                ${[
                    {v:1, label:'Nada', color:'bg-red-500 hover:bg-red-600'},
                    {v:2, label:'Pouco', color:'bg-orange-500 hover:bg-orange-600'},
                    {v:3, label:'Regular', color:'bg-yellow-500 hover:bg-yellow-600'},
                    {v:4, label:'Bem', color:'bg-lime-500 hover:bg-lime-600'},
                    {v:5, label:'Perfeito', color:'bg-green-500 hover:bg-green-600'},
                ].map(opt => `
                <button onclick="submitReview('${card.id}',${opt.v})"
                    class="${opt.color} text-white font-bold py-3 rounded-xl text-xs transition-colors">
                    ${opt.label}
                </button>`).join('')}
            </div>
        </div>
    </div>`;
}

function flipCard() {
    const card = document.getElementById('review-card');
    card.classList.toggle('flipped');
    document.getElementById('confidence-section').classList.remove('hidden');
}

async function submitReview(cardId, confidence) {
    try {
        await api(`/flashcards/${cardId}/review`, {
            method: 'POST',
            body: JSON.stringify({ is_correct: confidence >= 3, confidence })
        });
        reviewIndex++;
        showReviewCard();
    } catch (e) { toast(e.message, 'error'); }
}

            </div>
        </div>

        <div class="bg-white rounded-2xl border border-slate-100 p-6">
            <h3 class="text-sm font-bold text-slate-700 mb-4">Tarefas da sessão</h3>
            <div id="task-list" class="space-y-2 mb-3"></div>
            <div class="flex gap-2">
                <input class="form-input flex-1 text-sm" id="task-input" placeholder="Adicionar tarefa..." onkeydown="if(event.key==='Enter'){event.preventDefault();addTask()}">
                <button onclick="addTask()" class="bg-slate-100 hover:bg-slate-200 text-slate-600 px-4 py-2 rounded-xl text-sm font-semibold transition-colors">Adicionar</button>
            </div>
        </div>

        <button onclick="saveSession()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-2xl text-sm flex items-center justify-center gap-2 transition-colors">
            <i class="fa-solid fa-floppy-disk"></i> Salvar Sessão
        </button>
    </div>`;
}

function toggleTimer() {
    timerRunning = !timerRunning;
    if (timerRunning) {
        timerInterval = setInterval(() => {
            timerSeconds++;
            const h = String(Math.floor(timerSeconds/3600)).padStart(2,'0');
            const m = String(Math.floor((timerSeconds%3600)/60)).padStart(2,'0');
            const s = String(timerSeconds%60).padStart(2,'0');
            document.getElementById('timer-display').textContent = `${h}:${m}:${s}`;
        }, 1000);
        document.getElementById('timer-icon').className = 'fa-solid fa-pause';
        document.getElementById('timer-label').textContent = 'Pausar';
        document.getElementById('btn-timer').className = 'bg-amber-500 hover:bg-amber-600 text-white font-bold px-8 py-3 rounded-xl flex items-center gap-2 transition-colors';
    } else {
        clearInterval(timerInterval);
        document.getElementById('timer-icon').className = 'fa-solid fa-play';
        document.getElementById('timer-label').textContent = 'Retomar';
        document.getElementById('btn-timer').className = 'bg-blue-600 hover:bg-blue-700 text-white font-bold px-8 py-3 rounded-xl flex items-center gap-2 transition-colors';
    }
}

function resetTimer() {
    clearInterval(timerInterval);
    timerRunning = false;
    timerSeconds = 0;
    document.getElementById('timer-display').textContent = '00:00:00';
    document.getElementById('timer-icon').className = 'fa-solid fa-play';
    document.getElementById('timer-label').textContent = 'Iniciar';
    document.getElementById('btn-timer').className = 'bg-blue-600 hover:bg-blue-700 text-white font-bold px-8 py-3 rounded-xl flex items-center gap-2 transition-colors';
}

function addTask() {
    const inp = document.getElementById('task-input');
    const desc = inp.value.trim();
    if (!desc) return;
    sessionTasks.push({ description: desc, is_done: false });
    inp.value = '';
    renderTaskList();
}

function toggleTask(i) {
    sessionTasks[i].is_done = !sessionTasks[i].is_done;
    renderTaskList();
}

function removeTask(i) {
    sessionTasks.splice(i, 1);
    renderTaskList();
}

function renderTaskList() {
    document.getElementById('task-list').innerHTML = sessionTasks.map((t, i) => `
    <div class="flex items-center gap-3 p-3 rounded-xl ${t.is_done ? 'bg-green-50' : 'bg-slate-50'}">
        <button onclick="toggleTask(${i})" class="w-5 h-5 rounded-md border-2 flex items-center justify-center flex-shrink-0 transition-colors ${t.is_done ? 'bg-green-500 border-green-500 text-white' : 'border-slate-300'}">
            ${t.is_done ? '<i class="fa-solid fa-check text-[10px]"></i>' : ''}
        </button>
        <span class="flex-1 text-sm ${t.is_done ? 'line-through text-slate-400' : 'text-slate-700'}">${t.description}</span>
        <button onclick="removeTask(${i})" class="text-slate-300 hover:text-red-500 transition-colors"><i class="fa-solid fa-xmark text-xs"></i></button>
    </div>`).join('');
}

async function saveSession() {
    const subjectId = document.getElementById('session-subject').value;
    if (!subjectId) { toast('Selecione uma matéria.', 'warning'); return; }
    if (timerSeconds === 0) { toast('Inicie o timer antes de salvar.', 'warning'); return; }

    const data = {
        subject_id: subjectId,
        duration_seconds: timerSeconds,
        total_questions: parseInt(document.getElementById('session-total').value) || 0,
        correct_answers: parseInt(document.getElementById('session-correct').value) || 0,
        tasks: sessionTasks,
    };
    try {
        await api('/sessions/', { method: 'POST', body: JSON.stringify(data) });
        toast('Sessão salva com sucesso!', 'success');
        resetTimer();
        sessionTasks = [];
        renderTaskList();
        document.getElementById('session-total').value = '0';
        document.getElementById('session-correct').value = '0';
    } catch (e) { toast(e.message, 'error'); }
}

// ── HISTORY ───────────────────────────────────────
async function showHistory() {
    setActive('menu-historico');
    setPage('Histórico', 'Registro de todas as sessões');
    const history = await api('/sessions/history').catch(() => []);

    const totalH = fmtDuration(history.reduce((a, s) => a + s.duration_seconds, 0));
    const totalQ = history.reduce((a, s) => a + s.total_questions, 0);
    const totalC = history.reduce((a, s) => a + s.correct_answers, 0);
    const acc = totalQ > 0 ? Math.round(totalC/totalQ*100) : 0;

    document.getElementById('mainContent').innerHTML = `
    <div class="max-w-4xl mx-auto">
        <div class="flex items-center justify-between mb-4">
            <h2 class="sr-only">Histórico</h2>
            ${history.length > 0 ? `
            <button onclick="exportHistoryPdf()" class="ml-auto flex items-center gap-2 bg-slate-900 hover:bg-slate-700 text-white text-sm font-semibold px-4 py-2 rounded-lg transition-colors">
                <i class="fa-solid fa-file-pdf"></i> Exportar PDF
            </button>` : ''}
        </div>
        <div class="grid grid-cols-3 gap-4 mb-6">
            ${statCard('fa-clock','Tempo total',totalH,'text-blue-500','bg-blue-50')}
            ${statCard('fa-list','Sessões',history.length,'text-purple-500','bg-purple-50')}
            ${statCard('fa-bullseye','Taxa de acerto',totalQ>0?`${acc}%`:'—','text-green-500','bg-green-50')}
        </div>
        ${history.length === 0 ? emptyState('fa-clock-rotate-left','Nenhuma sessão','Registre sua primeira sessão de estudo.') :
        `<div class="bg-white rounded-2xl border border-slate-100 overflow-hidden">
            <table class="w-full text-sm">
                <thead class="bg-slate-50 border-b border-slate-100">
                    <tr class="text-left">
                        <th class="px-5 py-3 text-xs font-bold text-slate-500 uppercase tracking-wider">Matéria</th>
                        <th class="px-5 py-3 text-xs font-bold text-slate-500 uppercase tracking-wider">Data</th>
                        <th class="px-5 py-3 text-xs font-bold text-slate-500 uppercase tracking-wider">Duração</th>
                        <th class="px-5 py-3 text-xs font-bold text-slate-500 uppercase tracking-wider">Questões</th>
                        <th class="px-5 py-3 text-xs font-bold text-slate-500 uppercase tracking-wider">Acerto</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-50">
                    ${history.map(s => {
                        const a = s.total_questions > 0 ? Math.round(s.correct_answers/s.total_questions*100) : null;
                        return `<tr class="hover:bg-slate-50 transition-colors">
                            <td class="px-5 py-4 font-semibold text-slate-800">${s.subject_name}</td>
                            <td class="px-5 py-4 text-slate-500">${fmtDate(s.start_time)}</td>
                            <td class="px-5 py-4 font-mono text-slate-700">${fmtDuration(s.duration_seconds)}</td>
                            <td class="px-5 py-4 text-slate-500">${s.total_questions > 0 ? `${s.correct_answers}/${s.total_questions}` : '—'}</td>
                            <td class="px-5 py-4">${a != null ? `<span class="font-bold ${a>=70?'text-green-600':a>=50?'text-yellow-600':'text-red-500'}">${a}%</span>` : '—'}</td>
                        </tr>`;
                    }).join('')}
                </tbody>
            </table>
        </div>`}
    </div>`;
}

// ── PROFILE ───────────────────────────────────────
async function showProfile() {
    setActive('menu-perfil');
    setPage('Meu Perfil', 'Informações e configurações');
    const u = me;
    document.getElementById('mainContent').innerHTML = `
    <div class="max-w-2xl mx-auto space-y-5">
        <div class="bg-white rounded-2xl border border-slate-100 p-6">
            <div class="flex items-center gap-5 mb-6">
                <div class="relative group">
                    ${u.photo_url
                        ? `<img src="${u.photo_url}" class="w-16 h-16 rounded-2xl object-cover border border-slate-200" onerror="this.outerHTML='<div class=\\'w-16 h-16 bg-blue-100 rounded-2xl flex items-center justify-center\\'><span class=\\'text-2xl font-black text-blue-600\\'>${u.full_name.charAt(0).toUpperCase()}</span></div>'">`
                        : `<div class="w-16 h-16 bg-blue-100 rounded-2xl flex items-center justify-center"><span class="text-2xl font-black text-blue-600">${u.full_name.charAt(0).toUpperCase()}</span></div>`}
                    <button onclick="openPhotoModal()" class="absolute -bottom-1 -right-1 w-7 h-7 bg-slate-900 hover:bg-slate-700 text-white rounded-full flex items-center justify-center shadow-md transition-colors" title="Alterar foto">
                        <i class="fa-solid fa-camera text-[10px]"></i>
                    </button>
                </div>
                <div>
                    <p class="text-lg font-bold text-slate-800">${u.full_name}</p>
                    <p class="text-sm text-slate-400">${u.email}</p>
                    <span class="inline-block mt-1 text-[11px] font-bold px-2.5 py-0.5 rounded-full ${u.role==='admin' ? 'bg-amber-100 text-amber-700' : 'bg-blue-50 text-blue-600'}">${u.role==='admin'?'Administrador':'Estudante'}</span>
                </div>
            </div>
            <form onsubmit="saveProfile(event)" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div class="form-group mb-0">
                        <label class="form-label">Nome completo</label>
                        <input class="form-input" id="p-name" value="${u.full_name||''}">
                    </div>
                    <div class="form-group mb-0">
                        <label class="form-label">Curso</label>
                        <input class="form-input" id="p-curso" value="${u.curso||''}" placeholder="Ex: Direito">
                    </div>
                </div>
                <div class="grid grid-cols-3 gap-4">
                    <div class="form-group mb-0">
                        <label class="form-label">Período atual</label>
                        <input type="number" class="form-input" id="p-period" value="${u.current_period||''}" min="1" max="12">
                    </div>
                    <div class="form-group mb-0">
                        <label class="form-label">Total de períodos</label>
                        <input type="number" class="form-input" id="p-total" value="${u.total_periods||''}" min="1" max="12">
                    </div>
                    <div class="form-group mb-0">
                        <label class="form-label">Previsão de conclusão</label>
                        <input class="form-input" id="p-estimate" value="${u.completion_estimate||''}" placeholder="Ex: Dez/2027">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="form-group mb-0">
                        <label class="form-label">Telefone</label>
                        <input class="form-input" id="p-phone" value="${u.phone||''}" placeholder="(11) 99999-0000">
                    </div>
                    <div class="form-group mb-0">
                        <label class="form-label">CPF</label>
                        <input class="form-input" id="p-cpf" value="${u.cpf||''}" placeholder="000.000.000-00" ${u.cpf ? 'disabled' : ''}>
                        ${u.cpf ? '<p class="text-[11px] text-slate-400 mt-1">CPF não pode ser alterado</p>' : ''}
                    </div>
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl text-sm transition-colors">
                    <i class="fa-solid fa-floppy-disk mr-2"></i>Salvar alterações
                </button>
            </form>
        </div>

        <div class="bg-white rounded-2xl border border-slate-100 p-6">
            <h3 class="text-sm font-bold text-slate-700 mb-1">Conta</h3>
            <p class="text-xs text-slate-400 mb-4">E-mail: ${u.email}</p>
            <button onclick="logout()" class="text-red-500 hover:text-red-700 text-sm font-semibold transition-colors flex items-center gap-2">
                <i class="fa-solid fa-arrow-right-from-bracket"></i> Sair do sistema
            </button>
        </div>
    </div>`;
}

function openPhotoModal() {
    openModal(`
    <div class="p-6">
        <h3 class="text-lg font-bold text-slate-800 mb-2">Foto de perfil</h3>
        <p class="text-xs text-slate-500 mb-4">Cole a URL de uma imagem (https://...) ou deixe em branco para remover.</p>
        <input id="photo-url-input" class="form-input w-full" placeholder="https://i.imgur.com/exemplo.jpg" value="${me.photo_url || ''}">
        <div class="flex gap-2 mt-4">
            <button onclick="closeModal()" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold py-2.5 rounded-xl text-sm transition-colors">Cancelar</button>
            <button onclick="savePhoto()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-xl text-sm transition-colors">Salvar</button>
        </div>
    </div>`);
}

async function savePhoto() {
    const url = document.getElementById('photo-url-input').value.trim();
    try {
        const updated = await api('/users/me/photo', { method: 'PUT', body: JSON.stringify({ photo_url: url || null }) });
        me = { ...me, ...updated };
        closeModal();
        showProfile();
        toast(url ? 'Foto atualizada!' : 'Foto removida.', 'success');
    } catch (e) { toast(e.message, 'error'); }
}

async function saveProfile(e) {
    e.preventDefault();
    const data = {
        full_name: document.getElementById('p-name').value.trim() || undefined,
        curso: document.getElementById('p-curso').value.trim() || null,
        current_period: parseInt(document.getElementById('p-period').value) || null,
        total_periods: parseInt(document.getElementById('p-total').value) || null,
        completion_estimate: document.getElementById('p-estimate').value.trim() || null,
        phone: document.getElementById('p-phone').value.trim() || null,
    };
    const cpfEl = document.getElementById('p-cpf');
    if (!cpfEl.disabled && cpfEl.value.trim()) data.cpf = cpfEl.value.trim();

    try {
        const updated = await api('/users/me/update', { method: 'PUT', body: JSON.stringify(data) });
        me = { ...me, ...updated };
        document.getElementById('userDisplayName').textContent = me.full_name;
        document.getElementById('sidebar-name').textContent = me.full_name;
        toast('Perfil atualizado!', 'success');
    } catch (e) { toast(e.message, 'error'); }
}

// ── Start ──────────────────────────────────────────
init();
</script>
</body>
</html>
