<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Law System — Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,700;9..144,900&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
/* ── Design tokens ────────────────────────────────────────── */
:root {
    --paper:       #f6f1e7;
    --paper-soft:  #ede5d2;
    --paper-warm:  #fbf7ee;
    --ink:         #0d1117;
    --ink-1:       #1a1f2b;
    --ink-2:       #2a2f3a;
    --ink-soft:    #4a5160;
    --ink-faint:   #6b6f7a;
    --line:        #d8cfb8;
    --line-soft:   #e7dfc8;
    --line-strong: #b9ad8f;
    --gold:        #b08b3e;
    --gold-soft:   #d4b76a;
    --gold-bg:     #f1e8cf;
    --emerald:     #1f5d3a;
    --emerald-bg:  #e0ebe1;
    --crimson:     #8b1538;
    --crimson-bg:  #f5dadf;
    --amber-bg:    #f7e8c4;
    --amber-ink:   #6b4f15;
    --plum:        #4a2a5c;
    --plum-bg:     #ecdef0;
}
* { font-family: 'IBM Plex Sans', sans-serif; -webkit-font-smoothing: antialiased; }
body {
    background: var(--paper);
    color: var(--ink);
    font-feature-settings: 'kern' 1, 'liga' 1, 'calt' 1;
}
.serif { font-family: 'Fraunces', Georgia, serif; }
.mono  { font-family: 'JetBrains Mono', monospace; font-feature-settings: 'tnum' 1; }

/* Editorial display */
.h-display { font-family: 'Fraunces', serif; font-weight: 400; letter-spacing: -.02em; line-height: 1.05; font-variation-settings: 'opsz' 144; }
.h-display em { font-style: italic; font-weight: 500; font-variation-settings: 'opsz' 144, 'WONK' 1; }
.eyebrow { font-size: 11px; font-weight: 600; letter-spacing: .18em; text-transform: uppercase; color: var(--ink-faint); }

/* Sidebar */
aside.sidebar {
    background: var(--ink);
    color: var(--paper);
    border-right: 1px solid #1f2533;
}
.sidebar-section { font-size: 10px; font-weight: 600; letter-spacing: .22em; text-transform: uppercase; color: #62687a; padding: 22px 18px 8px; }
.sidebar-link {
    display: flex; align-items: center; gap: 12px;
    padding: 9px 14px; margin: 0 6px; border-radius: 6px;
    font-size: 13.5px; font-weight: 400; color: #a8aab6;
    transition: color .15s, background .15s;
    text-decoration: none;
    border-left: 2px solid transparent;
}
.sidebar-link i { width: 18px; text-align: center; font-size: 13px; opacity: .75; }
.sidebar-link:hover { color: var(--paper); background: rgba(255,255,255,.04); }
.sidebar-active {
    color: var(--paper) !important;
    background: rgba(176,139,62,.10) !important;
    border-left-color: var(--gold) !important;
    margin-left: 0 !important;
    padding-left: 18px !important;
}
.sidebar-active i { color: var(--gold-soft); opacity: 1; }
.no-scrollbar::-webkit-scrollbar { display: none; }
.no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

/* Header */
.app-header { background: var(--paper-warm); border-bottom: 1px solid var(--line); }

/* Surfaces (paper-on-paper) */
.surface { background: var(--paper-warm); border: 1px solid var(--line); }
.surface-soft { background: rgba(255,255,255,.55); border: 1px solid var(--line-soft); }
.surface-ink { background: var(--ink); color: var(--paper); }

/* Toasts */
#toast-container { position:fixed; top:24px; right:24px; z-index:9999; display:flex; flex-direction:column; gap:8px; pointer-events:none; }
.toast { pointer-events:all; display:flex; align-items:flex-start; gap:12px; min-width:300px; max-width:420px; padding:14px 18px; font-size:13px; font-weight:500;
         background: var(--paper-warm); border:1px solid var(--line); border-left-width: 3px;
         box-shadow: 0 6px 28px rgba(13,17,23,.08); animation:slideIn .3s cubic-bezier(.34,1.56,.64,1); transition:opacity .35s, transform .35s; }
.toast.hide { opacity:0; transform:translateX(40px); }
.toast-success { border-left-color: var(--emerald); }
.toast-error   { border-left-color: var(--crimson); }
.toast-warning { border-left-color: var(--gold); }
.toast-info    { border-left-color: var(--plum); }
.toast-close { background:none; border:none; cursor:pointer; opacity:.45; font-size:14px; color:inherit; padding:0; margin-left:auto; }
.toast-close:hover { opacity:1; }
@keyframes slideIn { from { opacity:0; transform:translateX(36px); } to { opacity:1; transform:translateX(0); } }

/* Stat card (editorial: number first, label second, no border-radius) */
.stat-card {
    background: var(--paper-warm);
    border: 1px solid var(--line);
    padding: 20px 22px 22px;
    transition: border-color .2s;
    position: relative;
}
.stat-card:hover { border-color: var(--line-strong); }
.stat-card .stat-eyebrow { font-size: 10px; font-weight: 600; letter-spacing: .18em; text-transform: uppercase; color: var(--ink-faint); }
.stat-card .stat-value {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: 36px;
    line-height: 1;
    letter-spacing: -.02em;
    color: var(--ink);
    margin-top: 12px;
    font-variation-settings: 'opsz' 144;
}
.stat-card .stat-value em { font-style: italic; font-weight: 500; font-variation-settings: 'opsz' 144, 'WONK' 1; }
.stat-card .stat-icon { position: absolute; top: 18px; right: 18px; font-size: 14px; color: var(--ink-faint); opacity: .35; }

/* Section heading */
.section-head {
    display: flex; align-items: baseline; gap: 16px;
    padding-bottom: 12px; border-bottom: 1px solid var(--line);
    margin-bottom: 18px;
}
.section-head .title { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 500; letter-spacing: -.01em; color: var(--ink); }
.section-head .sub { font-size: 12px; color: var(--ink-faint); letter-spacing: .04em; }

/* Modal */
.modal-backdrop { position:fixed; inset:0; background:rgba(13,17,23,.6); z-index:1000; display:flex; align-items:center; justify-content:center; padding:16px; backdrop-filter: blur(3px); }
.modal-box { background: var(--paper-warm); border:1px solid var(--line-strong); padding:30px; width:100%; max-width:520px; max-height:90vh; overflow-y:auto; box-shadow: 0 24px 70px rgba(0,0,0,.25); }

/* Forms */
.form-input, .form-select {
    width: 100%; padding: 11px 14px;
    border: 1px solid var(--line-strong); background: var(--paper);
    color: var(--ink); font-size: 14px; outline: none;
    transition: border-color .15s, box-shadow .15s;
}
.form-input:focus, .form-select:focus { border-color: var(--ink); box-shadow: 0 0 0 3px rgba(13,17,23,.08); }
.form-select { cursor: pointer; }
.form-label { display: block; font-size: 10.5px; font-weight: 600; letter-spacing: .16em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 8px; }
.form-group { margin-bottom: 18px; }

/* Buttons */
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px;
       font-size: 13px; font-weight: 500; padding: 10px 18px; cursor: pointer;
       transition: background .15s, transform .12s, border-color .15s;
       border: 1px solid transparent; }
.btn:active { transform: translateY(1px); }
.btn-ink { background: var(--ink); color: var(--paper); }
.btn-ink:hover { background: var(--ink-1); }
.btn-gold { background: var(--gold); color: #1d1404; }
.btn-gold:hover { background: var(--gold-soft); }
.btn-ghost { background: transparent; color: var(--ink); border-color: var(--line-strong); }
.btn-ghost:hover { background: var(--paper-soft); }
.btn-danger { background: transparent; color: var(--crimson); border-color: var(--crimson); }
.btn-danger:hover { background: var(--crimson-bg); }

/* Badges (editorial: small caps + thin underline accent) */
.badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 10.5px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase;
    padding: 4px 10px; line-height: 1;
    border: 1px solid;
}
.badge-pendente   { background: var(--amber-bg);   color: var(--amber-ink); border-color: #e1cd99; }
.badge-em-curso   { background: var(--plum-bg);    color: var(--plum);      border-color: #d6b8df; }
.badge-concluida  { background: var(--emerald-bg); color: var(--emerald);   border-color: #b4cdb6; }
.badge-alta       { background: var(--crimson-bg); color: var(--crimson);   border-color: #e3b7c1; }
.badge-media      { background: var(--amber-bg);   color: var(--amber-ink); border-color: #e1cd99; }
.badge-baixa      { background: var(--emerald-bg); color: var(--emerald);   border-color: #b4cdb6; }

/* Flashcard flip */
.card-scene { perspective:1200px; }
.card-flip { position:relative; width:100%; transition:transform .55s cubic-bezier(.22,1,.36,1); transform-style:preserve-3d; }
.card-flip.flipped { transform: rotateY(180deg); }
.card-face { position:absolute; inset:0; backface-visibility:hidden; display:flex; flex-direction: column; align-items:center; justify-content:center;
             padding:28px; border:1px solid var(--line-strong); background: var(--paper-warm); }
.card-back { transform: rotateY(180deg); background: var(--ink); color: var(--paper); border-color: var(--ink); }

/* Progress bar */
.progress-bar { height: 4px; background: var(--line-soft); }
.progress-fill { height: 100%; background: var(--ink); transition: width .55s cubic-bezier(.65,0,.35,1); }

/* Timer */
.timer-display { font-family:'JetBrains Mono', monospace; font-size: 4rem; font-weight: 500; line-height: 1; letter-spacing: -.02em; color: var(--ink); }

/* Tabs */
.section-tab { padding: 8px 0; margin-right: 28px; font-size: 12px; font-weight: 600; letter-spacing: .14em; text-transform: uppercase;
               cursor: pointer; color: var(--ink-faint); border-bottom: 2px solid transparent; transition: color .15s, border-color .15s; background: none; border-top: none; border-left: none; border-right: none; }
.section-tab.active { color: var(--ink); border-bottom-color: var(--gold); }

/* Table */
.tbl { width: 100%; border-collapse: collapse; font-size: 13.5px; }
.tbl th { text-align: left; padding: 12px 16px; font-size: 10.5px; font-weight: 600; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-faint); border-bottom: 1px solid var(--line); }
.tbl td { padding: 14px 16px; border-bottom: 1px solid var(--line-soft); color: var(--ink); }
.tbl tr:last-child td { border-bottom: none; }
.tbl tr:hover td { background: rgba(176,139,62,.05); }

/* Avatar (initials) */
.avatar {
    display: inline-flex; align-items: center; justify-content: center;
    width: 36px; height: 36px;
    background: var(--gold-bg); color: var(--ink);
    font-family: 'Fraunces', serif; font-weight: 600; font-size: 14px;
    border: 1px solid var(--gold-soft);
}

/* Subtle paper grain on body */
.paper-grain-bg {
    background-color: var(--paper);
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' seed='3'/><feColorMatrix values='0 0 0 0 0.05  0 0 0 0 0.05  0 0 0 0 0.05  0 0 0 .025 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
}

@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } }
</style>
</head>
<body class="paper-grain-bg flex h-screen overflow-hidden">

<div id="toast-container"></div>

<!-- SIDEBAR -->
<aside class="sidebar w-60 flex flex-col flex-shrink-0">
    <div class="px-5 py-7" style="border-bottom: 1px solid #1f2533;">
        <div class="flex items-center gap-3">
            <div style="width:36px;height:36px;border:1px solid var(--gold-soft);color:var(--gold-soft);display:flex;align-items:center;justify-content:center;">
                <i class="fa-solid fa-scale-balanced text-sm"></i>
            </div>
            <div>
                <p class="serif text-[15px] font-semibold tracking-tight" style="color: var(--paper)">Law System</p>
                <p class="eyebrow mt-0.5" style="color:#62687a">Edição 2026</p>
            </div>
        </div>
    </div>

    <nav class="flex-1 py-3 overflow-y-auto no-scrollbar">
        <p class="sidebar-section">Visão geral</p>
        <a href="#" onclick="showDashboard()" id="menu-dash" class="sidebar-link">
            <i class="fa-solid fa-house"></i><span>Dashboard</span>
        </a>

        <p class="sidebar-section">Acervo</p>
        <a href="#" onclick="showSubjects()" id="menu-materias" class="sidebar-link">
            <i class="fa-solid fa-book-bookmark"></i><span>Matérias</span>
        </a>
        <a href="#" onclick="showTeachers()" id="menu-docentes" class="sidebar-link">
            <i class="fa-solid fa-chalkboard-user"></i><span>Docentes</span>
        </a>
        <a href="#" onclick="showBooks()" id="menu-livros" class="sidebar-link">
            <i class="fa-solid fa-book-open"></i><span>Livros</span>
        </a>

        <p class="sidebar-section">Estudo</p>
        <a href="#" onclick="showFlashcards()" id="menu-flashcards" class="sidebar-link">
            <i class="fa-solid fa-layer-group"></i><span>Flashcards</span>
            <span id="fc-due-badge" class="hidden ml-auto mono" style="background:var(--gold);color:#1d1404;font-size:10px;font-weight:600;padding:2px 6px;letter-spacing:0;"></span>
        </a>
        <a href="#" onclick="showSessions()" id="menu-sessoes" class="sidebar-link">
            <i class="fa-solid fa-stopwatch"></i><span>Sessões</span>
        </a>
        <a href="#" onclick="showHistory()" id="menu-historico" class="sidebar-link">
            <i class="fa-solid fa-chart-line"></i><span>Histórico</span>
        </a>

        <p class="sidebar-section">Conta</p>
        <a href="#" onclick="showProfile()" id="menu-perfil" class="sidebar-link">
            <i class="fa-solid fa-user"></i><span>Meu perfil</span>
        </a>
        <div id="admin-menu" class="hidden">
            <a href="admin.html" class="sidebar-link" style="color:var(--gold-soft)">
                <i class="fa-solid fa-shield-halved" style="color:var(--gold-soft)"></i><span>Painel admin</span>
            </a>
        </div>
    </nav>

    <div class="px-4 py-4" style="border-top: 1px solid #1f2533;">
        <div class="flex items-center gap-3 mb-3">
            <div class="avatar" style="background:#1f2533;color:var(--gold-soft);border-color:#2a2f3a;">
                <span id="sidebar-initial">—</span>
            </div>
            <div class="min-w-0 flex-1">
                <p id="sidebar-name" class="text-[13px] font-medium truncate" style="color:var(--paper)">—</p>
                <p id="sidebar-role" class="eyebrow truncate mt-0.5" style="color:#62687a">Estudante</p>
            </div>
        </div>
        <button onclick="logout()" class="w-full flex items-center gap-2 px-3 py-2 text-xs hover:bg-white/5 transition-colors" style="color:#a8aab6">
            <i class="fa-solid fa-arrow-right-from-bracket text-[11px]"></i>
            <span class="eyebrow">Sair</span>
        </button>
    </div>
</aside>

<!-- MAIN -->
<main class="flex-1 flex flex-col overflow-hidden">
    <header class="app-header px-10 py-5 flex items-center justify-between flex-shrink-0">
        <div>
            <p class="eyebrow" id="pageEyebrow">/ Visão geral</p>
            <h1 id="pageTitle" class="serif text-[28px] font-medium mt-0.5" style="color:var(--ink); letter-spacing:-.01em; line-height:1;">Dashboard</h1>
            <p id="pageSubtitle" class="text-[12.5px] mt-1.5" style="color:var(--ink-faint)">Bem-vindo de volta</p>
        </div>
        <div class="flex items-center gap-3">
            <div class="text-right">
                <p id="userDisplayName" class="text-[13px] font-medium" style="color:var(--ink)">—</p>
                <p id="userCurso" class="eyebrow mt-0.5" style="color:var(--gold)"></p>
            </div>
            <div class="avatar" id="headerAvatar">—</div>
        </div>
    </header>

    <section id="mainContent" class="flex-1 overflow-y-auto px-10 py-8 no-scrollbar"></section>
</main>

<!-- MODAL -->
<div id="modal" class="modal-backdrop hidden" onclick="if(event.target===this)closeModal()">
    <div class="modal-box" onclick="event.stopPropagation()">
        <div id="modal-content"></div>
    </div>
</div>

<script src="config.js"></script>
<script>
// ── State ──────────────────────────────────────────
const token = localStorage.getItem('access_token');
let me = null;
let subjects = [];
let teachers = [];
let timerInterval = null;
let timerSeconds = 0;
let timerRunning = false;
let sessionTasks = [];
let editingSubjectId = null;
let editingBookId = null;
let editingFlashcardId = null;
let currentBookId = null;
let currentBookPage = 1;
let reviewQueue = [];
let reviewIndex = 0;

if (!token) location.href = 'index.html';

// ── Toast ──────────────────────────────────────────
function toast(msg, type = 'info', duration = 3500) {
    const icons = { success:'circle-check', error:'circle-xmark', warning:'triangle-exclamation', info:'circle-info' };
    const el = document.createElement('div');
    el.className = `toast toast-${type}`;
    el.innerHTML = `<i class="fa-solid fa-${icons[type]} text-base flex-shrink-0"></i><span class="flex-1">${msg}</span><button class="toast-close" onclick="this.parentElement.remove()"><i class="fa-solid fa-xmark"></i></button>`;
    document.getElementById('toast-container').appendChild(el);
    setTimeout(() => { el.classList.add('hide'); setTimeout(() => el.remove(), 400); }, duration);
}

// ── Modal ──────────────────────────────────────────
function openModal(html) {
    document.getElementById('modal-content').innerHTML = html;
    document.getElementById('modal').classList.remove('hidden');
}
function closeModal() {
    document.getElementById('modal').classList.add('hidden');
}

// ── API helpers ───────────────────────────────────
async function api(path, opts = {}) {
    const res = await fetch(`${API_BASE}${path}`, {
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`, ...opts.headers },
        ...opts
    });
    if (res.status === 401) { localStorage.removeItem('access_token'); location.href = 'index.html'; return; }
    if (res.status === 204) return null;
    return res.json().then(d => { if (!res.ok) throw new Error(d.detail || `Erro ${res.status}`); return d; });
}

function setActive(id) {
    document.querySelectorAll('.sidebar-link').forEach(el => el.classList.remove('sidebar-active'));
    const el = document.getElementById(id);
    if (el) el.classList.add('sidebar-active');
    // ajusta page-eyebrow segundo a seção
    const eyebrows = {
        'menu-dash': '/ Visão geral',
        'menu-materias': '/ Acervo',
        'menu-docentes': '/ Acervo',
        'menu-livros': '/ Acervo',
        'menu-flashcards': '/ Estudo',
        'menu-sessoes': '/ Estudo',
        'menu-historico': '/ Estudo',
        'menu-perfil': '/ Conta',
    };
    const eb = document.getElementById('pageEyebrow');
    if (eb && eyebrows[id]) eb.textContent = eyebrows[id];
}

function setPage(title, subtitle = '', eyebrow = '') {
    document.getElementById('pageTitle').textContent = title;
    document.getElementById('pageSubtitle').textContent = subtitle;
    const eb = document.getElementById('pageEyebrow');
    if (eb) eb.textContent = eyebrow || `/ ${title}`;
}

function getInitials(name) {
    if (!name) return '—';
    const parts = name.trim().split(/\s+/).filter(Boolean);
    if (!parts.length) return '—';
    if (parts.length === 1) return parts[0].slice(0,2).toUpperCase();
    return (parts[0][0] + parts[parts.length-1][0]).toUpperCase();
}

function fmtDuration(s) {
    const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
    if (h > 0) return `${h}h ${m}m`;
    if (m > 0) return `${m}m ${sec}s`;
    return `${sec}s`;
}
function fmtDate(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleDateString('pt-BR', { day:'2-digit', month:'short', year:'numeric' });
}

// ── Init ──────────────────────────────────────────
async function init() {
    try {
        me = await api('/users/me');
        const initials = getInitials(me.full_name);
        document.getElementById('userDisplayName').textContent = me.full_name;
        document.getElementById('sidebar-name').textContent = me.full_name;
        document.getElementById('sidebar-initial').textContent = initials;
        document.getElementById('headerAvatar').textContent = initials;
        document.getElementById('userCurso').textContent = me.curso || '';
        document.getElementById('sidebar-role').textContent = me.role === 'admin' ? 'Administrador' : (me.curso || 'Estudante');
        if (me.role === 'admin') document.getElementById('admin-menu').classList.remove('hidden');
        subjects = await api('/subjects/');
        teachers = await api('/teachers/');
        loadFlashcardBadge();
        showDashboard();
    } catch (e) {
        toast('Erro ao carregar dados. ' + e.message, 'error');
    }
}

async function loadFlashcardBadge() {
    try {
        const due = await api('/flashcards/due');
        const badge = document.getElementById('fc-due-badge');
        if (due.length > 0) {
            badge.textContent = due.length > 99 ? '99+' : due.length;
            badge.classList.remove('hidden');
        }
    } catch {}
}

function logout() {
    localStorage.removeItem('access_token');
    location.href = 'index.html';
}

async function exportHistoryPdf() {
    try {
        const res = await fetch(`${API_BASE}/sessions/report/pdf`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!res.ok) { toast('Erro ao gerar PDF.', 'error'); return; }
        const blob = await res.blob();
        const disp = res.headers.get('content-disposition') || '';
        const match = disp.match(/filename\*?=(?:UTF-8'')?["']?([^"';]+)["']?/i);
        const fname = match ? decodeURIComponent(match[1]) : `Historico - ${me.full_name}.pdf`;
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = fname; a.click();
        URL.revokeObjectURL(url);
    } catch (e) { toast('Erro ao exportar PDF: ' + e.message, 'error'); }
}

function renderDashboardCharts(stats) {
    if (_activityChart) { _activityChart.destroy(); _activityChart = null; }
    if (_subjectsChart) { _subjectsChart.destroy(); _subjectsChart = null; }

    const INK = '#0d1117', INK_FAINT = '#6b6f7a', LINE = '#e7dfc8';
    Chart.defaults.font.family = "'IBM Plex Sans', sans-serif";
    Chart.defaults.color = INK_FAINT;

    const actCanvas = document.getElementById('activityChart');
    if (actCanvas) {
        const labels = stats.last_30_days.map(d => {
            const dt = new Date(d.date + 'T00:00:00');
            return `${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')}`;
        });
        _activityChart = new Chart(actCanvas, {
            type: 'bar',
            data: {
                labels,
                datasets: [{
                    label: 'Minutos',
                    data: stats.last_30_days.map(d => d.minutes),
                    backgroundColor: '#0d1117',
                    hoverBackgroundColor: '#b08b3e',
                    borderRadius: 0,
                    maxBarThickness: 10,
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: INK, titleFont: { weight: '500' }, padding: 10, borderRadius: 0,
                        cornerRadius: 0,
                        callbacks: { label: (c) => `${c.parsed.y} min` }
                    }
                },
                scales: {
                    y: { beginAtZero: true, ticks: { font: { size: 10, family: "'JetBrains Mono', monospace" }, color: INK_FAINT }, grid: { color: LINE, drawTicks: false }, border: { display: false } },
                    x: { ticks: { font: { size: 9, family: "'JetBrains Mono', monospace" }, color: INK_FAINT, maxRotation: 0, autoSkip: true, maxTicksLimit: 10 }, grid: { display: false }, border: { color: LINE } }
                }
            }
        });
    }

    const subjCanvas = document.getElementById('subjectsChart');
    if (subjCanvas && stats.by_subject.length > 0) {
        // Paleta editorial: tons quentes de terra + ink. Evita o circo arco-íris.
        const palette = ['#0d1117', '#b08b3e', '#8b1538', '#1f5d3a', '#4a2a5c', '#6b4f15', '#a8aab6', '#d4b76a'];
        _subjectsChart = new Chart(subjCanvas, {
            type: 'doughnut',
            data: {
                labels: stats.by_subject.map(b => b.name),
                datasets: [{
                    data: stats.by_subject.map(b => b.minutes),
                    backgroundColor: stats.by_subject.map((_, i) => palette[i % palette.length]),
                    borderWidth: 2, borderColor: '#fbf7ee',
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false, cutout: '64%',
                plugins: {
                    legend: { position: 'bottom', labels: { font: { size: 11 }, color: INK, boxWidth: 8, boxHeight: 8, padding: 10, usePointStyle: true, pointStyle: 'rect' } },
                    tooltip: {
                        backgroundColor: INK, padding: 10, borderRadius: 0, cornerRadius: 0,
                        callbacks: { label: (ctx) => ` ${ctx.label}: ${ctx.parsed} min` }
                    }
                }
            }
        });
    }
}

function formatMinutes(min) {
    const h = Math.floor(min/60);
    const m = min % 60;
    if (h >= 1) return `${h}h ${m}m`;
    return `${m}m`;
}

function fmtShortDate(iso) {
    const d = new Date(iso + 'T00:00:00');
    return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`;
}

/* Editorial stat card — number first, label second, no icon noise */
function editorialStat(icon, label, valueHtml) {
    return `<div class="stat-card" style="border-right:1px solid var(--line); border-bottom:1px solid var(--line); margin:-1px;">
        <i class="fa-solid ${icon} stat-icon"></i>
        <p class="stat-eyebrow">${label}</p>
        <p class="stat-value">${valueHtml}</p>
    </div>`;
}

/* Legacy statCard — wrapper pra compatibilidade com chamadas existentes */
function statCard(icon, label, value) {
    return editorialStat(icon, label, `<span class="serif">${value}</span>`);
}

function formatHours(secs) {
    const h = Math.floor(secs/3600);
    const m = Math.floor((secs%3600)/60);
    if (h >= 1) return `${h}h ${m}m`;
    return `${m}m`;
}

function emptyState(icon, title, msg) {
    return `<div class="text-center py-12">
        <i class="fa-solid ${icon} text-[28px] mb-4" style="color:var(--ink-faint); opacity:.35"></i>
        <p class="serif text-[17px] font-medium" style="color:var(--ink)">${title}</p>
        <p class="text-[12.5px] mt-1.5" style="color:var(--ink-faint)">${msg}</p>
    </div>`;
}

function loadingBlock() {
    return `<div class="flex items-center justify-center h-32"><i class="fa-solid fa-circle-notch fa-spin text-2xl" style="color:var(--ink-faint)"></i></div>`;
}

async function updateSubjectStatus(id, status) {

        renderSubjects();
        toast(`Status atualizado para "${status}"`, 'success');

function openSubjectModal(id = null) {

                <label class="form-label">Sigla</label>
                <input class="form-input" id="s-sigla" value="${s?.sigla||''}" placeholder="Ex.: DIR_CIV">

            <div class="form-group">
                <label class="form-label">Prioridade</label>
                <select class="form-select" id="s-priority">
                    <option value="Alta" ${s?.priority==='Alta'?'selected':''}>Alta</option>
                    <option value="Média" ${!s||s?.priority==='Média'?'selected':''}>Média</option>
                    <option value="Baixa" ${s?.priority==='Baixa'?'selected':''}>Baixa</option>
                </select>
            </div>

                <label class="form-label">Professor</label>
                <select class="form-select" id="s-teacher" onchange="toggleNoTeacher(this.value)">
                    <option value="">Selecione…</option>
                    ${teacherOpts}
                    <option value="NONE" ${s?.no_teacher?'selected':''}>Sem professor</option>
                </select>
            </div>
        </div>
        <div class="flex gap-3 mt-6">

        </div>
    </form>`);
}

async function saveSubject(e) {
    e.preventDefault();
    const teacherVal = document.getElementById('s-teacher').value;
    const no_teacher = teacherVal === 'NONE';
    const teacher_id = (!no_teacher && teacherVal) ? teacherVal : null;
    const data = {
        name: document.getElementById('s-name').value.trim(),
        sigla: document.getElementById('s-sigla').value.trim() || null,
        period: parseInt(document.getElementById('s-period').value),
        priority: document.getElementById('s-priority').value,
        no_teacher,
        teacher_id,
    };
    try {
        if (editingSubjectId) {
            await api(`/subjects/${editingSubjectId}`, { method: 'PUT', body: JSON.stringify(data) });
            toast('Matéria atualizada!', 'success');
        } else {
            await api('/subjects/', { method: 'POST', body: JSON.stringify(data) });
            toast('Matéria criada!', 'success');
        }
        subjects = await api('/subjects/');
        closeModal();
        renderSubjects();
    } catch (e) { toast(e.message, 'error'); }
}

async function deleteSubject(id, name) {
    if (!confirm(`Excluir "${name}"? Esta ação não pode ser desfeita.`)) return;
    try {
        await api(`/subjects/${id}`, { method: 'DELETE' });
        subjects = subjects.filter(s => s.id !== id);
        toast('Matéria excluída.', 'success');
        renderSubjects();
    } catch (e) { toast(e.message, 'error'); }
}

        renderTeachers();
    } catch (e) { toast(e.message, 'error'); }
}

async function deleteTeacher(id, name) {
    if (!confirm(`Excluir docente "${name}"?`)) return;
    try {
        await api(`/teachers/${id}`, { method: 'DELETE' });
        teachers = teachers.filter(t => t.id !== id);
        toast('Docente excluído.', 'success');
        renderTeachers();
    } catch (e) { toast(e.message, 'error'); }
}

// ── BOOKS ─────────────────────────────────────────
async function showBooks() {
    setActive('menu-livros');
    setPage('Livros', 'Sua biblioteca de estudo');
    const books = await api('/books/').catch(() => []);
    renderBooks(books);
}

/* Paleta editorial — tons de capa de livro encadernado */
const COVER_COLORS = ['#0d1117','#8b1538','#1f5d3a','#4a2a5c','#b08b3e','#6b4f15','#1e3a52'];

function renderBooks(books) {
    document.getElementById('mainContent').innerHTML = `
    <div class="max-w-5xl">
        <div class="flex items-baseline justify-between mb-8">
            <p class="eyebrow">${books.length === 1 ? '1 livro' : books.length + ' livros'}</p>
            <button onclick="openBookModal()" class="btn btn-ink">
                <i class="fa-solid fa-plus text-[11px]"></i> Adicionar livro
            </button>
        </div>
        ${books.length === 0 ? emptyState('fa-book-open', 'Sua biblioteca está vazia', 'Adicione PDFs com URL pública e estude com grifos e anotações.') :
        `<div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-7">
            ${books.map(b => {
                const color = b.cover_color || '#0d1117';
                const pct = b.progress_pct || 0;
                return `
                <div class="group cursor-pointer" onclick="openBookReader('${b.id}')">
                    <!-- Capa estilo lombada de livro -->
                    <div class="relative" style="aspect-ratio: 3/4; background:${color}; box-shadow: inset -8px 0 12px -8px rgba(0,0,0,.3), 0 2px 6px rgba(0,0,0,.1);">
                        <div class="absolute inset-0 flex items-center justify-center p-4 text-center">
                            <p class="serif text-[15px] font-medium text-white/95 leading-tight" style="letter-spacing:-.01em;">${b.name}</p>
                        </div>
                        <div class="absolute bottom-2 left-2 right-2 flex items-center justify-between">
                            <span class="mono text-[9px] tracking-widest text-white/60">${pct}%</span>
                            <span class="mono text-[9px] text-white/60">${b.current_page}/${b.total_pages}</span>
                        </div>
                        <div class="absolute top-2 right-2 flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity" onclick="event.stopPropagation()">
                            <button onclick="openBookModal('${b.id}')" class="w-6 h-6 bg-white/90 flex items-center justify-center text-[10px]" style="color:var(--ink)">
                                <i class="fa-solid fa-pen"></i>
                            </button>
                            <button onclick="deleteBook('${b.id}','${b.name.replace(/'/g,"\\'")}',event)" class="w-6 h-6 bg-white/90 flex items-center justify-center text-[10px]" style="color:var(--crimson)">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                        </div>
                    </div>
                    <div class="mt-3">
                        ${b.author ? `<p class="text-[12px] truncate" style="color:var(--ink-faint)">${b.author}</p>` : ''}
                        <div class="progress-bar mt-2"><div class="progress-fill" style="width:${pct}%"></div></div>
                    </div>
                </div>`;
            }).join('')}
        </div>`}
    </div>`;
}

function openBookModal(id = null) {
    editingBookId = id;
    const subjectOpts = subjects.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
    const colorPicker = COVER_COLORS.map(c => `
        <button type="button" onclick="selectColor('${c}',this)" data-color="${c}"
            class="color-btn" style="width:28px;height:28px;background:${c};border:2px solid transparent;transition:transform .15s, border-color .15s;cursor:pointer;"></button>`).join('');

    openModal(`
    <div class="flex items-baseline justify-between mb-7">
        <div>
            <p class="eyebrow" style="color:var(--gold)">/ ${id ? 'Editar' : 'Adicionar'}</p>
            <h3 class="serif text-[26px] font-medium mt-1" style="color:var(--ink); letter-spacing:-.01em;">Livro</h3>
        </div>
        <button onclick="closeModal()" style="color:var(--ink-faint)"><i class="fa-solid fa-xmark text-lg"></i></button>
    </div>
    <form onsubmit="saveBook(event)">
        <div class="form-group">
            <label class="form-label">Título</label>
            <input class="form-input" id="b-name" required placeholder="Título do livro">
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div class="form-group">
                <label class="form-label">Autor</label>
                <input class="form-input" id="b-author" placeholder="Autor">
            </div>
            <div class="form-group">
                <label class="form-label">Gênero</label>
                <input class="form-input" id="b-genre" placeholder="Ex.: Doutrina">
            </div>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div class="form-group">
                <label class="form-label">Total de páginas</label>
                <input type="number" class="form-input" id="b-pages" value="1" min="1">
            </div>
            <div class="form-group">
                <label class="form-label">Página atual</label>
                <input type="number" class="form-input" id="b-curpage" value="0" min="0">
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">URL do PDF</label>
            <input type="url" class="form-input" id="b-url" placeholder="https://...">
            <p class="text-[11px] mt-1.5" style="color:var(--ink-faint)">Link direto para um PDF público</p>
        </div>
        <div class="form-group">
            <label class="form-label">Matéria</label>
            <select class="form-select" id="b-subject">
                <option value="">Nenhuma</option>
                ${subjectOpts}
            </select>
        </div>
        <div class="form-group">
            <label class="form-label">Cor da capa</label>
            <div class="flex gap-2 flex-wrap mt-1" id="color-picker">${colorPicker}</div>
            <input type="hidden" id="b-color" value="${COVER_COLORS[0]}">
        </div>
        <div class="flex gap-3 mt-6">
            <button type="button" onclick="closeModal()" class="btn btn-ghost flex-1">Cancelar</button>
            <button type="submit" class="btn btn-ink flex-1">Salvar</button>
        </div>
    </form>`);

    // Pre-select first color
    selectColor(COVER_COLORS[0], document.querySelector('.color-btn'));

    if (id) {
        api(`/books/${id}`).then(b => {
            document.getElementById('b-name').value = b.name;
            document.getElementById('b-author').value = b.author || '';
            document.getElementById('b-genre').value = b.genre || '';
            document.getElementById('b-pages').value = b.total_pages;
            document.getElementById('b-curpage').value = b.current_page;
            document.getElementById('b-url').value = b.url || '';
            document.getElementById('b-subject').value = b.subject_id || '';
            if (b.cover_color) {
                const btn = document.querySelector(`.color-btn[data-color="${b.cover_color}"]`);
                if (btn) selectColor(b.cover_color, btn);
            }
        });
    }
}

function selectColor(color, btn) {
    document.querySelectorAll('.color-btn').forEach(b => { b.style.borderColor = 'transparent'; b.style.transform = ''; });
    btn.style.borderColor = 'var(--gold)';
    btn.style.transform = 'scale(1.15)';
    document.getElementById('b-color').value = color;
}

async function saveBook(e) {
    e.preventDefault();
    const data = {
        name: document.getElementById('b-name').value.trim(),
        author: document.getElementById('b-author').value.trim() || null,
        genre: document.getElementById('b-genre').value.trim() || null,
        total_pages: parseInt(document.getElementById('b-pages').value) || 1,
        current_page: parseInt(document.getElementById('b-curpage').value) || 0,
        url: document.getElementById('b-url').value.trim() || null,
        subject_id: document.getElementById('b-subject').value || null,
        cover_color: document.getElementById('b-color').value,
    };
    try {
        if (editingBookId) {
            await api(`/books/${editingBookId}`, { method: 'PUT', body: JSON.stringify(data) });
            toast('Livro atualizado!', 'success');
        } else {
            await api('/books/', { method: 'POST', body: JSON.stringify(data) });
            toast('Livro adicionado!', 'success');
        }
        closeModal();
        showBooks();
    } catch (e) { toast(e.message, 'error'); }
}

async function deleteBook(id, name, ev) {
    ev.stopPropagation();
    if (!confirm(`Excluir "${name}"? Grifos e anotações serão perdidos.`)) return;
    try {
        await api(`/books/${id}`, { method: 'DELETE' });
        toast('Livro excluído.', 'success');
        showBooks();
    } catch (e) { toast(e.message, 'error'); }
}

async function openBookReader(bookId) {
    currentBookId = bookId;
    const book = await api(`/books/${bookId}`).catch(() => null);
    if (!book) { toast('Livro não encontrado.', 'error'); return; }
    currentBookPage = book.current_page || 1;

    setActive('menu-livros');
    setPage(book.name, book.author || 'Leitor');

    const [annotations, highlights] = await Promise.all([
        api(`/books/${bookId}/annotations`).catch(() => []),
        api(`/books/${bookId}/highlights`).catch(() => []),
    ]);

    const hlBg = { yellow:'#fcf2bf', green:'#d8ecd9', blue:'#d4e3f5', pink:'#f5d4dd' };
    const hlIn = { yellow:'#7a5d00', green:'#1f5d3a', blue:'#1e3a52', pink:'#8b1538' };

    document.getElementById('mainContent').innerHTML = `
    <div class="h-full flex flex-col">
        <div class="flex items-center gap-5 mb-5">
            <button onclick="showBooks()" class="hover:opacity-100" style="color:var(--ink-faint); opacity:.7">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <div class="flex-1">
                <div class="flex justify-between mb-1.5">
                    <span class="eyebrow">Leitura</span>
                    <span class="mono text-[11px]" style="color:var(--ink-faint)">${book.progress_pct}% · pg. ${book.current_page}/${book.total_pages}</span>
                </div>
                <div class="progress-bar"><div class="progress-fill" style="width:${book.progress_pct}%"></div></div>
            </div>
            <button onclick="openBookModal('${bookId}')" class="btn btn-ghost text-[11px] py-2 px-3">
                <i class="fa-solid fa-gear text-[11px]"></i> Editar
            </button>
        </div>

        <div class="flex gap-6 flex-1 min-h-0">
            <div class="flex-1 surface overflow-hidden flex flex-col">
                ${book.url ? `
                <div class="px-4 py-2.5 flex items-center gap-3" style="border-bottom:1px solid var(--line); background:var(--paper-soft)">
                    <span class="eyebrow">PDF externo</span>
                    <a href="${book.url}" target="_blank" class="ml-auto text-[12px] hover:underline flex items-center gap-1.5" style="color:var(--gold)">
                        <i class="fa-solid fa-arrow-up-right-from-square text-[10px]"></i> Abrir em nova aba
                    </a>
                </div>
                <iframe src="${book.url}" class="flex-1 w-full" style="border:none; background:white"></iframe>` :
                `<div class="flex-1 flex flex-col items-center justify-center text-center p-10">
                    <i class="fa-solid fa-link text-[32px] mb-4" style="color:var(--ink-faint); opacity:.4"></i>
                    <p class="serif text-[20px] font-medium mb-1" style="color:var(--ink)">Nenhum PDF vinculado</p>
                    <p class="text-[13px] mb-6" style="color:var(--ink-faint)">Edite o livro e cole a URL de um PDF público.</p>
                    <button onclick="openBookModal('${bookId}')" class="btn btn-ink">
                        <i class="fa-solid fa-link text-[11px]"></i> Vincular PDF
                    </button>
                </div>`}
            </div>

            <div class="w-80 flex-shrink-0 flex flex-col gap-4">
                <div class="surface p-5">
                    <p class="eyebrow mb-3">Página atual</p>
                    <div class="flex items-center gap-3">
                        <input type="number" id="book-page-input" value="${book.current_page}" min="0" max="${book.total_pages}"
                            class="form-input mono text-center text-[16px]" style="width:90px; font-weight: 500;">
                        <span class="mono text-[13px]" style="color:var(--ink-faint)">/ ${book.total_pages}</span>
                        <button onclick="saveBookPage('${bookId}')" class="btn btn-ink ml-auto text-[11px] py-2 px-3">Salvar</button>
                    </div>
                </div>

                <div class="surface p-5">
                    <p class="eyebrow mb-3">Adicionar grifo</p>
                    <textarea id="hl-text" rows="2" class="form-input resize-none mb-2" placeholder="Cole o trecho grifado…"></textarea>
                    <div class="flex items-center gap-2">
                        <input type="number" id="hl-page" value="${book.current_page}" min="1" max="${book.total_pages}" class="form-input mono" style="width:64px">
                        <select id="hl-color" class="form-select flex-1">
                            <option value="yellow">Amarelo</option>
                            <option value="green">Verde</option>
                            <option value="blue">Azul</option>
                            <option value="pink">Rosa</option>
                        </select>
                        <button onclick="addHighlight('${bookId}')" class="btn btn-gold text-[11px] py-2 px-3">Grifar</button>
                    </div>
                </div>

                <div class="surface p-5">
                    <p class="eyebrow mb-3">Anotação</p>
                    <textarea id="ann-text" rows="3" class="form-input resize-none mb-2" placeholder="Sua anotação para esta página…"></textarea>
                    <div class="flex items-center gap-2">
                        <input type="number" id="ann-page" value="${book.current_page}" min="1" max="${book.total_pages}" class="form-input mono" style="width:64px">
                        <button onclick="addAnnotation('${bookId}')" class="btn btn-ink ml-auto text-[11px] py-2 px-3">Salvar</button>
                    </div>
                </div>

                <div class="surface p-5 flex-1 overflow-y-auto no-scrollbar">
                    <p class="eyebrow mb-3">Salvos (${annotations.length + highlights.length})</p>
                    ${[...highlights.map(h => ({...h,type:'highlight'})), ...annotations.map(a => ({...a,type:'annotation'}))]
                        .sort((a,b) => a.page_number - b.page_number)
                        .map(item => {
                            const isHL = item.type === 'highlight';
                            const bg = isHL ? (hlBg[item.color] || hlBg.yellow) : 'var(--paper-soft)';
                            const ink = isHL ? (hlIn[item.color] || hlIn.yellow) : 'var(--ink)';
                            return `
                            <div id="item-${item.id}" class="p-3 mb-2" style="background:${bg}; border-left: 2px solid ${ink};">
                                <div class="flex items-start justify-between gap-2 mb-1">

                                    <button onclick="deleteNote('${item.id}','${isHL ? 'highlight' : 'annotation'}')" style="color:${ink};opacity:.5">
                                        <i class="fa-solid fa-xmark text-[10px]"></i>
                                    </button>
                                </div>
                                <p class="text-[12.5px] leading-relaxed" style="color:var(--ink)">${isHL ? item.selected_text : item.note_text}</p>
                            </div>`;
                        }).join('') || '<p class="text-[12px]" style="color:var(--ink-faint)">Nenhum grifo ou anotação ainda.</p>'}
                </div>
            </div>
        </div>
    </div>`;
}

async function saveBookPage(bookId) {
    const page = parseInt(document.getElementById('book-page-input').value);
    try {
        await api(`/books/${bookId}`, { method: 'PUT', body: JSON.stringify({ current_page: page }) });
        toast('Progresso salvo!', 'success');
    } catch (e) { toast(e.message, 'error'); }
}

async function addHighlight(bookId) {
    const text = document.getElementById('hl-text').value.trim();
    const page = parseInt(document.getElementById('hl-page').value);
    const color = document.getElementById('hl-color').value;
    if (!text) { toast('Insira o texto grifado.', 'warning'); return; }
    try {
        const h = await api(`/books/${bookId}/highlights`, { method: 'POST', body: JSON.stringify({ page_number: page, selected_text: text, color }) });
        document.getElementById('hl-text').value = '';
        toast('Grifo salvo!', 'success');
        openBookReader(bookId);
    } catch (e) { toast(e.message, 'error'); }
}

async function addAnnotation(bookId) {
    const text = document.getElementById('ann-text').value.trim();
    const page = parseInt(document.getElementById('ann-page').value);
    if (!text) { toast('Insira a anotação.', 'warning'); return; }
    try {
        await api(`/books/${bookId}/annotations`, { method: 'POST', body: JSON.stringify({ page_number: page, note_text: text }) });
        document.getElementById('ann-text').value = '';
        toast('Anotação salva!', 'success');
        openBookReader(bookId);
    } catch (e) { toast(e.message, 'error'); }
}

async function deleteNote(id, type) {
    try {
        const path = type === 'highlight' ? `/books/highlights/${id}` : `/books/annotations/${id}`;
        await api(path, { method: 'DELETE' });
        document.getElementById(`item-${id}`)?.remove();
        toast('Removido.', 'success');
    } catch (e) { toast(e.message, 'error'); }
}

// ── FLASHCARDS ────────────────────────────────────
async function showFlashcards() {
    setActive('menu-flashcards');
    setPage('Flashcards', 'Revisão espaçada');
    const [cards, stats] = await Promise.all([
        api('/flashcards/').catch(() => []),
        api('/flashcards/stats').catch(() => null)
    ]);
    renderFlashcards(cards, stats);
}

function renderFlashcards(cards, stats) {
    const due = cards.filter(c => c.is_due);
    document.getElementById('mainContent').innerHTML = `
    <div class="max-w-5xl">
        ${stats ? `<div class="grid grid-cols-2 md:grid-cols-4 gap-0 mb-10" style="border:1px solid var(--line); margin:0;">
            ${editorialStat('fa-layer-group', 'Cards', `<span class="serif">${stats.total_cards}</span>`)}
            ${editorialStat('fa-clock', 'Hoje', `<span class="serif">${stats.due_today}</span>`)}
            ${editorialStat('fa-repeat', 'Revisões', `<span class="serif">${stats.total_reviews}</span>`)}
            ${editorialStat('fa-bullseye', 'Acerto', stats.overall_accuracy_pct != null ? `<span class="serif">${stats.overall_accuracy_pct}</span><span class="mono text-[16px] ml-1" style="color:var(--ink-faint)">%</span>` : '—')}
        </div>` : ''}

        <div class="flex items-center justify-between mb-6">
            <div class="flex">
                <button id="tab-all" onclick="filterCards('all')" class="section-tab active">Todos · ${cards.length}</button>
                <button id="tab-due" onclick="filterCards('due')" class="section-tab">Para revisar · ${due.length}</button>
            </div>
            <div class="flex gap-2">
                ${due.length > 0 ? `<button onclick="startReview()" class="btn btn-gold">
                    <i class="fa-solid fa-play text-[10px]"></i> Revisar ${due.length}
                </button>` : ''}
                <button onclick="openFlashcardModal()" class="btn btn-ink">
                    <i class="fa-solid fa-plus text-[11px]"></i> Novo card
                </button>
            </div>
        </div>

        <div id="fc-list">
            ${renderCardList(cards)}
        </div>
    </div>`;

    window._fcAll = cards;
    window._fcDue = due;
}

function filterCards(type) {
    document.getElementById('tab-all').classList.toggle('active', type==='all');
    document.getElementById('tab-due').classList.toggle('active', type==='due');
    document.getElementById('fc-list').innerHTML = renderCardList(type==='all' ? window._fcAll : window._fcDue);
}

function renderCardList(cards) {
    if (cards.length === 0) return emptyState('fa-layer-group', 'Nenhum flashcard', 'Crie cards para revisar conceitos com repetição espaçada.');
    return cards.map((c, i) => {
        const acc = c.accuracy_pct != null ? `${c.accuracy_pct}%` : '—';
        const isDue = c.is_due;
        return `
        <div class="flex items-start gap-5 py-5 group" style="border-bottom:1px solid var(--line-soft);">
            <span class="mono text-[11px]" style="color:var(--ink-faint); width:28px; padding-top:4px;">${String(i+1).padStart(2,'0')}</span>
            <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 mb-1.5 flex-wrap">
                    ${c.subject_name ? `<span class="eyebrow" style="color:var(--gold)">/ ${c.subject_name}</span>` : ''}
                    ${isDue ? `<span class="badge badge-pendente">Revisar</span>` : ''}
                    ${c.tags ? c.tags.split(',').map(t=>`<span class="mono text-[10px]" style="color:var(--ink-faint)">#${t.trim()}</span>`).join(' ') : ''}
                </div>
                <p class="serif text-[17px] font-medium" style="color:var(--ink); letter-spacing:-.005em;">${c.front}</p>
                <p class="text-[13px] mt-1 leading-relaxed" style="color:var(--ink-soft)">${c.back}</p>
            </div>
            <div class="flex items-start gap-3 flex-shrink-0">
                <div class="text-right">
                    <p class="mono text-[16px]" style="color:var(--ink)">${acc}</p>
                    <p class="text-[10px] mt-0.5 tracking-wider uppercase" style="color:var(--ink-faint)">${c.total_reviews} rev.</p>
                </div>
                <div class="flex items-start opacity-0 group-hover:opacity-100 transition-opacity">
                    <button onclick="openFlashcardModal('${c.id}')" class="p-2 hover:bg-black/5" style="color:var(--ink-faint)">
                        <i class="fa-solid fa-pen text-[11px]"></i>
                    </button>
                    <button onclick="deleteFlashcard('${c.id}')" class="p-2 hover:bg-black/5" style="color:var(--ink-faint)">
                        <i class="fa-solid fa-trash text-[11px]"></i>
                    </button>
                </div>
            </div>
        </div>`;
    }).join('');
}

function openFlashcardModal(id = null) {
    editingFlashcardId = id;
    const subjectOpts = subjects.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
    openModal(`

        </div>
        <div class="flex gap-3 mt-6">
            <button type="button" onclick="closeModal()" class="btn btn-ghost flex-1">Cancelar</button>
            <button type="submit" class="btn btn-ink flex-1">Salvar</button>
        </div>
    </form>`);

    if (id) {
        api(`/flashcards/${id}`).then(c => {
            document.getElementById('fc-front').value = c.front;
            document.getElementById('fc-back').value = c.back;
            document.getElementById('fc-subject').value = c.subject_id || '';
            document.getElementById('fc-tags').value = c.tags || '';
        });
    }
}

async function saveFlashcard(e) {
    e.preventDefault();
    const data = {
        front: document.getElementById('fc-front').value.trim(),
        back: document.getElementById('fc-back').value.trim(),
        subject_id: document.getElementById('fc-subject').value || null,
        tags: document.getElementById('fc-tags').value.trim() || null,
    };
    try {
        if (editingFlashcardId) {
            await api(`/flashcards/${editingFlashcardId}`, { method: 'PUT', body: JSON.stringify(data) });
            toast('Flashcard atualizado!', 'success');
        } else {
            await api('/flashcards/', { method: 'POST', body: JSON.stringify(data) });
            toast('Flashcard criado!', 'success');
        }
        closeModal();
        showFlashcards();
    } catch (e) { toast(e.message, 'error'); }
}

async function deleteFlashcard(id) {
    if (!confirm('Excluir este flashcard e todo o histórico de revisões?')) return;
    try {
        await api(`/flashcards/${id}`, { method: 'DELETE' });
        toast('Flashcard excluído.', 'success');
        showFlashcards();
    } catch (e) { toast(e.message, 'error'); }
}

// Review mode
async function startReview() {
    reviewQueue = [...window._fcDue];
    reviewIndex = 0;
    if (reviewQueue.length === 0) { toast('Nenhum card para revisar!', 'info'); return; }
    showReviewCard();
}

function showReviewCard() {
    if (reviewIndex >= reviewQueue.length) {
        document.getElementById('mainContent').innerHTML = `
        <div class="max-w-lg mx-auto text-center py-20">
            <p class="eyebrow mb-3" style="color:var(--emerald)">/ Concluído</p>
            <h3 class="serif text-[42px] font-medium mb-3" style="color:var(--ink); letter-spacing:-.015em;">Revisão encerrada</h3>
            <p class="text-[14px] mb-10" style="color:var(--ink-soft)">Você revisou <span class="mono">${reviewQueue.length}</span> flashcard${reviewQueue.length>1?'s':''} nesta sessão.</p>
            <button onclick="showFlashcards()" class="btn btn-ink">Ver todos os cards <i class="fa-solid fa-arrow-right text-[11px]"></i></button>
        </div>`;
        loadFlashcardBadge();
        return;
    }

    const card = reviewQueue[reviewIndex];
    const progress = Math.round((reviewIndex / reviewQueue.length) * 100);

    document.getElementById('mainContent').innerHTML = `
    <div class="max-w-2xl mx-auto">
        <div class="flex items-center gap-5 mb-8">
            <button onclick="showFlashcards()" style="color:var(--ink-faint)"><i class="fa-solid fa-arrow-left"></i></button>
            <div class="flex-1">
                <div class="flex justify-between mb-1.5">
                    <span class="eyebrow">Card ${reviewIndex+1} / ${reviewQueue.length}</span>
                    <span class="mono text-[11px]" style="color:var(--ink-faint)">${progress}%</span>
                </div>
                <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
            </div>
        </div>

        ${card.subject_name ? `<p class="text-center eyebrow mb-4" style="color:var(--gold)">/ ${card.subject_name}</p>` : ''}

        <div class="card-scene mb-7" style="height:260px">
            <div class="card-flip" id="review-card" style="height:100%">
                <div class="card-face">
                    <p class="eyebrow mb-5" style="color:var(--ink-faint)">Pergunta</p>
                    <p class="serif text-[24px] font-medium text-center leading-tight" style="color:var(--ink); letter-spacing:-.01em;">${card.front}</p>
                </div>
                <div class="card-face card-back">
                    <p class="eyebrow mb-5" style="color:var(--gold-soft)">Resposta</p>
                    <p class="serif text-[22px] font-medium text-center leading-tight" style="color:var(--paper); letter-spacing:-.01em;">${card.back}</p>
                </div>
            </div>
        </div>

        <div class="text-center mb-7">
            <button onclick="flipCard()" class="btn btn-ghost">
                <i class="fa-solid fa-rotate text-[11px]"></i> Virar card
            </button>
        </div>

        <div id="confidence-section" class="hidden">
            <p class="text-center eyebrow mb-4">Como foi?</p>
            <div class="grid grid-cols-5 gap-2">
                ${[
                    {v:1, label:'Nada', bg:'var(--crimson)', fg:'#fff'},
                    {v:2, label:'Pouco', bg:'#b87333', fg:'#fff'},
                    {v:3, label:'Regular', bg:'var(--gold)', fg:'#1d1404'},
                    {v:4, label:'Bem', bg:'#5d8a4e', fg:'#fff'},
                    {v:5, label:'Perfeito', bg:'var(--emerald)', fg:'#fff'},
                ].map(opt => `
                <button onclick="submitReview('${card.id}',${opt.v})"
                    class="py-3 transition-transform hover:-translate-y-0.5" style="background:${opt.bg}; color:${opt.fg}; font-size:11px; font-weight:600; letter-spacing:.1em; text-transform:uppercase;">
                    ${opt.label}
                </button>`).join('')}
            </div>
        </div>
    </div>`;
}

function flipCard() {
    const card = document.getElementById('review-card');
    card.classList.toggle('flipped');
    document.getElementById('confidence-section').classList.remove('hidden');
}

async function submitReview(cardId, confidence) {
    try {
        await api(`/flashcards/${cardId}/review`, {
            method: 'POST',
            body: JSON.stringify({ is_correct: confidence >= 3, confidence })
        });
        reviewIndex++;
        showReviewCard();
    } catch (e) { toast(e.message, 'error'); }
}

// ── STUDY SESSIONS ────────────────────────────────
async function showSessions() {
    setActive('menu-sessoes');
    setPage('Sessão de Estudo', 'Registre seu tempo e atividades');

    const subjectOpts = subjects.length === 0
        ? '<option value="">Nenhuma matéria cadastrada</option>'
        : subjects.map(s => `<option value="${s.id}">${s.name}</option>`).join('');

    timerSeconds = 0;
    clearInterval(timerInterval);
    timerRunning = false;
    sessionTasks = [];

    document.getElementById('mainContent').innerHTML = `
    <div class="max-w-2xl space-y-6">
        <div class="surface-ink p-10 text-center">
            <p class="eyebrow mb-4" style="color:var(--gold-soft)">/ Tempo de estudo</p>
            <p class="timer-display" id="timer-display" style="color:var(--paper)">00:00:00</p>
            <div class="flex justify-center gap-3 mt-8">
                <button onclick="toggleTimer()" id="btn-timer" class="btn btn-gold" style="padding: 12px 28px;">
                    <i class="fa-solid fa-play text-[11px]" id="timer-icon"></i><span id="timer-label">Iniciar</span>
                </button>
                <button onclick="resetTimer()" class="btn" style="background:rgba(255,255,255,.06); color:var(--paper); border:1px solid rgba(255,255,255,.15); padding: 12px 18px;">
                    <i class="fa-solid fa-rotate-left text-[11px]"></i>
                </button>
            </div>
        </div>

        <div class="surface p-7">
            <div class="section-head mb-6"><h3 class="title">Configurar sessão</h3></div>
            <div class="form-group">
                <label class="form-label">Matéria</label>
                <select class="form-select" id="session-subject">${subjectOpts}</select>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="form-group mb-0">
                    <label class="form-label">Questões feitas</label>
                    <input type="number" class="form-input mono" id="session-total" value="0" min="0">
                </div>
                <div class="form-group mb-0">
                    <label class="form-label">Acertos</label>
                    <input type="number" class="form-input mono" id="session-correct" value="0" min="0">
                </div>
            </div>
        </div>

        <div class="surface p-7">
            <div class="section-head mb-5"><h3 class="title">Tarefas da sessão</h3></div>
            <div id="task-list" class="mb-4"></div>
            <div class="flex gap-2">
                <input class="form-input flex-1" id="task-input" placeholder="Adicionar tarefa…" onkeydown="if(event.key==='Enter'){event.preventDefault();addTask()}">
                <button onclick="addTask()" class="btn btn-ghost">Adicionar</button>
            </div>
        </div>

        <button onclick="saveSession()" class="btn btn-ink w-full" style="padding:16px;">
            <i class="fa-solid fa-floppy-disk text-[11px]"></i> Salvar sessão
        </button>
    </div>`;
}

function toggleTimer() {
    timerRunning = !timerRunning;
    if (timerRunning) {
        timerInterval = setInterval(() => {
            timerSeconds++;
            const h = String(Math.floor(timerSeconds/3600)).padStart(2,'0');
            const m = String(Math.floor((timerSeconds%3600)/60)).padStart(2,'0');
            const s = String(timerSeconds%60).padStart(2,'0');
            document.getElementById('timer-display').textContent = `${h}:${m}:${s}`;
        }, 1000);
        document.getElementById('timer-icon').className = 'fa-solid fa-pause text-[11px]';
        document.getElementById('timer-label').textContent = 'Pausar';
    } else {
        clearInterval(timerInterval);
        document.getElementById('timer-icon').className = 'fa-solid fa-play text-[11px]';
        document.getElementById('timer-label').textContent = 'Retomar';
    }
}

function resetTimer() {
    clearInterval(timerInterval);
    timerRunning = false;
    timerSeconds = 0;
    const td = document.getElementById('timer-display');
    if (td) td.textContent = '00:00:00';
    const ti = document.getElementById('timer-icon');
    if (ti) ti.className = 'fa-solid fa-play text-[11px]';
    const tl = document.getElementById('timer-label');
    if (tl) tl.textContent = 'Iniciar';
}

function addTask() {
    const inp = document.getElementById('task-input');
    const desc = inp.value.trim();
    if (!desc) return;
    sessionTasks.push({ description: desc, is_done: false });
    inp.value = '';
    renderTaskList();
}

function toggleTask(i) {
    sessionTasks[i].is_done = !sessionTasks[i].is_done;
    renderTaskList();
}

function removeTask(i) {
    sessionTasks.splice(i, 1);
    renderTaskList();
}

function renderTaskList() {
    document.getElementById('task-list').innerHTML = sessionTasks.map((t, i) => `
    <div class="flex items-center gap-3 py-2.5" style="border-bottom:1px solid var(--line-soft)">
        <button onclick="toggleTask(${i})" class="w-4 h-4 flex items-center justify-center flex-shrink-0 transition-colors" style="border: 1.5px solid ${t.is_done ? 'var(--emerald)' : 'var(--line-strong)'}; background: ${t.is_done ? 'var(--emerald)' : 'transparent'}; color: var(--paper);">
            ${t.is_done ? '<i class="fa-solid fa-check text-[8px]"></i>' : ''}
        </button>
        <span class="flex-1 text-[13.5px]" style="color:${t.is_done ? 'var(--ink-faint)' : 'var(--ink)'}; ${t.is_done ? 'text-decoration: line-through;' : ''}">${t.description}</span>
        <button onclick="removeTask(${i})" style="color:var(--ink-faint);opacity:.5"><i class="fa-solid fa-xmark text-[11px]"></i></button>
    </div>`).join('');
}

async function saveSession() {
    const subjectId = document.getElementById('session-subject').value;
    if (!subjectId) { toast('Selecione uma matéria.', 'warning'); return; }
    if (timerSeconds === 0) { toast('Inicie o timer antes de salvar.', 'warning'); return; }

    const data = {
        subject_id: subjectId,
        duration_seconds: timerSeconds,
        total_questions: parseInt(document.getElementById('session-total').value) || 0,
        correct_answers: parseInt(document.getElementById('session-correct').value) || 0,
        tasks: sessionTasks,
    };
    try {
        await api('/sessions/', { method: 'POST', body: JSON.stringify(data) });
        toast('Sessão salva com sucesso!', 'success');
        resetTimer();
        sessionTasks = [];
        renderTaskList();
        document.getElementById('session-total').value = '0';
        document.getElementById('session-correct').value = '0';
    } catch (e) { toast(e.message, 'error'); }
}

// ── HISTORY ───────────────────────────────────────
async function showHistory() {
    setActive('menu-historico');
    setPage('Histórico', 'Registro de todas as sessões');
    const history = await api('/sessions/history').catch(() => []);

    const totalH = fmtDuration(history.reduce((a, s) => a + s.duration_seconds, 0));
    const totalQ = history.reduce((a, s) => a + s.total_questions, 0);
    const totalC = history.reduce((a, s) => a + s.correct_answers, 0);
    const acc = totalQ > 0 ? Math.round(totalC/totalQ*100) : 0;

    document.getElementById('mainContent').innerHTML = `
    <div class="max-w-4xl">
        ${history.length > 0 ? `
        <div class="flex justify-end mb-6">
            <button onclick="exportHistoryPdf()" class="btn btn-ghost">
                <i class="fa-solid fa-file-pdf text-[11px]"></i> Exportar PDF
            </button>
        </div>` : ''}

        <div class="grid grid-cols-3 gap-0 mb-10" style="border:1px solid var(--line);">
            ${editorialStat('fa-clock', 'Tempo total', `<span class="serif">${totalH}</span>`)}
            ${editorialStat('fa-list', 'Sessões', `<span class="serif">${history.length}</span>`)}
            ${editorialStat('fa-bullseye', 'Acerto', totalQ>0 ? `<span class="serif">${acc}</span><span class="mono text-[16px] ml-1" style="color:var(--ink-faint)">%</span>` : '—')}
        </div>

        ${history.length === 0 ? emptyState('fa-clock-rotate-left', 'Nenhuma sessão registrada', 'Registre sua primeira sessão de estudo.') :
        `<div class="surface">
            <table class="tbl">
                <thead>
                    <tr>
                        <th style="width:32px">#</th>
                        <th>Matéria</th>
                        <th>Data</th>
                        <th class="text-right">Duração</th>
                        <th class="text-right">Questões</th>
                        <th class="text-right">Acerto</th>
                    </tr>
                </thead>
                <tbody>
                    ${history.map((s, i) => {
                        const a = s.total_questions > 0 ? Math.round(s.correct_answers/s.total_questions*100) : null;
                        const accColor = a == null ? 'var(--ink-faint)' : a>=70 ? 'var(--emerald)' : a>=50 ? 'var(--amber-ink)' : 'var(--crimson)';
                        return `<tr>
                            <td class="mono text-[11px]" style="color:var(--ink-faint)">${String(i+1).padStart(2,'0')}</td>
                            <td class="serif text-[15px]" style="color:var(--ink); font-weight:500;">${s.subject_name}</td>
                            <td class="mono text-[12px]" style="color:var(--ink-soft)">${fmtDate(s.start_time)}</td>
                            <td class="mono text-[13px] text-right" style="color:var(--ink)">${fmtDuration(s.duration_seconds)}</td>
                            <td class="mono text-[13px] text-right" style="color:var(--ink-soft)">${s.total_questions > 0 ? `${s.correct_answers}/${s.total_questions}` : '—'}</td>
                            <td class="mono text-[13px] text-right" style="color:${accColor}; font-weight: 500;">${a != null ? a+'%' : '—'}</td>
                        </tr>`;
                    }).join('')}
                </tbody>
            </table>
        </div>`}
    </div>`;
}

// ── PROFILE ───────────────────────────────────────
async function showProfile() {
    setActive('menu-perfil');
    setPage('Meu Perfil', 'Informações e configurações');
    const u = me;
    document.getElementById('mainContent').innerHTML = `
    <div class="max-w-2xl space-y-6">
        <div class="surface p-8">
            <div class="flex items-start gap-6 mb-8 pb-6" style="border-bottom: 1px solid var(--line);">
                <div class="relative group">
                    ${u.photo_url
                        ? `<img src="${u.photo_url}" style="width:84px;height:84px;object-fit:cover;border:1px solid var(--line-strong)" onerror="this.outerHTML='<div style=\\'width:84px;height:84px;background:var(--gold-bg);display:flex;align-items:center;justify-content:center;border:1px solid var(--gold-soft);font-family:Fraunces,serif;font-weight:500;font-size:32px;color:var(--ink);\\'>${getInitials(u.full_name)}</div>'">`
                        : `<div style="width:84px;height:84px;background:var(--gold-bg);display:flex;align-items:center;justify-content:center;border:1px solid var(--gold-soft);font-family:Fraunces,serif;font-weight:500;font-size:32px;color:var(--ink);">${getInitials(u.full_name)}</div>`}
                    <button onclick="openPhotoModal()" style="position:absolute;bottom:-8px;right:-8px;width:28px;height:28px;background:var(--ink);color:var(--paper);display:flex;align-items:center;justify-content:center;cursor:pointer;" title="Alterar foto">
                        <i class="fa-solid fa-camera text-[11px]"></i>
                    </button>
                </div>
                <div class="pt-1">
                    <p class="serif text-[26px] font-medium" style="color:var(--ink); letter-spacing:-.01em; line-height:1;">${u.full_name}</p>
                    <p class="text-[13px] mt-1.5" style="color:var(--ink-soft)">${u.email}</p>
                    <span class="badge ${u.role==='admin' ? 'badge-pendente' : 'badge-em-curso'} mt-3">${u.role==='admin'?'Administrador':'Estudante'}</span>
                </div>
            </div>

            <form onsubmit="saveProfile(event)" class="space-y-5">
                <div class="grid grid-cols-2 gap-4">
                    <div class="form-group mb-0">
                        <label class="form-label">Nome completo</label>
                        <input class="form-input" id="p-name" value="${u.full_name||''}">
                    </div>
                    <div class="form-group mb-0">
                        <label class="form-label">Curso</label>
                        <input class="form-input" id="p-curso" value="${u.curso||''}" placeholder="Ex.: Direito">
                    </div>
                </div>
                <div class="grid grid-cols-3 gap-4">
                    <div class="form-group mb-0">
                        <label class="form-label">Período atual</label>
                        <input type="number" class="form-input mono" id="p-period" value="${u.current_period||''}" min="1" max="12">
                    </div>
                    <div class="form-group mb-0">
                        <label class="form-label">Total de períodos</label>
                        <input type="number" class="form-input mono" id="p-total" value="${u.total_periods||''}" min="1" max="12">
                    </div>
                    <div class="form-group mb-0">
                        <label class="form-label">Conclusão</label>
                        <input class="form-input" id="p-estimate" value="${u.completion_estimate||''}" placeholder="Ex.: Dez/2027">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="form-group mb-0">
                        <label class="form-label">Telefone</label>
                        <input class="form-input mono" id="p-phone" value="${u.phone||''}" placeholder="(11) 99999-0000">
                    </div>
                    <div class="form-group mb-0">
                        <label class="form-label">CPF</label>
                        <input class="form-input mono" id="p-cpf" value="${u.cpf||''}" placeholder="000.000.000-00" ${u.cpf ? 'disabled' : ''}>
                        ${u.cpf ? '<p class="text-[10.5px] mt-1.5" style="color:var(--ink-faint)">CPF não pode ser alterado</p>' : ''}
                    </div>
                </div>
                <button type="submit" class="btn btn-ink w-full mt-3">
                    <i class="fa-solid fa-floppy-disk text-[11px]"></i> Salvar alterações
                </button>
            </form>
        </div>

        <div class="surface p-7">
            <p class="eyebrow mb-1.5">Conta</p>
            <p class="text-[13px] mb-5" style="color:var(--ink-soft)">${u.email}</p>
            <button onclick="logout()" class="btn btn-danger">
                <i class="fa-solid fa-arrow-right-from-bracket text-[11px]"></i> Sair do sistema
            </button>
        </div>
    </div>`;
}

function openPhotoModal() {
    openModal(`
    <div class="flex items-baseline justify-between mb-6">
        <div>
            <p class="eyebrow" style="color:var(--gold)">/ Foto de perfil</p>
            <h3 class="serif text-[24px] font-medium mt-1" style="color:var(--ink); letter-spacing:-.01em;">Atualizar imagem</h3>
        </div>
        <button onclick="closeModal()" style="color:var(--ink-faint)"><i class="fa-solid fa-xmark text-lg"></i></button>
    </div>
    <p class="text-[12.5px] mb-5" style="color:var(--ink-soft)">Cole a URL de uma imagem pública. Deixe em branco para remover.</p>
    <input id="photo-url-input" class="form-input" placeholder="https://i.imgur.com/exemplo.jpg" value="${me.photo_url || ''}">
    <div class="flex gap-3 mt-6">
        <button onclick="closeModal()" class="btn btn-ghost flex-1">Cancelar</button>
        <button onclick="savePhoto()" class="btn btn-ink flex-1">Salvar</button>
    </div>`);
}

async function savePhoto() {
    const url = document.getElementById('photo-url-input').value.trim();
    try {
        const updated = await api('/users/me/photo', { method: 'PUT', body: JSON.stringify({ photo_url: url || null }) });
        me = { ...me, ...updated };
        closeModal();
        showProfile();
        toast(url ? 'Foto atualizada!' : 'Foto removida.', 'success');
    } catch (e) { toast(e.message, 'error'); }
}

async function saveProfile(e) {
    e.preventDefault();
    const data = {
        full_name: document.getElementById('p-name').value.trim() || undefined,
        curso: document.getElementById('p-curso').value.trim() || null,
        current_period: parseInt(document.getElementById('p-period').value) || null,
        total_periods: parseInt(document.getElementById('p-total').value) || null,
        completion_estimate: document.getElementById('p-estimate').value.trim() || null,
        phone: document.getElementById('p-phone').value.trim() || null,
    };
    const cpfEl = document.getElementById('p-cpf');
    if (!cpfEl.disabled && cpfEl.value.trim()) data.cpf = cpfEl.value.trim();

    try {
        const updated = await api('/users/me/update', { method: 'PUT', body: JSON.stringify(data) });
        me = { ...me, ...updated };
        document.getElementById('userDisplayName').textContent = me.full_name;
        document.getElementById('sidebar-name').textContent = me.full_name;
        toast('Perfil atualizado!', 'success');
    } catch (e) { toast(e.message, 'error'); }
}

// ── Start ──────────────────────────────────────────
init();
</script>
