<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Law System — Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
    --bg:         #fafafa;
    --bg-2:       #f4f4f5;
    --bg-hover:   #f5f5f4;
    --surface:    #ffffff;
    --border:     #e4e4e7;
    --border-2:   #d4d4d8;
    --text:       #18181b;
    --text-2:     #3f3f46;
    --text-3:     #52525b;
    --text-4:     #71717a;
    --text-5:     #a1a1aa;
    --accent:     #2563eb;
    --accent-h:   #1d4ed8;
    --accent-bg:  #eff6ff;
    --danger:     #dc2626;
    --danger-bg:  #fef2f2;
    --warning:    #d97706;
    --warning-bg: #fffbeb;
    --success:    #16a34a;
    --success-bg: #f0fdf4;
    --purple:     #7c3aed;
    --purple-bg:  #f5f3ff;
    /* sidebar */
    --side:       #18181b;
    --side-2:     #27272a;
    --side-text:  #a1a1aa;
    --side-hover: #e4e4e7;
    --side-active:#ffffff;
}
* { font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
body { background: var(--bg); color: var(--text); font-size: 13.5px; line-height: 1.5; }
.mono { font-family: 'JetBrains Mono', monospace; font-feature-settings: 'tnum' 1; }

/* ── Sidebar ── */
aside.sidebar { background: var(--side); color: var(--side-text); border-right: 1px solid #27272a; width: 224px; flex-shrink: 0; }
.sidebar-section { font-size: 10.5px; font-weight: 500; letter-spacing: .05em; text-transform: uppercase; color: #71717a; padding: 14px 14px 4px; }
.sidebar-link {
    display: flex; align-items: center; gap: 9px;
    padding: 6px 12px; margin: 1px 6px;
    font-size: 13px; color: var(--side-text);
    border-radius: 4px; transition: background .12s, color .12s;
    text-decoration: none;
}
.sidebar-link i { width: 14px; text-align: center; font-size: 11.5px; opacity: .85; }
.sidebar-link:hover { background: rgba(255,255,255,.05); color: var(--side-active); }
.sidebar-active { background: rgba(255,255,255,.08) !important; color: var(--side-active) !important; }
.sidebar-active i { opacity: 1; }
.no-scrollbar::-webkit-scrollbar { display: none; }
.no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

/* ── Topbar (breadcrumb) ── */
.topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 48px; display: flex; align-items: center; justify-content: space-between; }
.crumb { font-size: 13px; color: var(--text-3); }
.crumb b { color: var(--text); font-weight: 500; }

/* ── Page header ── */
.page-shell { padding: 20px 24px; }
.page-title { font-size: 19px; font-weight: 600; letter-spacing: -.01em; color: var(--text); }
.page-sub { font-size: 12.5px; color: var(--text-4); margin-top: 2px; }

/* ── Cards ── */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; }
.card-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
.card-title { font-size: 12.5px; font-weight: 600; color: var(--text); }
.card-sub { font-size: 11.5px; color: var(--text-4); }
.card-body { padding: 16px; }

/* ── KPI / Stat ── */
.kpi { background: var(--surface); border: 1px solid var(--border); padding: 14px 16px; border-radius: 6px; }
.kpi-label { font-size: 11px; font-weight: 500; color: var(--text-4); display: flex; align-items: center; gap: 6px; }
.kpi-label i { font-size: 10px; opacity: .7; }
.kpi-value { font-size: 24px; font-weight: 600; color: var(--text); letter-spacing: -.02em; margin-top: 8px; line-height: 1.1; font-feature-settings: 'tnum' 1; }
.kpi-value .unit { font-size: 13px; font-weight: 500; color: var(--text-4); margin-left: 4px; }
.kpi-delta { font-size: 11.5px; color: var(--text-4); margin-top: 4px; }

/* ── Buttons ── */
.btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 6px 12px; font-size: 12.5px; font-weight: 500; line-height: 1;
    border: 1px solid var(--border-2); background: var(--surface); color: var(--text);
    border-radius: 4px; cursor: pointer; transition: background .12s, border-color .12s;
    white-space: nowrap;
}
.btn:hover { background: var(--bg-2); border-color: var(--text-5); }
.btn:active { background: var(--border); }
.btn-primary { background: var(--text); color: white; border-color: var(--text); }
.btn-primary:hover { background: #27272a; border-color: #27272a; }
.btn-accent { background: var(--accent); color: white; border-color: var(--accent); }
.btn-accent:hover { background: var(--accent-h); border-color: var(--accent-h); }
.btn-danger { background: var(--surface); color: var(--danger); border-color: var(--border-2); }
.btn-danger:hover { background: var(--danger-bg); border-color: var(--danger); }
.btn-icon { padding: 5px 8px; }
.btn-sm { padding: 4px 8px; font-size: 11.5px; }
.btn-lg { padding: 9px 16px; font-size: 13px; }

/* ── Forms ── */
.input {
    width: 100%; padding: 7px 10px; font-size: 13px;
    background: var(--surface); color: var(--text);
    border: 1px solid var(--border); border-radius: 4px;
    outline: none; transition: border-color .12s, box-shadow .12s;
    line-height: 1.4;
}
.input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
.input::placeholder { color: var(--text-5); }
.input:disabled { background: var(--bg-2); color: var(--text-4); cursor: not-allowed; }
select.input { cursor: pointer; padding-right: 28px; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='%2371717a' stroke-width='1.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>"); background-repeat: no-repeat; background-position: right 10px center; appearance: none; }
textarea.input { line-height: 1.5; padding: 9px 10px; resize: vertical; }
.label { font-size: 11.5px; font-weight: 500; color: var(--text-2); display: block; margin-bottom: 5px; }
.help { font-size: 11px; color: var(--text-4); margin-top: 4px; }

/* ── Tables ── */
.tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
.tbl thead th {
    text-align: left; padding: 8px 12px;
    font-size: 11px; font-weight: 500; color: var(--text-4);
    text-transform: uppercase; letter-spacing: .04em;
    background: var(--bg-2); border-bottom: 1px solid var(--border);
}
.tbl tbody td { padding: 9px 12px; border-bottom: 1px solid var(--border); color: var(--text-2); vertical-align: middle; }
.tbl tbody tr:last-child td { border-bottom: none; }
.tbl tbody tr:hover td { background: var(--bg); }
.tbl .num { font-family: 'JetBrains Mono', monospace; font-feature-settings: 'tnum' 1; color: var(--text); }
.tbl .id { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-4); }
.tbl .actions { white-space: nowrap; text-align: right; }
.tbl tr.is-due td { background: var(--warning-bg); }

/* ── Badges ── */
.badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 7px; font-size: 11px; font-weight: 500;
    border-radius: 3px; line-height: 1.4;
    border: 1px solid;
}
.badge .dot { width: 5px; height: 5px; border-radius: 50%; display: inline-block; }
.badge-default     { background: var(--bg-2);     color: var(--text-3);   border-color: var(--border); }
.badge-pendente    { background: var(--warning-bg); color: var(--warning); border-color: #fde68a; }
.badge-em-curso    { background: var(--accent-bg); color: var(--accent);  border-color: #bfdbfe; }
.badge-concluida   { background: var(--success-bg); color: var(--success); border-color: #bbf7d0; }
.badge-alta        { background: var(--danger-bg); color: var(--danger);  border-color: #fecaca; }
.badge-media       { background: var(--warning-bg); color: var(--warning); border-color: #fde68a; }
.badge-baixa       { background: var(--bg-2); color: var(--text-3);     border-color: var(--border); }
.badge-pago        { background: var(--success-bg); color: var(--success); border-color: #bbf7d0; }
.badge-inadimplente{ background: var(--danger-bg); color: var(--danger);   border-color: #fecaca; }
.badge-active      { background: var(--success-bg); color: var(--success); border-color: #bbf7d0; }
.badge-inactive    { background: var(--bg-2);     color: var(--text-4);  border-color: var(--border); }
.badge-due         { background: var(--warning-bg); color: var(--warning); border-color: #fde68a; }

/* ── Section ── */
.section { margin-bottom: 24px; }
.section-toolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.section-toolbar h2 { font-size: 14px; font-weight: 600; color: var(--text); }
.section-toolbar .meta { font-size: 12px; color: var(--text-4); }

/* ── Toasts ── */
#toast-container { position: fixed; top: 60px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
.toast { pointer-events: all; display: flex; align-items: flex-start; gap: 10px; min-width: 280px; max-width: 380px; padding: 10px 14px; font-size: 12.5px;
         background: var(--surface); border: 1px solid var(--border); border-left-width: 3px; border-radius: 4px; box-shadow: 0 4px 12px rgba(0,0,0,.04);
         animation: toastIn .25s ease; transition: opacity .25s, transform .25s; }
.toast.hide { opacity: 0; transform: translateX(20px); }
.toast-success { border-left-color: var(--success); }
.toast-error   { border-left-color: var(--danger); }
.toast-warning { border-left-color: var(--warning); }
.toast-info    { border-left-color: var(--accent); }
.toast-close { background: none; border: none; cursor: pointer; opacity: .5; font-size: 12px; color: inherit; padding: 0; margin-left: auto; }
.toast-close:hover { opacity: 1; }
@keyframes toastIn { from { opacity:0; transform: translateX(20px); } to { opacity:1; transform: translateX(0); } }

/* ── Modal ── */
.modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
.modal-box { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 20px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 40px rgba(0,0,0,.15); }
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
.modal-head h3 { font-size: 15px; font-weight: 600; color: var(--text); }
.modal-close { background: none; border: none; cursor: pointer; color: var(--text-4); padding: 4px; font-size: 14px; }
.modal-close:hover { color: var(--text); }

/* ── Empty state ── */
.empty { text-align: center; padding: 36px 20px; }
.empty i { font-size: 22px; color: var(--text-5); margin-bottom: 10px; }
.empty .title { font-size: 13px; font-weight: 500; color: var(--text-2); }
.empty .sub { font-size: 12px; color: var(--text-4); margin-top: 4px; }

/* ── Avatar / pill ── */
.avatar { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; background: var(--bg-2); color: var(--text-2); font-size: 11px; font-weight: 600; border-radius: 4px; border: 1px solid var(--border); }
.brand-mark { width: 24px; height: 24px; background: var(--accent); color: white; display: inline-flex; align-items: center; justify-content: center; border-radius: 4px; font-size: 11px; }

/* ── Progress ── */
.bar { height: 4px; background: var(--bg-2); border-radius: 99px; overflow: hidden; }
.bar > div { height: 100%; background: var(--accent); border-radius: 99px; transition: width .4s ease; }

/* ── Tabs (in-page) ── */
.tab-bar { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
.tab-btn { padding: 8px 14px; font-size: 12.5px; font-weight: 500; color: var(--text-3); border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; }
.tab-btn:hover { color: var(--text-2); }
.tab-btn.active { color: var(--text); border-bottom-color: var(--text); }

/* ── Filter bar ── */
.filterbar { display: flex; align-items: center; gap: 8px; padding: 8px 0 16px; }
.filterbar input.input { width: 240px; padding: 6px 10px 6px 30px; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 14 14'><circle cx='6' cy='6' r='5' stroke='%2371717a' fill='none' stroke-width='1.4'/><path d='M10 10l3 3' stroke='%2371717a' stroke-width='1.4' stroke-linecap='round'/></svg>"); background-repeat: no-repeat; background-position: 10px center; background-size: 12px; }

/* ── Flashcard flip ── */
.card-scene { perspective: 1200px; }
.card-flip { position: relative; width: 100%; transition: transform .5s; transform-style: preserve-3d; }
.card-flip.flipped { transform: rotateY(180deg); }
.card-face { position: absolute; inset: 0; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 28px; border-radius: 6px; }
.card-face.front { background: var(--surface); border: 1px solid var(--border); }
.card-face.back { background: var(--text); color: white; transform: rotateY(180deg); }

/* ── Timer ── */
.timer-display { font-family: 'JetBrains Mono', monospace; font-size: 56px; font-weight: 500; letter-spacing: -.02em; line-height: 1; color: var(--text); font-feature-settings: 'tnum' 1; }

/* ── Cover (book) ── */
.cover {
    aspect-ratio: 3/4; padding: 14px; display: flex; flex-direction: column;
    justify-content: space-between; border-radius: 4px; cursor: pointer;
    box-shadow: inset -6px 0 10px -8px rgba(0,0,0,.25), 0 1px 3px rgba(0,0,0,.06);
    transition: transform .15s;
}
.cover:hover { transform: translateY(-2px); }
.cover .ttl { font-size: 12.5px; font-weight: 600; color: white; line-height: 1.3; }
.cover .meta { font-size: 10px; color: rgba(255,255,255,.7); display: flex; justify-content: space-between; font-family: 'JetBrains Mono', monospace; }

/* ── Misc ── */
.divider-h { height: 1px; background: var(--border); }
.text-mono { font-family: 'JetBrains Mono', monospace; }

@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } }
</style>
</head>

<script src="config.js"></script>
<script>
// ─────────────────────────────────────────────────────────────
// State
// ─────────────────────────────────────────────────────────────
const token = localStorage.getItem('access_token');
let me = null;
let subjects = [];
let teachers = [];
let timerInterval = null;
let timerSeconds = 0;
let timerRunning = false;
let sessionTasks = [];
let editingSubjectId = null;
let editingBookId = null;
let editingFlashcardId = null;
let currentBookId = null;
let reviewQueue = [];
let reviewIndex = 0;

if (!token) location.href = 'index.html';

// ─────────────────────────────────────────────────────────────
// Toast / Modal
// ─────────────────────────────────────────────────────────────
function toast(msg, type = 'info', duration = 3000) {
    const icons = { success:'circle-check', error:'circle-xmark', warning:'triangle-exclamation', info:'circle-info' };
    const el = document.createElement('div');
    el.className = `toast toast-${type}`;
    el.innerHTML = `<i class="fa-solid fa-${icons[type]} text-[13px]" style="margin-top:2px;color:var(--${type === 'info' ? 'accent' : type})"></i><span class="flex-1">${msg}</span><button class="toast-close" onclick="this.parentElement.remove()"><i class="fa-solid fa-xmark"></i></button>`;
    document.getElementById('toast-container').appendChild(el);
    setTimeout(() => { el.classList.add('hide'); setTimeout(() => el.remove(), 300); }, duration);
}

function openModal(html) {
    document.getElementById('modal-content').innerHTML = html;
    document.getElementById('modal').classList.remove('hidden');
}
function closeModal() {
    document.getElementById('modal').classList.add('hidden');
}

// ─────────────────────────────────────────────────────────────
// API
// ─────────────────────────────────────────────────────────────
async function api(path, opts = {}) {
    const res = await fetch(`${API_BASE}${path}`, {
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`, ...opts.headers },
        ...opts
    });
    if (res.status === 401) { localStorage.removeItem('access_token'); location.href = 'index.html'; return; }
    if (res.status === 204) return null;
    return res.json().then(d => { if (!res.ok) throw new Error(d.detail || `Erro ${res.status}`); return d; });
}

// ─────────────────────────────────────────────────────────────
// Utils
// ─────────────────────────────────────────────────────────────
function setActive(id) {
    document.querySelectorAll('.sidebar-link').forEach(el => el.classList.remove('sidebar-active'));
    document.getElementById(id)?.classList.add('sidebar-active');
}

function setPage(title, section = '', sub = '') {
    document.getElementById('crumb-section').textContent = section || 'Geral';
    document.getElementById('crumb-page').textContent = title;
}

function fmtDuration(s) {
    const h = Math.floor(s/3600), m = Math.floor((s%3600)/60);
    if (h > 0) return `${h}h${String(m).padStart(2,'0')}`;
    return `${m}m`;
}
function fmtDate(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
}
function fmtShortDate(iso) {
    if (!iso) return '—';
    const d = new Date(iso.length === 10 ? iso + 'T00:00:00' : iso);
    return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`;
}
function fmtDateTime(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return `${fmtDate(iso)} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function getInitials(name) {
    if (!name) return '—';
    const parts = name.trim().split(/\s+/).filter(Boolean);
    if (!parts.length) return '—';
    if (parts.length === 1) return parts[0].slice(0,2).toUpperCase();
    return (parts[0][0] + parts[parts.length-1][0]).toUpperCase();
}
function emptyState(icon, title, sub) {
    return `<div class="empty"><i class="fa-solid ${icon}"></i><p class="title">${title}</p><p class="sub">${sub || ''}</p></div>`;
}
function loadingBlock() { return `<div class="empty"><i class="fa-solid fa-circle-notch fa-spin"></i><p class="sub">Carregando…</p></div>`; }
function kpi(label, value, icon, unit) {
    return `<div class="kpi">
        <div class="kpi-label">${icon ? `<i class="fa-solid ${icon}"></i>` : ''}${label}</div>
        <div class="kpi-value">${value}${unit ? `<span class="unit">${unit}</span>` : ''}</div>
    </div>`;
}

async function loadFlashcardBadge() {
    try {
        const due = await api('/flashcards/due');
        const badge = document.getElementById('fc-due-badge');
        if (due.length > 0) { badge.textContent = due.length > 99 ? '99+' : due.length; badge.classList.remove('hidden'); }
        else badge.classList.add('hidden');
    } catch {}
}

function renderDashboardCharts(stats) {
    if (_activityChart) { _activityChart.destroy(); _activityChart = null; }
    if (_subjectsChart) { _subjectsChart.destroy(); _subjectsChart = null; }

    const INK = '#18181b', INK_FAINT = '#a1a1aa', LINE = '#e4e4e7', ACCENT = '#2563eb';
    Chart.defaults.font.family = "'Inter', sans-serif";
    Chart.defaults.font.size = 11;
    Chart.defaults.color = INK_FAINT;

    const actCanvas = document.getElementById('activityChart');
    if (actCanvas) {
        const labels = stats.last_30_days.map(d => {
            const dt = new Date(d.date + 'T00:00:00');
            return `${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')}`;
        });
        _activityChart = new Chart(actCanvas, {
            type: 'bar',
            data: { labels, datasets: [{ data: stats.last_30_days.map(d => d.minutes), backgroundColor: ACCENT, borderRadius: 2, maxBarThickness: 10 }] },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false }, tooltip: { backgroundColor: INK, padding: 8, cornerRadius: 4, displayColors: false, callbacks: { label: c => `${c.parsed.y} min` } } },
                scales: {
                    y: { beginAtZero: true, ticks: { font: { family: "'JetBrains Mono', monospace", size: 10 } }, grid: { color: LINE, drawTicks: false }, border: { display: false } },
                    x: { ticks: { font: { family: "'JetBrains Mono', monospace", size: 10 }, maxRotation: 0, autoSkip: true, maxTicksLimit: 8 }, grid: { display: false }, border: { color: LINE } }
                }
            }
        });
    }

    const subjCanvas = document.getElementById('subjectsChart');
    if (subjCanvas && stats.by_subject.length > 0) {
        const palette = ['#2563eb', '#16a34a', '#d97706', '#dc2626', '#7c3aed', '#0891b2', '#db2777', '#65a30d'];
        _subjectsChart = new Chart(subjCanvas, {
            type: 'doughnut',
            data: { labels: stats.by_subject.map(b => b.name), datasets: [{ data: stats.by_subject.map(b => b.minutes), backgroundColor: stats.by_subject.map((_, i) => palette[i % palette.length]), borderWidth: 2, borderColor: '#fff' }] },
            options: {
                responsive: true, maintainAspectRatio: false, cutout: '62%',
                plugins: {
                    legend: { position: 'bottom', labels: { font: { size: 11 }, color: INK, boxWidth: 8, boxHeight: 8, padding: 8, usePointStyle: true, pointStyle: 'rect' } },
                    tooltip: { backgroundColor: INK, padding: 8, cornerRadius: 4, displayColors: false, callbacks: { label: c => ` ${c.label}: ${c.parsed} min` } }
                }
            }
        });
    }
}

async function updateSubjectStatus(id, status) {
    try {
        await api(`/subjects/${id}/status?s_status=${encodeURIComponent(status)}`, { method: 'PATCH' });
        subjects = await api('/subjects/');
        renderSubjects();
        toast(`Status atualizado para "${status}"`, 'success');
    } catch (e) { toast(e.message, 'error'); }
}

function openSubjectModal(id = null) {
    editingSubjectId = id;
    const s = id ? subjects.find(x => x.id === id) : null;
    const teacherOpts = teachers.map(t => `<option value="${t.id}" ${s && s.teacher_id === t.id ? 'selected' : ''}>${t.name}</option>`).join('');

    openModal(`
    <div class="modal-head">
        <h3>${id ? 'Editar matéria' : 'Nova matéria'}</h3>
        <button onclick="closeModal()" class="modal-close"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <form onsubmit="saveSubject(event)" class="space-y-3">
        <div><label class="label">Nome *</label><input class="input" id="s-name" value="${s?.name||''}" required placeholder="Ex.: Direito Civil"></div>
        <div class="grid grid-cols-2 gap-3">
            <div><label class="label">Sigla</label><input class="input" id="s-sigla" value="${s?.sigla||''}" placeholder="DIR_CIV"></div>
            <div><label class="label">Período *</label><input type="number" class="input mono" id="s-period" value="${s?.period||1}" min="1" max="12" required></div>
        </div>
        <div class="grid grid-cols-2 gap-3">
            <div><label class="label">Prioridade</label>
                <select class="input" id="s-priority">
                    <option value="Alta" ${s?.priority==='Alta'?'selected':''}>Alta</option>
                    <option value="Média" ${!s||s?.priority==='Média'?'selected':''}>Média</option>
                    <option value="Baixa" ${s?.priority==='Baixa'?'selected':''}>Baixa</option>
                </select>
            </div>
            <div><label class="label">Professor</label>
                <select class="input" id="s-teacher">
                    <option value="">Selecione…</option>
                    ${teacherOpts}
                    <option value="NONE" ${s?.no_teacher?'selected':''}>Sem professor</option>
                </select>
            </div>
        </div>
        <div class="flex gap-2 justify-end pt-2">
            <button type="button" onclick="closeModal()" class="btn">Cancelar</button>
            <button type="submit" class="btn btn-primary">Salvar</button>
        </div>
    </form>`);
}

async function saveSubject(e) {
    e.preventDefault();
    const teacherVal = document.getElementById('s-teacher').value;
    const data = {
        name: document.getElementById('s-name').value.trim(),
        sigla: document.getElementById('s-sigla').value.trim() || null,
        period: parseInt(document.getElementById('s-period').value),
        priority: document.getElementById('s-priority').value,
        no_teacher: teacherVal === 'NONE',
        teacher_id: (teacherVal && teacherVal !== 'NONE') ? teacherVal : null,
    };
    try {
        if (editingSubjectId) {
            await api(`/subjects/${editingSubjectId}`, { method: 'PUT', body: JSON.stringify(data) });
            toast('Matéria atualizada', 'success');
        } else {
            await api('/subjects/', { method: 'POST', body: JSON.stringify(data) });
            toast('Matéria criada', 'success');
        }
        subjects = await api('/subjects/');
        closeModal();
        renderSubjects();
    } catch (e) { toast(e.message, 'error'); }
}

async function deleteSubject(id, name) {
    if (!confirm(`Excluir "${name}"?`)) return;
    try {
        await api(`/subjects/${id}`, { method: 'DELETE' });
        subjects = subjects.filter(s => s.id !== id);
        renderSubjects();
        toast('Matéria excluída', 'success');
    } catch (e) { toast(e.message, 'error'); }
}

        </div>

        ${books.length === 0 ? `<div class="card"><div class="card-body">${emptyState('fa-book-open','Acervo vazio','Adicione PDFs com URL pública.')}</div></div>` :
        `<div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4">
            ${books.map(b => {
                const color = b.cover_color || '#18181b';
                const pct = b.progress_pct || 0;
                return `
                <div class="group">
                    <div class="cover" style="background: ${color}" onclick="openBookReader('${b.id}')">
                        <div class="flex justify-end gap-1 opacity-0 group-hover:opacity-100 transition-opacity" onclick="event.stopPropagation()">
                            <button onclick="openBookModal('${b.id}')" class="text-[10px]" style="width:22px;height:22px;background:rgba(255,255,255,.95);color:var(--text);display:inline-flex;align-items:center;justify-content:center;border-radius:3px">
                                <i class="fa-solid fa-pen"></i>
                            </button>
                            <button onclick="deleteBook('${b.id}','${b.name.replace(/'/g,"\\'")}',event)" class="text-[10px]" style="width:22px;height:22px;background:rgba(255,255,255,.95);color:var(--danger);display:inline-flex;align-items:center;justify-content:center;border-radius:3px">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                        </div>
                        <p class="ttl">${b.name}</p>
                        <div class="meta"><span>${b.current_page}/${b.total_pages}</span><span>${pct}%</span></div>
                    </div>
                    <div class="mt-2">
                        ${b.author ? `<p class="text-[12px] truncate" style="color:var(--text-3)">${b.author}</p>` : '<p class="text-[12px]" style="color:var(--text-5)">—</p>'}
                        <div class="bar mt-1.5"><div style="width:${pct}%"></div></div>
                    </div>
                </div>`;
            }).join('')}
        </div>`}
    </div>`;
}

function openBookModal(id = null) {
    editingBookId = id;
    const subjectOpts = subjects.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
    const colorPicker = COVER_COLORS.map(c => `<button type="button" onclick="selectColor('${c}',this)" data-color="${c}" class="color-btn" style="width:24px;height:24px;background:${c};border:2px solid transparent;border-radius:3px;cursor:pointer;transition:border-color .12s"></button>`).join('');

    openModal(`
    <div class="modal-head"><h3>${id ? 'Editar livro' : 'Adicionar livro'}</h3><button onclick="closeModal()" class="modal-close"><i class="fa-solid fa-xmark"></i></button></div>
    <form onsubmit="saveBook(event)" class="space-y-3">
        <div><label class="label">Título *</label><input class="input" id="b-name" required></div>
        <div class="grid grid-cols-2 gap-3">
            <div><label class="label">Autor</label><input class="input" id="b-author"></div>
            <div><label class="label">Gênero</label><input class="input" id="b-genre" placeholder="Ex.: Doutrina"></div>
        </div>
        <div class="grid grid-cols-2 gap-3">
            <div><label class="label">Total páginas</label><input type="number" class="input mono" id="b-pages" value="1" min="1"></div>
            <div><label class="label">Página atual</label><input type="number" class="input mono" id="b-curpage" value="0" min="0"></div>
        </div>
        <div><label class="label">URL do PDF</label><input type="url" class="input mono" id="b-url" placeholder="https://..."><p class="help">Link direto para um PDF público.</p></div>
        <div><label class="label">Matéria</label><select class="input" id="b-subject"><option value="">Nenhuma</option>${subjectOpts}</select></div>
        <div><label class="label">Cor da capa</label><div class="flex gap-1.5 flex-wrap mt-1" id="color-picker">${colorPicker}</div><input type="hidden" id="b-color" value="${COVER_COLORS[0]}"></div>
        <div class="flex gap-2 justify-end pt-2">
            <button type="button" onclick="closeModal()" class="btn">Cancelar</button>
            <button type="submit" class="btn btn-primary">Salvar</button>
        </div>
    </form>`);

    selectColor(COVER_COLORS[0], document.querySelector('.color-btn'));

    if (id) {
        api(`/books/${id}`).then(b => {
            document.getElementById('b-name').value = b.name;
            document.getElementById('b-author').value = b.author || '';
            document.getElementById('b-genre').value = b.genre || '';
            document.getElementById('b-pages').value = b.total_pages;
            document.getElementById('b-curpage').value = b.current_page;
            document.getElementById('b-url').value = b.url || '';
            document.getElementById('b-subject').value = b.subject_id || '';
            if (b.cover_color) {
                const btn = document.querySelector(`.color-btn[data-color="${b.cover_color}"]`);
                if (btn) selectColor(b.cover_color, btn);
            }
        });
    }
}

function selectColor(color, btn) {
    document.querySelectorAll('.color-btn').forEach(b => b.style.borderColor = 'transparent');
    btn.style.borderColor = 'var(--accent)';
    document.getElementById('b-color').value = color;
}

async function saveBook(e) {
    e.preventDefault();
    const data = {
        name: document.getElementById('b-name').value.trim(),
        author: document.getElementById('b-author').value.trim() || null,
        genre: document.getElementById('b-genre').value.trim() || null,
        total_pages: parseInt(document.getElementById('b-pages').value) || 1,
        current_page: parseInt(document.getElementById('b-curpage').value) || 0,
        url: document.getElementById('b-url').value.trim() || null,
        subject_id: document.getElementById('b-subject').value || null,
        cover_color: document.getElementById('b-color').value,
    };
    try {
        if (editingBookId) await api(`/books/${editingBookId}`, { method: 'PUT', body: JSON.stringify(data) });
        else await api('/books/', { method: 'POST', body: JSON.stringify(data) });
        closeModal();
        showBooks();
        toast(editingBookId ? 'Livro atualizado' : 'Livro adicionado', 'success');
    } catch (e) { toast(e.message, 'error'); }
}

async function deleteBook(id, name, ev) {
    ev.stopPropagation();
    if (!confirm(`Excluir "${name}"? Grifos e anotações serão removidos.`)) return;
    try {
        await api(`/books/${id}`, { method: 'DELETE' });
        showBooks();
        toast('Livro excluído', 'success');
    } catch (e) { toast(e.message, 'error'); }
}

async function openBookReader(bookId) {
    currentBookId = bookId;
    const book = await api(`/books/${bookId}`).catch(() => null);
    if (!book) { toast('Livro não encontrado.', 'error'); return; }
    setActive('menu-livros');
    setPage(book.name, 'Acervo');

    const [annotations, highlights] = await Promise.all([
        api(`/books/${bookId}/annotations`).catch(() => []),
        api(`/books/${bookId}/highlights`).catch(() => []),
    ]);

    const hlColors = { yellow:'#fef08a', green:'#bbf7d0', blue:'#bfdbfe', pink:'#fbcfe8' };

    document.getElementById('mainContent').innerHTML = `
    <div class="h-full flex flex-col">
        <div class="topbar" style="border-top: none">
            <div class="flex items-center gap-3">
                <button onclick="showBooks()" class="btn btn-icon btn-sm"><i class="fa-solid fa-arrow-left text-[10px]"></i></button>
                <div>
                    <p class="text-[13px] font-medium" style="color:var(--text)">${book.name}</p>
                    <p class="text-[11px] mono" style="color:var(--text-4)">pg. ${book.current_page}/${book.total_pages} · ${book.progress_pct}%</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <div class="bar" style="width: 240px"><div style="width:${book.progress_pct}%"></div></div>
                <button onclick="openBookModal('${bookId}')" class="btn btn-icon btn-sm"><i class="fa-solid fa-gear text-[10px]"></i></button>
            </div>
        </div>

        <div class="flex gap-3 flex-1 min-h-0 p-3">
            <div class="card flex-1 flex flex-col overflow-hidden">
                ${book.url ? `
                <iframe src="${book.url}" class="flex-1" style="border:none;background:white"></iframe>` :
                `<div class="card-body flex-1 flex items-center justify-center">${emptyState('fa-link','PDF não vinculado','Edite o livro e cole a URL.')}</div>`}
            </div>

            <div class="w-80 flex-shrink-0 flex flex-col gap-3">
                <div class="card">
                    <div class="card-header"><span class="card-title">Página atual</span></div>
                    <div class="card-body flex items-center gap-2">
                        <input type="number" id="book-page-input" value="${book.current_page}" min="0" max="${book.total_pages}" class="input mono text-center" style="width:80px">
                        <span class="text-[12px] mono" style="color:var(--text-4)">/ ${book.total_pages}</span>
                        <button onclick="saveBookPage('${bookId}')" class="btn btn-primary btn-sm ml-auto">Salvar</button>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header"><span class="card-title">Adicionar grifo</span></div>
                    <div class="card-body space-y-2">
                        <textarea id="hl-text" rows="2" class="input" placeholder="Texto grifado…"></textarea>
                        <div class="flex items-center gap-2">
                            <input type="number" id="hl-page" value="${book.current_page}" min="1" max="${book.total_pages}" class="input mono" style="width:64px">
                            <select id="hl-color" class="input flex-1">
                                <option value="yellow">Amarelo</option>
                                <option value="green">Verde</option>
                                <option value="blue">Azul</option>
                                <option value="pink">Rosa</option>
                            </select>
                            <button onclick="addHighlight('${bookId}')" class="btn btn-primary btn-sm">Grifar</button>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header"><span class="card-title">Anotação</span></div>
                    <div class="card-body space-y-2">
                        <textarea id="ann-text" rows="3" class="input" placeholder="Sua anotação…"></textarea>
                        <div class="flex items-center gap-2">
                            <input type="number" id="ann-page" value="${book.current_page}" min="1" max="${book.total_pages}" class="input mono" style="width:64px">
                            <button onclick="addAnnotation('${bookId}')" class="btn btn-primary btn-sm ml-auto">Salvar</button>
                        </div>
                    </div>
                </div>

                <div class="card flex-1 overflow-y-auto no-scrollbar">
                    <div class="card-header"><span class="card-title">Salvos</span><span class="card-sub ml-auto">${annotations.length + highlights.length}</span></div>
                    <div class="card-body space-y-2">
                        ${[...highlights.map(h => ({...h,type:'highlight'})), ...annotations.map(a => ({...a,type:'annotation'}))]
                            .sort((a,b) => a.page_number - b.page_number).map(item => {
                            const isHL = item.type === 'highlight';
                            const c = isHL ? (hlColors[item.color] || '#fef08a') : '#e4e4e7';
                            return `<div id="item-${item.id}" class="p-2.5" style="background:var(--bg-2); border-left:2px solid ${c}; border-radius: 0 3px 3px 0;">
                                <div class="flex items-center justify-between mb-1">
                                    <span class="text-[10px] mono uppercase" style="color:var(--text-4); letter-spacing:.04em;">${isHL ? 'GRIFO' : 'NOTA'} · pg.${item.page_number}</span>
                                    <button onclick="deleteNote('${item.id}','${isHL ? 'highlight' : 'annotation'}')" style="color:var(--text-5)"><i class="fa-solid fa-xmark text-[10px]"></i></button>
                                </div>
                                <p class="text-[12px]" style="color:var(--text)">${isHL ? item.selected_text : item.note_text}</p>
                            </div>`;
                        }).join('') || `<p class="text-[12px]" style="color:var(--text-4)">Nenhum grifo ou anotação.</p>`}
                    </div>
                </div>
            </div>
        </div>
    </div>`;
}

async function saveBookPage(bookId) {
    const page = parseInt(document.getElementById('book-page-input').value);
    try { await api(`/books/${bookId}`, { method: 'PUT', body: JSON.stringify({ current_page: page }) }); toast('Progresso salvo', 'success'); }
    catch (e) { toast(e.message, 'error'); }
}

async function addHighlight(bookId) {
    const text = document.getElementById('hl-text').value.trim();
    const page = parseInt(document.getElementById('hl-page').value);
    const color = document.getElementById('hl-color').value;
    if (!text) { toast('Digite o trecho.', 'warning'); return; }
    try {
        await api(`/books/${bookId}/highlights`, { method: 'POST', body: JSON.stringify({ page_number: page, selected_text: text, color }) });
        toast('Grifo salvo', 'success');
        openBookReader(bookId);
    } catch (e) { toast(e.message, 'error'); }
}

async function addAnnotation(bookId) {
    const text = document.getElementById('ann-text').value.trim();
    const page = parseInt(document.getElementById('ann-page').value);
    if (!text) { toast('Digite a anotação.', 'warning'); return; }
    try {
        await api(`/books/${bookId}/annotations`, { method: 'POST', body: JSON.stringify({ page_number: page, note_text: text }) });
        toast('Anotação salva', 'success');
        openBookReader(bookId);
    } catch (e) { toast(e.message, 'error'); }
}

async function deleteNote(id, type) {
    try {
        const path = type === 'highlight' ? `/books/highlights/${id}` : `/books/annotations/${id}`;
        await api(path, { method: 'DELETE' });
        document.getElementById(`item-${id}`)?.remove();
        toast('Removido', 'success');
    } catch (e) { toast(e.message, 'error'); }
}

// ─────────────────────────────────────────────────────────────
// FLASHCARDS
// ─────────────────────────────────────────────────────────────
async function showFlashcards() {
    setActive('menu-flashcards');
    setPage('Flashcards', 'Estudo');
    const [cards, stats] = await Promise.all([api('/flashcards/').catch(() => []), api('/flashcards/stats').catch(() => null)]);
    renderFlashcards(cards, stats);
}

function renderFlashcards(cards, stats) {
    const due = cards.filter(c => c.is_due);
    document.getElementById('mainContent').innerHTML = `
    <div class="page-shell">
        <div class="flex items-baseline justify-between mb-5">
            <div>
                <h1 class="page-title">Flashcards</h1>
                <p class="page-sub">Revisão espaçada (SM-2)</p>
            </div>
            <div class="flex gap-2">
                ${due.length > 0 ? `<button onclick="startReview()" class="btn btn-accent"><i class="fa-solid fa-play text-[10px]"></i> Revisar ${due.length}</button>` : ''}
                <button onclick="openFlashcardModal()" class="btn btn-primary"><i class="fa-solid fa-plus text-[10px]"></i> Novo</button>
            </div>
        </div>

        ${stats ? `<div class="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-5">
            ${kpi('Total', stats.total_cards, 'fa-layer-group')}
            ${kpi('A revisar hoje', stats.due_today, 'fa-clock')}
            ${kpi('Revisões', stats.total_reviews, 'fa-repeat')}
            ${kpi('Acerto geral', stats.overall_accuracy_pct != null ? stats.overall_accuracy_pct : '—', 'fa-bullseye', stats.overall_accuracy_pct != null ? '%' : '')}
        </div>` : ''}

        <div class="tab-bar">
            <button id="tab-all" onclick="filterCards('all')" class="tab-btn active">Todos · ${cards.length}</button>
            <button id="tab-due" onclick="filterCards('due')" class="tab-btn">A revisar · ${due.length}</button>
        </div>

        <div id="fc-list">${renderCardList(cards)}</div>
    </div>`;

    window._fcAll = cards;
    window._fcDue = due;
}

function filterCards(type) {
    document.getElementById('tab-all').classList.toggle('active', type==='all');
    document.getElementById('tab-due').classList.toggle('active', type==='due');
    document.getElementById('fc-list').innerHTML = renderCardList(type==='all' ? window._fcAll : window._fcDue);
}

function renderCardList(cards) {
    if (cards.length === 0) return `<div class="card"><div class="card-body">${emptyState('fa-layer-group','Nenhum flashcard','Crie cards para revisar com repetição espaçada.')}</div></div>`;
    return `<div class="card">
        <table class="tbl">
            <thead><tr><th style="width:32px">#</th><th>Pergunta</th><th>Matéria</th><th>Tags</th><th style="width:80px" class="text-right">Acerto</th><th style="width:60px" class="text-right">Rev.</th><th style="width:90px" class="actions">Ações</th></tr></thead>
            <tbody>
                ${cards.map((c, i) => `
                <tr class="${c.is_due ? 'is-due' : ''}">
                    <td class="id">${String(i+1).padStart(2,'0')}</td>
                    <td><div style="max-width:480px"><p style="color:var(--text); font-weight: 500;">${c.front}</p><p class="text-[11.5px] mt-0.5 truncate" style="color:var(--text-4)">${c.back}</p></div></td>
                    <td><span class="text-[11.5px]" style="color:var(--text-3)">${c.subject_name || '—'}</span></td>
                    <td><span class="mono text-[10.5px]" style="color:var(--text-4)">${c.tags ? c.tags.split(',').map(t => '#'+t.trim()).join(' ') : '—'}</span></td>
                    <td class="num text-right">${c.accuracy_pct != null ? c.accuracy_pct + '%' : '—'}</td>
                    <td class="num text-right" style="color:var(--text-3)">${c.total_reviews}</td>
                    <td class="actions">
                        <button onclick="openFlashcardModal('${c.id}')" class="btn btn-icon btn-sm"><i class="fa-solid fa-pen text-[10px]"></i></button>
                        <button onclick="deleteFlashcard('${c.id}')" class="btn btn-icon btn-sm"><i class="fa-solid fa-trash text-[10px]"></i></button>
                    </td>
                </tr>`).join('')}
            </tbody>
        </table>
    </div>`;
}

function openFlashcardModal(id = null) {
    editingFlashcardId = id;
    const subjectOpts = subjects.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
    openModal(`
    <div class="modal-head"><h3>${id ? 'Editar flashcard' : 'Novo flashcard'}</h3><button onclick="closeModal()" class="modal-close"><i class="fa-solid fa-xmark"></i></button></div>
    <form onsubmit="saveFlashcard(event)" class="space-y-3">
        <div><label class="label">Pergunta *</label><textarea id="fc-front" rows="3" class="input" required placeholder="O que é…? Defina…"></textarea></div>
        <div><label class="label">Resposta *</label><textarea id="fc-back" rows="3" class="input" required placeholder="A resposta…"></textarea></div>
        <div class="grid grid-cols-2 gap-3">
            <div><label class="label">Matéria</label><select class="input" id="fc-subject"><option value="">Nenhuma</option>${subjectOpts}</select></div>
            <div><label class="label">Tags</label><input class="input" id="fc-tags" placeholder="tag1, tag2"></div>
        </div>
        <div class="flex gap-2 justify-end pt-2">
            <button type="button" onclick="closeModal()" class="btn">Cancelar</button>
            <button type="submit" class="btn btn-primary">Salvar</button>
        </div>
    </form>`);

    if (id) {
        api(`/flashcards/${id}`).then(c => {
            document.getElementById('fc-front').value = c.front;
            document.getElementById('fc-back').value = c.back;
            document.getElementById('fc-subject').value = c.subject_id || '';
            document.getElementById('fc-tags').value = c.tags || '';
        });
    }
}

async function saveFlashcard(e) {
    e.preventDefault();
    const data = {
        front: document.getElementById('fc-front').value.trim(),
        back: document.getElementById('fc-back').value.trim(),
        subject_id: document.getElementById('fc-subject').value || null,
        tags: document.getElementById('fc-tags').value.trim() || null,
    };
    try {
        if (editingFlashcardId) await api(`/flashcards/${editingFlashcardId}`, { method: 'PUT', body: JSON.stringify(data) });
        else await api('/flashcards/', { method: 'POST', body: JSON.stringify(data) });
        closeModal();
        showFlashcards();
        toast(editingFlashcardId ? 'Atualizado' : 'Criado', 'success');
    } catch (e) { toast(e.message, 'error'); }
}

async function deleteFlashcard(id) {
    if (!confirm('Excluir este card e todo o histórico de revisões?')) return;
    try { await api(`/flashcards/${id}`, { method: 'DELETE' }); toast('Excluído', 'success'); showFlashcards(); }
    catch (e) { toast(e.message, 'error'); }
}

// Review
async function startReview() {
    const due = await api('/flashcards/due').catch(() => []);
    reviewQueue = due;
    reviewIndex = 0;
    if (reviewQueue.length === 0) { toast('Nenhum card para revisar.', 'info'); return; }
    showReviewCard();
}

function showReviewCard() {
    if (reviewIndex >= reviewQueue.length) {
        document.getElementById('mainContent').innerHTML = `
        <div class="page-shell">
            <div class="card" style="max-width: 480px; margin: 60px auto;">
                <div class="card-body text-center" style="padding: 40px 20px;">
                    <i class="fa-solid fa-circle-check text-[28px] mb-3" style="color:var(--success)"></i>
                    <h2 class="text-[18px] font-semibold mb-1" style="color:var(--text)">Revisão concluída</h2>
                    <p class="text-[12.5px] mb-5" style="color:var(--text-4)">${reviewQueue.length} card${reviewQueue.length>1?'s':''} revisado${reviewQueue.length>1?'s':''}.</p>
                    <button onclick="showFlashcards()" class="btn btn-primary">Voltar →</button>
                </div>
            </div>
        </div>`;
        loadFlashcardBadge();
        return;
    }

    const card = reviewQueue[reviewIndex];
    const progress = Math.round((reviewIndex / reviewQueue.length) * 100);

    document.getElementById('mainContent').innerHTML = `
    <div class="page-shell">
        <div class="flex items-center gap-3 mb-5">
            <button onclick="showFlashcards()" class="btn btn-icon btn-sm"><i class="fa-solid fa-arrow-left text-[10px]"></i></button>
            <div class="flex-1">
                <div class="flex justify-between mb-1.5"><span class="text-[12px]" style="color:var(--text-3)">Card ${reviewIndex+1} / ${reviewQueue.length}</span><span class="mono text-[11px]" style="color:var(--text-4)">${progress}%</span></div>
                <div class="bar"><div style="width:${progress}%"></div></div>
            </div>
        </div>

        <div class="max-w-2xl mx-auto">
            ${card.subject_name ? `<p class="text-center text-[11px] uppercase tracking-wider mb-3" style="color:var(--text-4); letter-spacing:.08em;">${card.subject_name}</p>` : ''}

            <div class="card-scene mb-5" style="height:260px">
                <div class="card-flip" id="review-card" style="height:100%">
                    <div class="card-face front">
                        <p class="text-[11px] uppercase tracking-wider mb-4" style="color:var(--text-4); letter-spacing:.1em;">Pergunta</p>
                        <p class="text-[18px] font-medium text-center leading-snug" style="color:var(--text); max-width: 520px;">${card.front}</p>
                    </div>
                    <div class="card-face back">
                        <p class="text-[11px] uppercase tracking-wider mb-4" style="color: rgba(255,255,255,.6); letter-spacing:.1em;">Resposta</p>
                        <p class="text-[17px] font-medium text-center leading-snug" style="max-width: 520px;">${card.back}</p>
                    </div>
                </div>
            </div>

            <div class="text-center mb-5">
                <button onclick="flipCard()" class="btn"><i class="fa-solid fa-rotate text-[10px]"></i> Virar (mostrar resposta)</button>
            </div>

            <div id="confidence-section" class="hidden">
                <p class="text-center text-[11px] uppercase tracking-wider mb-3" style="color:var(--text-3); letter-spacing:.1em;">Como foi?</p>
                <div class="grid grid-cols-5 gap-2 max-w-xl mx-auto">
                    ${[
                        {v:1, label:'Nada',     color:'#dc2626'},
                        {v:2, label:'Pouco',    color:'#ea580c'},
                        {v:3, label:'Regular',  color:'#d97706'},
                        {v:4, label:'Bem',      color:'#65a30d'},
                        {v:5, label:'Perfeito', color:'#16a34a'},
                    ].map(opt => `
                    <button onclick="submitReview('${card.id}',${opt.v})" class="text-[11.5px] font-medium text-white py-2.5 px-2 rounded transition-opacity hover:opacity-90" style="background:${opt.color}">
                        ${opt.label}<br><span class="text-[10px] mono opacity-70">${opt.v}</span>
                    </button>`).join('')}
                </div>
            </div>
        </div>
    </div>`;
}

function flipCard() {
    document.getElementById('review-card').classList.add('flipped');
    document.getElementById('confidence-section').classList.remove('hidden');
}

async function submitReview(id, confidence) {
    try {
        await api(`/flashcards/${id}/review`, { method: 'POST', body: JSON.stringify({ confidence }) });
        reviewIndex++;
        showReviewCard();
    } catch (e) { toast(e.message, 'error'); }
}

// ─────────────────────────────────────────────────────────────
// SESSIONS
// ─────────────────────────────────────────────────────────────
async function showSessions() {
    setActive('menu-sessoes');
    setPage('Sessão de estudo', 'Estudo');

    const subjectOpts = subjects.length === 0
        ? '<option value="">Nenhuma matéria cadastrada</option>'
        : subjects.map(s => `<option value="${s.id}">${s.name}</option>`).join('');

    timerSeconds = 0;
    clearInterval(timerInterval);
    timerRunning = false;
    sessionTasks = [];

    document.getElementById('mainContent').innerHTML = `
    <div class="page-shell">
        <div class="mb-5">
            <h1 class="page-title">Nova sessão de estudo</h1>
            <p class="page-sub">Cronômetro, questões e tarefas</p>
        </div>

        <div class="max-w-3xl space-y-3">
            <div class="card">
                <div class="card-header"><span class="card-title">Cronômetro</span></div>
                <div class="card-body">
                    <div class="text-center py-4">
                        <p class="timer-display" id="timer-display">00:00:00</p>
                    </div>
                    <div class="flex justify-center gap-2">
                        <button onclick="toggleTimer()" id="btn-timer" class="btn btn-primary btn-lg" style="min-width:140px">
                            <i class="fa-solid fa-play text-[11px]" id="timer-icon"></i><span id="timer-label">Iniciar</span>
                        </button>
                        <button onclick="resetTimer()" class="btn btn-lg"><i class="fa-solid fa-rotate-left text-[11px]"></i> Zerar</button>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header"><span class="card-title">Dados da sessão</span></div>
                <div class="card-body space-y-3">
                    <div><label class="label">Matéria *</label><select class="input" id="session-subject">${subjectOpts}</select></div>
                    <div class="grid grid-cols-2 gap-3">
                        <div><label class="label">Questões feitas</label><input type="number" class="input mono" id="session-total" value="0" min="0"></div>
                        <div><label class="label">Acertos</label><input type="number" class="input mono" id="session-correct" value="0" min="0"></div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header"><span class="card-title">Tarefas</span></div>
                <div class="card-body">
                    <div id="task-list" class="mb-3"></div>
                    <div class="flex gap-2">
                        <input class="input flex-1" id="task-input" placeholder="Adicionar tarefa…" onkeydown="if(event.key==='Enter'){event.preventDefault();addTask()}">
                        <button onclick="addTask()" class="btn">Adicionar</button>
                    </div>
                </div>
            </div>

            <button onclick="saveSession()" class="btn btn-primary btn-lg w-full">
                <i class="fa-solid fa-floppy-disk text-[11px]"></i> Salvar sessão
            </button>
        </div>
    </div>`;
}

function toggleTimer() {
    timerRunning = !timerRunning;
    if (timerRunning) {
        timerInterval = setInterval(() => {
            timerSeconds++;
            const h = String(Math.floor(timerSeconds/3600)).padStart(2,'0');
            const m = String(Math.floor((timerSeconds%3600)/60)).padStart(2,'0');
            const s = String(timerSeconds%60).padStart(2,'0');
            document.getElementById('timer-display').textContent = `${h}:${m}:${s}`;
        }, 1000);
        document.getElementById('timer-icon').className = 'fa-solid fa-pause text-[11px]';
        document.getElementById('timer-label').textContent = 'Pausar';
    } else {
        clearInterval(timerInterval);
        document.getElementById('timer-icon').className = 'fa-solid fa-play text-[11px]';
        document.getElementById('timer-label').textContent = 'Retomar';
    }
}

function resetTimer() {
    clearInterval(timerInterval);
    timerRunning = false;
    timerSeconds = 0;
    document.getElementById('timer-display').textContent = '00:00:00';
    document.getElementById('timer-icon').className = 'fa-solid fa-play text-[11px]';
    document.getElementById('timer-label').textContent = 'Iniciar';
}

function addTask() {
    const inp = document.getElementById('task-input');
    const desc = inp.value.trim();
    if (!desc) return;
    sessionTasks.push({ description: desc, is_done: false });
    inp.value = '';
    renderTaskList();
}
function toggleTask(i) { sessionTasks[i].is_done = !sessionTasks[i].is_done; renderTaskList(); }
function removeTask(i) { sessionTasks.splice(i, 1); renderTaskList(); }

function renderTaskList() {
    document.getElementById('task-list').innerHTML = sessionTasks.map((t, i) => `
    <div class="flex items-center gap-2 py-2" style="border-bottom: 1px solid var(--border)">
        <button onclick="toggleTask(${i})" class="w-4 h-4 flex items-center justify-center transition-colors" style="border: 1.5px solid ${t.is_done ? 'var(--success)' : 'var(--border-2)'}; background: ${t.is_done ? 'var(--success)' : 'transparent'}; color: white; border-radius: 3px;">
            ${t.is_done ? '<i class="fa-solid fa-check text-[8px]"></i>' : ''}
        </button>
        <span class="flex-1 text-[13px]" style="color:${t.is_done ? 'var(--text-5)' : 'var(--text)'}; ${t.is_done ? 'text-decoration: line-through;' : ''}">${t.description}</span>
        <button onclick="removeTask(${i})" style="color:var(--text-5)"><i class="fa-solid fa-xmark text-[11px]"></i></button>
    </div>`).join('');
}

async function saveSession() {
    const subjectId = document.getElementById('session-subject').value;
    if (!subjectId) { toast('Selecione uma matéria.', 'warning'); return; }
    if (timerSeconds === 0) { toast('Inicie o timer.', 'warning'); return; }
    const data = {
        subject_id: subjectId,
        duration_seconds: timerSeconds,
        total_questions: parseInt(document.getElementById('session-total').value) || 0,
        correct_answers: parseInt(document.getElementById('session-correct').value) || 0,
        tasks: sessionTasks,
    };
    try {
        await api('/sessions/', { method: 'POST', body: JSON.stringify(data) });
        toast('Sessão salva', 'success');
        resetTimer();
        sessionTasks = [];
        renderTaskList();
        document.getElementById('session-total').value = '0';
        document.getElementById('session-correct').value = '0';
    } catch (e) { toast(e.message, 'error'); }
}

// ─────────────────────────────────────────────────────────────
// HISTORY
// ─────────────────────────────────────────────────────────────
async function showHistory() {
    setActive('menu-historico');
    setPage('Histórico', 'Estudo');
    const history = await api('/sessions/history').catch(() => []);

    const totalSec = history.reduce((a, s) => a + s.duration_seconds, 0);
    const totalQ = history.reduce((a, s) => a + s.total_questions, 0);
    const totalC = history.reduce((a, s) => a + s.correct_answers, 0);
    const acc = totalQ > 0 ? Math.round(totalC/totalQ*100) : 0;

    document.getElementById('mainContent').innerHTML = `
    <div class="page-shell">
        <div class="flex items-baseline justify-between mb-5">
            <div>
                <h1 class="page-title">Histórico</h1>
                <p class="page-sub">${history.length} sessão${history.length !== 1 ? 'ões' : ''} registrada${history.length !== 1 ? 's' : ''}</p>
            </div>
            ${history.length > 0 ? `<button onclick="exportHistoryPdf()" class="btn"><i class="fa-solid fa-file-pdf text-[10px]"></i> Exportar PDF</button>` : ''}
        </div>

        <div class="grid grid-cols-3 gap-3 mb-5">
            ${kpi('Tempo total', fmtDuration(totalSec), 'fa-clock')}
            ${kpi('Sessões', history.length, 'fa-list')}
            ${kpi('Acerto', totalQ > 0 ? acc : '—', 'fa-bullseye', totalQ > 0 ? '%' : '')}
        </div>

        ${history.length === 0 ? `<div class="card"><div class="card-body">${emptyState('fa-clock-rotate-left','Nenhuma sessão','Registre sua primeira sessão.')}</div></div>` :
        `<div class="card">
            <table class="tbl">
                <thead><tr><th style="width:32px">#</th><th>Matéria</th><th style="width:120px">Data</th><th style="width:100px" class="text-right">Duração</th><th style="width:100px" class="text-right">Questões</th><th style="width:80px" class="text-right">Acerto</th></tr></thead>
                <tbody>
                    ${history.map((s, i) => {
                        const a = s.total_questions > 0 ? Math.round(s.correct_answers/s.total_questions*100) : null;
                        const aColor = a == null ? 'var(--text-5)' : a>=70 ? 'var(--success)' : a>=50 ? 'var(--warning)' : 'var(--danger)';
                        return `<tr>
                            <td class="id">${String(i+1).padStart(2,'0')}</td>
                            <td style="color:var(--text); font-weight: 500;">${s.subject_name}</td>
                            <td class="num text-[12px]">${fmtDateTime(s.start_time)}</td>
                            <td class="num text-right">${fmtDuration(s.duration_seconds)}</td>
                            <td class="num text-right" style="color:var(--text-3)">${s.total_questions > 0 ? `${s.correct_answers}/${s.total_questions}` : '—'}</td>
                            <td class="num text-right" style="color:${aColor}">${a != null ? a+'%' : '—'}</td>
                        </tr>`;
                    }).join('')}
                </tbody>
            </table>
        </div>`}
    </div>`;
}

async function exportHistoryPdf() {
    try {
        const res = await fetch(`${API_BASE}/sessions/report/pdf`, { headers: { 'Authorization': `Bearer ${token}` } });
        if (!res.ok) { toast('Erro ao gerar PDF.', 'error'); return; }
        const blob = await res.blob();
        const disp = res.headers.get('content-disposition') || '';
        const match = disp.match(/filename\*?=(?:UTF-8'')?["']?([^"';]+)["']?/i);
        const fname = match ? decodeURIComponent(match[1]) : `Historico - ${me.full_name}.pdf`;
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = fname; a.click();
        URL.revokeObjectURL(url);
    } catch (e) { toast('Erro ao exportar: ' + e.message, 'error'); }
}

// PROFILE
// ─────────────────────────────────────────────────────────────

    setActive('menu-perfil');
    setPage('Perfil', 'Conta');
    const u = me;
    document.getElementById('mainContent').innerHTML = `
    <div class="page-shell">
        <div class="mb-5">
            <h1 class="page-title">Perfil</h1>
            <p class="page-sub">Informações da conta</p>
        </div>

        <div class="max-w-2xl space-y-3">
            <div class="card">
                <div class="card-body">
                    <div class="flex items-start gap-4 pb-5 mb-5" style="border-bottom: 1px solid var(--border)">
                        <div class="relative">
                            ${u.photo_url
                                ? `<img src="${u.photo_url}" style="width:64px;height:64px;object-fit:cover;border-radius:4px;border:1px solid var(--border)" onerror="this.outerHTML='<div class=\\'avatar\\' style=\\'width:64px;height:64px;font-size:22px\\'>${getInitials(u.full_name)}</div>'">`

                                <i class="fa-solid fa-camera text-[9px]"></i>
                            </button>
                        </div>
                        <div class="flex-1 pt-1">
                            <p class="text-[16px] font-semibold" style="color:var(--text)">${u.full_name}</p>
                            <p class="text-[12.5px] mt-0.5" style="color:var(--text-3)">${u.email}</p>
                            <span class="badge ${u.role==='admin' ? 'badge-em-curso' : 'badge-default'} mt-2">${u.role==='admin'?'Administrador':'Estudante'}</span>
                        </div>
                    </div>

                    <form onsubmit="saveProfile(event)" class="space-y-3">
                        <div class="grid grid-cols-2 gap-3">
                            <div><label class="label">Nome completo</label><input class="input" id="p-name" value="${u.full_name||''}"></div>
                            <div><label class="label">Curso</label><input class="input" id="p-curso" value="${u.curso||''}" placeholder="Direito"></div>
                        </div>
                        <div class="grid grid-cols-3 gap-3">
                            <div><label class="label">Período atual</label><input type="number" class="input mono" id="p-period" value="${u.current_period||''}" min="1" max="12"></div>
                            <div><label class="label">Total períodos</label><input type="number" class="input mono" id="p-total" value="${u.total_periods||''}" min="1" max="12"></div>
                            <div><label class="label">Previsão</label><input class="input" id="p-estimate" value="${u.completion_estimate||''}" placeholder="Dez/2027"></div>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div><label class="label">Telefone</label><input class="input mono" id="p-phone" value="${u.phone||''}" placeholder="(11) 99999-0000"></div>
                            <div><label class="label">CPF</label><input class="input mono" id="p-cpf" value="${u.cpf||''}" placeholder="000.000.000-00" ${u.cpf ? 'disabled' : ''}>${u.cpf ? '<p class="help">CPF não pode ser alterado</p>' : ''}</div>
                        </div>
                        <div class="flex justify-end pt-2">
                            <button type="submit" class="btn btn-primary"><i class="fa-solid fa-floppy-disk text-[10px]"></i> Salvar</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="card">
                <div class="card-body flex items-center justify-between">
                    <div>
                        <p class="text-[12.5px] font-medium" style="color:var(--text)">Sair da conta</p>
                        <p class="text-[11.5px] mt-0.5" style="color:var(--text-4)">Encerra a sessão neste navegador.</p>
                    </div>
                    <button onclick="logout()" class="btn btn-danger"><i class="fa-solid fa-arrow-right-from-bracket text-[10px]"></i> Sair</button>
                </div>
            </div>
        </div>
    </div>`;

function openPhotoModal() {
    openModal(`
    <div class="modal-head"><h3>Foto de perfil</h3><button onclick="closeModal()" class="modal-close"><i class="fa-solid fa-xmark"></i></button></div>
    <p class="text-[12.5px] mb-3" style="color:var(--text-3)">URL pública (http/https). Deixe em branco para remover.</p>
    <input id="photo-url-input" class="input mono" placeholder="https://..." value="${me.photo_url || ''}">
    <div class="flex gap-2 justify-end mt-4">
        <button onclick="closeModal()" class="btn">Cancelar</button>
        <button onclick="savePhoto()" class="btn btn-primary">Salvar</button>
    </div>`);
}

async function savePhoto() {
    const url = document.getElementById('photo-url-input').value.trim();
    try {
        const updated = await api('/users/me/photo', { method: 'PUT', body: JSON.stringify({ photo_url: url || null }) });
        me = { ...me, ...updated };
        closeModal();
        showProfile();
        toast(url ? 'Foto atualizada' : 'Foto removida', 'success');
    } catch (e) { toast(e.message, 'error'); }
}

async function saveProfile(e) {
    e.preventDefault();
    const data = {
        full_name: document.getElementById('p-name').value.trim() || undefined,
        curso: document.getElementById('p-curso').value.trim() || null,
        current_period: parseInt(document.getElementById('p-period').value) || null,
        total_periods: parseInt(document.getElementById('p-total').value) || null,
        completion_estimate: document.getElementById('p-estimate').value.trim() || null,
        phone: document.getElementById('p-phone').value.trim() || null,
    };
    const cpfEl = document.getElementById('p-cpf');
    if (!cpfEl.disabled && cpfEl.value.trim()) data.cpf = cpfEl.value.trim();

    try {
        const updated = await api('/users/me/update', { method: 'PUT', body: JSON.stringify(data) });
        me = { ...me, ...updated };
        document.getElementById('userDisplayName').textContent = me.full_name;
        document.getElementById('sidebar-name').textContent = me.full_name;
        toast('Perfil atualizado', 'success');
    } catch (e) { toast(e.message, 'error'); }
}

init();
</script>
