<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Law System — Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/theme.css">
</head>
<body class="flex h-screen overflow-hidden">

<div id="toast-container"></div>

<!-- Sidebar -->
<aside class="sidebar flex flex-col">
    <div class="px-4 py-3 flex items-center gap-2" style="border-bottom: 1px solid #27272a;">
        <div class="brand-mark"><i class="fa-solid fa-scale-balanced"></i></div>
        <div>
            <p class="text-[13px] font-semibold" style="color: white">Law System</p>
            <p class="text-[10px] mono" style="color: #71717a">v2.0</p>
        </div>
    </div>

    <nav class="flex-1 py-2 overflow-y-auto no-scrollbar">
        <p class="sidebar-section">Geral</p>
        <a href="#" onclick="showDashboard()" id="menu-dash" class="sidebar-link">
            <i class="fa-solid fa-gauge-high"></i><span>Dashboard</span>
        </a>

        <p class="sidebar-section">Acervo</p>
        <a href="#" onclick="showSubjects()" id="menu-materias" class="sidebar-link">
            <i class="fa-solid fa-book-bookmark"></i><span>Matérias</span>
        </a>
        <a href="#" onclick="showTeachers()" id="menu-docentes" class="sidebar-link">
            <i class="fa-solid fa-chalkboard-user"></i><span>Docentes</span>
        </a>
        <a href="#" onclick="showBooks()" id="menu-livros" class="sidebar-link">
            <i class="fa-solid fa-book-open"></i><span>Livros</span>
        </a>

        <p class="sidebar-section">Estudo</p>
        <a href="#" onclick="showFlashcards()" id="menu-flashcards" class="sidebar-link">
            <i class="fa-solid fa-layer-group"></i><span>Flashcards</span>
            <span id="fc-due-badge" class="hidden ml-auto mono text-[10px]" style="background:var(--warning);color:white;padding:1px 5px;border-radius:3px;"></span>
        </a>
        <a href="#" onclick="showSessions()" id="menu-sessoes" class="sidebar-link">
            <i class="fa-solid fa-stopwatch"></i><span>Sessões</span>
        </a>
        <a href="#" onclick="showHistory()" id="menu-historico" class="sidebar-link">
            <i class="fa-solid fa-clock-rotate-left"></i><span>Histórico</span>
        </a>

        <p class="sidebar-section">Conta</p>
        <a href="#" onclick="showProfile()" id="menu-perfil" class="sidebar-link">
            <i class="fa-solid fa-user"></i><span>Perfil</span>
        </a>
        <div id="admin-menu" class="hidden">
            <a href="admin.html" class="sidebar-link">
                <i class="fa-solid fa-shield-halved"></i><span>Painel admin</span>
            </a>
        </div>
    </nav>

    <div class="px-3 py-2" style="border-top: 1px solid #27272a;">
        <div class="flex items-center gap-2 px-2 py-1.5">
            <div class="avatar" style="background:#27272a;color:#a1a1aa;border-color:#3f3f46;">
                <span id="sidebar-initial">—</span>
            </div>
            <div class="min-w-0 flex-1">
                <p id="sidebar-name" class="text-[12px] font-medium truncate" style="color: white">—</p>
                <p id="sidebar-role" class="text-[10.5px] truncate" style="color: #71717a">—</p>
            </div>
            <button onclick="logout()" class="text-[11px] hover:opacity-100" style="opacity:.6; color: #a1a1aa" title="Sair">
                <i class="fa-solid fa-arrow-right-from-bracket"></i>
            </button>
        </div>
    </div>
</aside>

<!-- Main -->
<main class="flex-1 flex flex-col overflow-hidden">
    <header class="topbar">
        <div class="crumb">
            <span id="crumb-section">Geral</span>
            <span class="mx-1.5" style="color:var(--text-5)">/</span>
            <b id="crumb-page">Dashboard</b>
        </div>
        <div class="flex items-center gap-3">
            <span id="userDisplayName" class="text-[12.5px] font-medium" style="color: var(--text-2)">—</span>
            <div class="avatar" id="headerAvatar">—</div>
        </div>
    </header>

    <section id="mainContent" class="flex-1 overflow-y-auto"></section>
</main>

<!-- Modal -->
<div id="modal" class="modal-backdrop hidden" onclick="if(event.target===this)closeModal()">
    <div class="modal-box" onclick="event.stopPropagation()">
        <div id="modal-content"></div>
    </div>
</div>

<!-- Scripts: ordem importa. config primeiro, depois common (api/utils), módulos, e app por último -->
<script src="config.js"></script>
<script src="js/common.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/subjects.js"></script>
<script src="js/teachers.js"></script>
<script src="js/books.js"></script>
<script src="js/flashcards.js"></script>
<script src="js/sessions.js"></script>
<script src="js/history.js"></script>
<script src="js/profile.js"></script>
<script src="js/app.js"></script>
</body>
</html>
