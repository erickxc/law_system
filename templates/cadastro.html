<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Law System - Cadastro</title>
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; height: 100vh; }
        .card { border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-law { background-color: #2c3e50; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4 card p-4">
                <h3 class="text-center mb-4">Law System</h3>
                <input type="text" class="form-control mb-2" placeholder="Nome Completo">
                <input type="email" class="form-control mb-2" placeholder="E-mail">
                <input type="password" class="form-control mb-3" placeholder="Senha">
                <button class="btn btn-law w-100">Criar Conta</button>
            </div>
        </div>
    </div>
</body>
</html>
